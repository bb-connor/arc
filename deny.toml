# Workspace-wide cargo-deny configuration.
# Source of truth: .planning/trajectory/09-supply-chain-attestation.md (Phase 1).
# Changes to this file require CODEOWNERS review.

[graph]
all-features = true
no-default-features = false

# NOTE: the verbatim Phase 1 block in 09-supply-chain-attestation.md
# included an [output] feedback-level = "error" key that no cargo-deny in
# the ^0.16 band accepts (only feature-depth is recognized under [output]
# in 0.16.x). Dropped the [output] block here to make the config parse;
# the orchestrator should amend the milestone doc in a follow-up so the
# trajectory remains the single source of truth.

# NOTE: cargo-deny PR #611 also removed `unmaintained` and `notice` from
# [advisories] (severity is now implicit; everything except yanked is "deny"
# unless ignored). The verbatim Phase 1 block had both keys; dropped here
# to make the config parse. Same trajectory-doc amendment applies.
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# SMELL NOTE: the ignore list below exceeds the ~6-entry "soft cap" we
# normally enforce. The excess is structural: the advisory db carries
# 15 separate wasmtime CVEs against the single 29.0.1 pin we ship, plus
# 4 rustls-webpki CVEs against a single 0.103.9 pin, plus 5 unmaintained
# advisories. Each cluster collapses to one upstream-dep bump. The bumps
# themselves are out of scope for M09.P1 (deny-policy seeding) and are
# tracked as M09.P2 follow-up tickets:
#   - bump wasmtime 29.0.1 -> >=43.0.1 (clears all RUSTSEC-2025/2026 wasmtime)
#   - bump rustls-webpki 0.103.9 -> >=0.103.10 (clears RUSTSEC-2026-0049/0098/0099/0104)
#   - migrate off rustls-pemfile, bincode 1, fxhash, paste, serde_yml
#   - bump rsa to clear RUSTSEC-2023-0071 (Marvin) once an upstream fix lands
# When those bump tickets close, prune the corresponding entries here so
# the ignore list shrinks back below the soft cap.
ignore = [
    # --- wasmtime 29.0.1 cluster: all clear via bump to >=43.0.1 (M09.P2). ---
    # Host panic via WASIp1 fd_renumber (wasmtime). Fix: wasmtime >=24.0.1.
    "RUSTSEC-2025-0046",
    # Unsound API access to a Wasm shared linear memory (wasmtime). Fix: >=29.0.2.
    "RUSTSEC-2025-0118",
    # Segfault / out-of-sandbox load via f64.copysign on x86-64 (wasmtime). Fix: >=36.0.1.
    "RUSTSEC-2026-0006",
    # Guest-controlled resource exhaustion in WASI implementations (wasmtime). Fix: >=36.0.2.
    "RUSTSEC-2026-0020",
    # Panic adding excessive fields to wasi:http/types.fields (wasmtime). Fix: >=36.0.2.
    "RUSTSEC-2026-0021",
    # Panic when lifting `flags` component value (wasmtime). Fix: >=36.0.5.
    "RUSTSEC-2026-0085",
    # Host data leakage with 64-bit tables and Winch (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0086",
    # Segfault / out-of-sandbox load via f64x2.splat on Cranelift x86-64 (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0087",
    # Data leakage between pooling allocator instances (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0088",
    # Host panic when Winch compiler executes table.fill (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0089",
    # OOB write / crash when transcoding component model strings (wasmtime). Fix: >=24.0.7.
    "RUSTSEC-2026-0091",
    # Panic when transcoding misaligned component model UTF-16 (wasmtime). Fix: >=24.0.7.
    "RUSTSEC-2026-0092",
    # Heap OOB read in component model UTF-16 -> latin1+utf16 transcoding (wasmtime). Fix: >=24.0.7.
    "RUSTSEC-2026-0093",
    # Improperly masked return from table.grow with Winch backend (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0094",
    # aarch64 sandbox-escape via Winch backend memory access (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0095",
    # aarch64 Cranelift sandbox-escape via miscompiled guest heap access (wasmtime). Fix: >=36.0.7.
    "RUSTSEC-2026-0096",

    # --- rustls-webpki 0.103.9 cluster: all clear via bump to >=0.103.10 (M09.P2). ---
    # CRLs not considered authoritative by Distribution Point (faulty match). Fix: >=0.103.10.
    "RUSTSEC-2026-0049",
    # Name constraints for URI names incorrectly accepted (rustls-webpki). Fix: >=0.103.10.
    "RUSTSEC-2026-0098",
    # Name constraints accepted for certificates asserting a wildcard name. Fix: >=0.103.10.
    "RUSTSEC-2026-0099",
    # Reachable panic in CRL parsing (rustls-webpki). Fix: >=0.103.10.
    "RUSTSEC-2026-0104",

    # --- unmaintained / unsound clusters: each requires a dep migration (M09.P2). ---
    # bincode 1.3.3 unmaintained (RUSTSEC-2025-0141). Pulled by uniffi 0.28.x build deps;
    # only used in chio-kernel-mobile codegen, not at runtime. Migrate uniffi or accept.
    "RUSTSEC-2025-0141",
    # fxhash unmaintained (RUSTSEC-2025-0057). Pulled by fxprof-processed-profile via
    # wasmtime; clears with the wasmtime bump above (newer wasmtime drops fxhash).
    "RUSTSEC-2025-0057",
    # paste 1.0.15 unmaintained (RUSTSEC-2024-0436). Pulled transitively by alloy and
    # wasmtime. No runtime risk (proc-macro). Replace once `pastey` is widely adopted.
    "RUSTSEC-2024-0436",
    # rustls-pemfile unmaintained (RUSTSEC-2025-0134). Pull a maintained replacement
    # in the rustls bump ticket; functionality is PEM parsing, not crypto.
    "RUSTSEC-2025-0134",
    # serde_yml unsound and unmaintained (RUSTSEC-2025-0068). Migration to serde_yaml_ng
    # or hand-rolled config is tracked alongside the dep-bump batch.
    "RUSTSEC-2025-0068",
    # rand 0.8 unsound when paired with a custom logger using rng() (RUSTSEC-2026-0097).
    # We do not register a custom global logger that calls rand::rng(); risk is latent.
    # Clears with the rand-family unification ticket already noted in [bans.skip].
    "RUSTSEC-2026-0097",
    # RSA Marvin attack timing sidechannel (RUSTSEC-2023-0071). The `rsa` crate is
    # pulled transitively only; we do not perform RSA private-key operations on
    # network-observable timing paths. No upstream fix yet (tracked in rsa#19).
    "RUSTSEC-2023-0071",
]

# NOTE: the verbatim Phase 1 block had unlicensed/copyleft/allow-osi-fsf-free/default
# keys removed in cargo-deny per https://github.com/EmbarkStudios/cargo-deny/pull/611.
# The 0.16 schema enforces an explicit allow-list only; unlisted licenses are denied
# by default, copyleft licenses must be explicitly allowed (none are here), and
# OSI/FSF status is no longer a config concern. Schema deviation logged in commit body.
[licenses]
confidence-threshold = 0.93
# Workspace-wide allow-list. Strictly permissive: no GPL / AGPL / LGPL /
# EUPL or other strong copyleft, and MPL-2.0 is NOT in the global list
# (cleanup-c11c; PR #28 review threads r3142866284 / r3142870711). MPL-2.0
# is file-level (weak) copyleft - it does not infect statically-linked
# consumers - but admitting it globally would silently green-light any
# new MPL-2.0 dependency without explicit review. Instead the uniffi
# family (which is the only legitimate consumer in the graph today) is
# pinned via per-crate `[[licenses.exceptions]]` entries below; new MPL
# transitives must add a similar pinned exception.
# The prior `Unicode-DFS-2016` entry was removed because the Unicode
# consortium relicensed under `Unicode-3.0` (already allowed) and no
# remaining crate in the lockfile ships the older identifier (cargo-deny
# was emitting a `license-not-encountered` warning for it).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]

# Workspace-internal crates (notably examples/guards/{tool-gate,enriched-inspector})
# are marked `publish = false` and intentionally omit a `license` field
# because they are never distributed to crates.io. `ignore = true` here
# tells cargo-deny to skip license enforcement for those private workspace
# members. Public/published crates remain bound by the allow-list above.
# Ref: https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html#the-private-field
[licenses.private]
ignore = true

[[licenses.exceptions]]
# `ring` ships under a bespoke license that is OpenSSL-derived but not
# OSI-approved. It is the de-facto Rust crypto primitive and the rustls
# stack depends on it transitively. Tracked: ring#2746.
name = "ring"
allow = ["OpenSSL", "ISC", "MIT"]

[[licenses.exceptions]]
# `webpki-roots` (both 0.26.x and 1.x are present in the lockfile) carries
# the Mozilla CA bundle. The crate's `license` field declares
# `CDLA-Permissive-2.0` (Linux Foundation Community Data License Agreement,
# Permissive 2.0). It is OSI-permissive but uncommon, so we pin the
# exception to this crate rather than widen the workspace allow-list.
# Source: https://crates.io/crates/webpki-roots (Cargo.toml `license` field).
name = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[[licenses.exceptions]]
# `webpki-root-certs` is the sibling crate to `webpki-roots` (raw DER bytes
# instead of pre-parsed TrustAnchors). Same Mozilla bundle, same
# `CDLA-Permissive-2.0` license, same pinning rationale. Pulled transitively
# via reqwest -> rustls-platform-verifier in the alloy stack.
# Source: https://crates.io/crates/webpki-root-certs (Cargo.toml `license` field).
name = "webpki-root-certs"
allow = ["CDLA-Permissive-2.0"]

# uniffi family: weak-copyleft MPL-2.0 (cleanup-c11c). Pinned per crate
# instead of widening the global allow list. Each crate is named below
# (cargo-deny does not support glob `name` matchers for exceptions). Add
# a sibling block for any new uniffi sub-crate that lands; do not move
# MPL-2.0 back into [licenses].allow without CODEOWNERS sign-off.
[[licenses.exceptions]]
name = "uniffi"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_bindgen"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_build"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_checksum_derive"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_core"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_macros"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_meta"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_testing"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "uniffi_udl"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[[bans.deny]]
# `time` 0.1 is unmaintained and depends on a soundness-bug-prone localtime
# call. Use `time` >= 0.3 or `chrono` >= 0.4.31.
name = "time"
version = "<0.3"

[[bans.deny]]
# `openssl-sys` is forbidden in favor of rustls; `chio` must not absorb
# OpenSSL transitively. If a dep needs OpenSSL, vendor a rustls fork or
# add a documented [bans.skip] entry with CODEOWNERS sign-off.
name = "openssl-sys"

[[bans.deny]]
# `chrono` 0.4.0..=0.4.30 has a localtime soundness bug. Pin newer.
name = "chrono"
version = "<0.4.31"

[[bans.skip]]
# `windows-sys` ships v0.52 (pulled by ring, socket2, tonic) and v0.59
# (pulled by rustix/wasmtime). Cannot be flattened without forking the
# wasmtime or rustls stacks. Tracked weekly via Renovate; revisit when
# wasmtime and the rustls/ring family converge on a single major.
name = "windows-sys"

[[bans.skip]]
# `windows-targets` duplicates as a direct consequence of the windows-sys
# 0.52 vs 0.59 split above. The seven `windows_<arch>_<abi>` platform
# sub-crates (gnu/gnullvm/msvc across aarch64/i686/x86_64) also duplicate
# in lockstep but are intentionally NOT listed individually here; the
# ~8-entry skip cap is a deliberate smell threshold and listing them
# would mask the real fix (forcing an ecosystem bump on windows-sys).
# `cargo deny check bans` will continue to flag those seven; that is
# expected until the windows-sys major split resolves upstream.
name = "windows-targets"

[[bans.skip]]
# `hashbrown` resolves to 0.12 (tonic 0.12 -> tower 0.4 -> indexmap 1),
# 0.14 (wasmtime/cranelift 29.x), and 0.15/0.16 (everything else). Cannot
# unify without bumping tonic or wasmtime, both gated on separate roadmap
# items. Revisit when chio-envoy-ext-authz moves to tonic 0.13+.
name = "hashbrown"

[[bans.skip]]
# `getrandom` cascades through the `rand` family: 0.2 (rand 0.8 consumers),
# 0.3 (rand 0.9), 0.4 (rand 0.10). The rand ecosystem is mid-migration;
# pinning to a single major would force a fork of rcgen, ring, or wasmtime.
name = "getrandom"

[[bans.skip]]
# `rand` 0.8 (chio-guards/internal), 0.9 (transitive through alloy), and
# 0.10 (newer crates) coexist. Same cascade as getrandom above.
name = "rand"

[[bans.skip]]
# `syn` 1.x is documented as a known proc-macro lingerer. Currently no
# v1 instances in the lockfile (cargo-deny will emit an unmatched-skip
# warning, which is informational only). Kept as forward defense so a
# regression via a new transitive proc-macro dep does not flip the gate.
# Force-bump audit when `darling` and `serde_derive` align on `syn` 2.x.
name = "syn"
version = "1"

[[bans.skip]]
# `bitflags` 1.x is documented as historically pinned by `clap` and
# `wasmtime`. Currently no v1 instances in the lockfile (unmatched-skip
# warning is informational). Retain as forward defense; remove once we
# confirm no upstream regresses to bitflags 1.
name = "bitflags"
version = "1"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Every git dep is enumerated here with a comment naming the upstream
    # crate, the reason a registry version cannot be used, and the tracking
    # issue. Empty at baseline; new entries require CODEOWNERS review.
]
