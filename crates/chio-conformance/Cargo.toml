[package]
name = "chio-conformance"
description = "Scenario loading and report generation for Chio cross-language conformance"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = true
readme = "README.md"
keywords = ["chio", "conformance", "mcp", "agent-protocol"]
categories = ["development-tools::testing", "command-line-utilities"]
include = [
    "src/**",
    "README.md",
    "Cargo.toml",
    "tests/conformance/scenarios/**",
    "tests/conformance/peers/python/**",
    "tests/conformance/peers/js/**",
]

[lib]
name = "chio_conformance"

[[bin]]
name = "chio-conformance-report"
path = "src/bin/chio_conformance_report.rs"

[[bin]]
name = "chio-conformance-runner"
path = "src/bin/chio_conformance_runner.rs"

[[bin]]
name = "chio-native-conformance-runner"
path = "src/bin/chio_native_conformance_runner.rs"

[[bin]]
name = "chio-native-conformance-fixture"
path = "src/bin/chio_native_conformance_fixture.rs"

[features]
# Default keeps the historical in-repo behaviour: paths resolved relative to
# the workspace root point at the tests/conformance/{scenarios,peers,fixtures}
# directories that ship inside this repository. External consumers who pull
# the crate from crates.io can keep this feature on (the included fixtures
# under tests/conformance/{scenarios,peers/python,peers/js}/ ride along) or
# disable it via `--no-default-features` when wiring their own scenario
# directories through `ConformanceRunOptions`.
default = ["in-repo-fixtures"]
in-repo-fixtures = []

[dependencies]
chio-core = { package = "chio-core-types", version = "0.1.0", path = "../chio-core-types" }
chio-kernel = { version = "0.1.0", path = "../chio-kernel" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["blocking", "form", "query", "rustls"] }
tiny_http = "0.12"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
