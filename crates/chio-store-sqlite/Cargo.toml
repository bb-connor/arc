[package]
name = "chio-store-sqlite"
description = "SQLite-backed persistence, query, and report implementations for Chio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_store_sqlite"

[dependencies]
chacha20poly1305 = { workspace = true }
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
r2d2 = "0.8"
r2d2_sqlite = "0.33.0"
serde = { workspace = true }
serde_json = { workspace = true }
rusqlite = { workspace = true }
uuid = { workspace = true, features = ["v7"] }
zeroize = { version = "1.8", features = ["derive"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
