[package]
name = "pact-cli"
description = "CLI binary for the PACT runtime kernel"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "pact"
path = "src/main.rs"

[dependencies]
pact-control-plane = { path = "../pact-control-plane" }
pact-core = { path = "../pact-core" }
pact-credentials = { path = "../pact-credentials" }
pact-did = { path = "../pact-did" }
pact-hosted-mcp = { path = "../pact-hosted-mcp" }
pact-kernel = { path = "../pact-kernel" }
pact-guards = { path = "../pact-guards" }
pact-policy = { path = "../pact-policy" }
pact-mcp-adapter = { path = "../pact-mcp-adapter" }
pact-conformance = { path = "../pact-conformance" }
pact-reputation = { path = "../pact-reputation" }
pact-store-sqlite = { path = "../pact-store-sqlite" }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
thiserror = { workspace = true }
clap = { version = "4", features = ["derive"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2 = { workspace = true }
hex = { workspace = true }
tokio = { workspace = true }
axum = "0.8"
async-stream = "0.3"
url = "2"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
ureq = { version = "2.10", features = ["json"] }
serde_urlencoded = "0.7"
rusqlite = { workspace = true }
pact-siem = { path = "../pact-siem", optional = true }
tower-http = { version = "0.6", features = ["fs", "set-header"] }
chrono = { version = "0.4", features = ["clock"] }
rsa = { version = "0.9", features = ["sha2"] }
p256 = { version = "0.13", features = ["ecdsa"] }
p384 = { version = "0.13", features = ["ecdsa"] }

[features]
siem = ["pact-siem"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
