[package]
name = "pact-hosted-mcp"
description = "Hosted MCP runtime surface for PACT"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
pact-control-plane = { path = "../pact-control-plane" }
pact-core = { path = "../pact-core" }
pact-kernel = { path = "../pact-kernel" }
pact-mcp-adapter = { path = "../pact-mcp-adapter" }
pact-store-sqlite = { path = "../pact-store-sqlite" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
axum = "0.8"
async-stream = "0.3"
url = "2"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
ureq = { version = "2.10", features = ["json"] }
rusqlite = { workspace = true }
rsa = { version = "0.9", features = ["sha2"] }
p256 = { version = "0.13", features = ["ecdsa"] }
p384 = { version = "0.13", features = ["ecdsa"] }
sha2 = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
