[package]
name = "chio-guards"
description = "Security guards for the Chio runtime kernel, adapted from ClawdStrike"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_guards"

[dependencies]
chio-kernel = { path = "../chio-kernel" }
chio-core = { path = "../chio-core" }
chio-core-types = { path = "../chio-core-types" }
chio-http-session = { path = "../chio-http-session" }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
async-trait = "0.1"
rand = "0.8"
glob = "0.3"
lru = "0.16.3"
regex = "1"
base64 = { workspace = true }
zeroize = "1"

[dev-dependencies]
chio-store-sqlite = { path = "../chio-store-sqlite" }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
