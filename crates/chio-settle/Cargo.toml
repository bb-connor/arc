[package]
name = "chio-settle"
description = "Settlement runtime for Chio web3 escrow and bond execution"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_settle"

[features]
default = ["web3"]
web3 = [
    "dep:alloy-primitives",
    "dep:alloy-sol-types",
    "dep:chio-core",
    "dep:chio-credit",
    "dep:chio-web3",
    "dep:chio-web3-bindings",
    "dep:bs58",
    "dep:hex",
    "dep:reqwest",
    "dep:secp256k1",
    "dep:serde",
    "dep:serde_json",
    "dep:sha2",
    "dep:thiserror",
    "dep:tokio",
]

[dependencies]
chio-core = { path = "../chio-core", optional = true }
chio-credit = { path = "../chio-credit", optional = true }
chio-web3 = { path = "../chio-web3", optional = true }
chio-web3-bindings = { path = "../chio-web3-bindings", default-features = false, features = ["web3"], optional = true }
alloy-primitives = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
alloy-sol-types = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
bs58 = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
reqwest = { workspace = true, features = ["form", "json", "query", "rustls"], optional = true }
secp256k1 = { version = "0.31", features = ["recovery", "global-context"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[dev-dependencies]
chio-anchor = { path = "../chio-anchor" }
chio-link = { path = "../chio-link" }
chio-kernel = { path = "../chio-kernel" }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
