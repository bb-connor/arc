[package]
name = "arc-link"
description = "Oracle runtime for ARC cross-currency budget enforcement"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_link"

[dependencies]
arc-core = { package = "arc-core", path = "../arc-core" }
alloy-contract = { version = "1.7.3", default-features = false }
alloy-primitives = { version = "1.4.1", default-features = false, features = ["std"] }
alloy-provider = { version = "1.7.3", default-features = false, features = ["reqwest", "reqwest-rustls-tls"] }
alloy-sol-types = { version = "1.4.1", default-features = false, features = ["std"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
