[package]
name = "chio-a2a-adapter"
description = "Thin A2A-to-Chio adapter for agent-card discovery and SendMessage mediation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_a2a_adapter"

[dependencies]
base64 = "0.22"
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
rustls-pemfile = "2"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
ureq = { version = "2.10", features = ["json"] }
webpki-roots = "0.26"
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation. Pulled in by `fuzz/fuzz_targets/a2a_envelope_decode.rs`
# (M02.P1.T3.b) via `chio-a2a-adapter = { features = ["fuzz"] }`.
arbitrary = { version = "1", features = ["derive"], optional = true }

[features]
# Enables `chio_a2a_adapter::fuzz`, the libFuzzer entry-point module driving
# the per-envelope fan-out trust boundary (SSE stream split into events,
# every event run through both the JSON-RPC envelope decoder and the
# stream-response validator). Off by default; turned on only by the
# `chio-fuzz` standalone workspace at `../../fuzz` (see
# `fuzz/fuzz_targets/a2a_envelope_decode.rs`, M02.P1.T3.b). Production
# builds of `chio-a2a-adapter` never pull in `arbitrary` and never expose
# `fuzz` symbols.
fuzz = ["dep:arbitrary"]

[dev-dependencies]
rcgen = "0.13"
tokio = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
