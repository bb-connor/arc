// Minimal vendored copy of google.rpc.Status from
// https://github.com/googleapis/googleapis/blob/master/google/rpc/status.proto
//
// Only the fields used by envoy.service.auth.v3 are retained. Field numbers
// match the upstream definition to preserve wire compatibility.

syntax = "proto3";

package google.rpc;

import "google/protobuf/any.proto";

option cc_enable_arenas = true;
option go_package = "google.golang.org/genproto/googleapis/rpc/status;status";
option java_multiple_files = true;
option java_outer_classname = "StatusProto";
option java_package = "com.google.rpc";

// The `Status` type defines a logical error model. See the upstream
// google.rpc.Status definition for full documentation.
message Status {
  // The status code, which should be an enum value of google.rpc.Code.
  int32 code = 1;

  // A developer-facing error message, which should be in English.
  string message = 2;

  // A list of messages that carry the error details.
  repeated google.protobuf.Any details = 3;
}
