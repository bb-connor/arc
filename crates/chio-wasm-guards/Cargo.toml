[package]
name = "chio-wasm-guards"
description = "WASM guard runtime for Chio -- load and execute .wasm guard modules with fuel metering"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_wasm_guards"

[features]
default = []
# Enable the wasmtime-based runtime backend.
wasmtime-runtime = ["dep:wasmtime", "dep:wasmparser"]
# Enables `chio_wasm_guards::fuzz`, the libFuzzer entry-point module.
# Off by default; turned on only by the `chio-fuzz` standalone workspace
# at `../../fuzz`. Pulls in `wasmtime-runtime` because the
# preinstantiate-validate trust boundary lives in `ComponentBackend`
# (and adjacent core-module / format-detect helpers), which only exist
# when the wasmtime backend is compiled in. Authored under M02.P1.T4.a;
# reference: `.planning/trajectory/02-fuzzing-post-pr13.md` Phase 1.
fuzz = ["dep:arbitrary", "wasmtime-runtime"]

[dependencies]
chio-kernel = { path = "../chio-kernel" }
chio-core = { path = "../chio-core" }
chio-config = { path = "../chio-config" }
chio-guards = { path = "../chio-guards" }
ed25519-dalek = { workspace = true }
hex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yml = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
wasmparser = { version = "0.221", optional = true }
wasmtime = { version = "29", optional = true }
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation. Pulled in by
# `fuzz/fuzz_targets/wasm_preinstantiate_validate.rs` (M02.P1.T4.a) via
# `chio-wasm-guards = { features = ["fuzz"] }`.
arbitrary = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
criterion = { workspace = true }
rand_core = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
wat = "1.246"

[[bench]]
name = "wasm_guard_perf"
harness = false
required-features = ["wasmtime-runtime"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
