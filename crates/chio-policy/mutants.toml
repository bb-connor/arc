# cargo-mutants config for chio-policy (M02 P2)
#
# Anchored to .planning/trajectory/02-fuzzing-post-pr13.md, Phase 3,
# "Mutation-testing approach" + "Mutation-testing CI shape (Phase 3)".
# Decision 12: cargo-mutants pinned at 25.x; do not float.
#
# Trust-boundary modules in this crate:
#   - evaluate.rs              : top-level allow/warn/deny entry point
#   - evaluate/engine.rs       : core evaluator state machine
#   - evaluate/matchers.rs     : origin / context match logic
#   - evaluate/outcomes.rs     : decision aggregation
#   - evaluate/context.rs      : runtime context shaping
#   - compiler.rs              : HushSpec -> Chio guard compilation bridge
#   - conditions.rs            : conditional rule activation
#   - detection.rs             : regex-based content detectors
#   - merge.rs                 : extends-chain policy merge
#   - resolve.rs               : extends-chain resolver
#   - validate.rs              : schema + semantic validation
#   - regex_safety.rs          : regex DoS guard
#   - receipt.rs               : decision receipt construction
#
# Out of scope: pure data structs (models.rs), version constants, embedded
# YAML rulesets, and test fixtures.

examine_globs = [
    "src/evaluate.rs",
    "src/evaluate/engine.rs",
    "src/evaluate/matchers.rs",
    "src/evaluate/outcomes.rs",
    "src/evaluate/context.rs",
    "src/compiler.rs",
    "src/conditions.rs",
    "src/detection.rs",
    "src/merge.rs",
    "src/resolve.rs",
    "src/validate.rs",
    "src/regex_safety.rs",
    "src/receipt.rs",
]

exclude_globs = [
    "src/**/tests.rs",
    "src/**/test_*.rs",
    "src/lib.rs",
    "src/models.rs",
    "src/version.rs",
    "src/rulesets/**",
    "src/evaluate/tests.rs",
]
