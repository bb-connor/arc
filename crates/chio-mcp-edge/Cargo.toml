[package]
name = "chio-mcp-edge"
description = "MCP edge runtime and shared transport contracts for Chio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_mcp_edge"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chrono = { workspace = true, features = ["clock"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation. Pulled in by `fuzz/fuzz_targets/mcp_envelope_decode.rs`
# (M02.P1.T3.a) via `chio-mcp-edge = { features = ["fuzz"] }`.
arbitrary = { version = "1", features = ["derive"], optional = true }

[features]
otel = ["chio-kernel/otel"]
# Enables `chio_mcp_edge::fuzz`, the libFuzzer entry-point module driving
# the decode-then-evaluator-dispatch pipeline (`ChioMcpEdge::handle_jsonrpc`
# fed with bytes parsed by the adapter envelope path). Off by default;
# turned on only by the `chio-fuzz` standalone workspace at `../../fuzz`
# (see `fuzz/fuzz_targets/mcp_envelope_decode.rs`, M02.P1.T3.a). Production
# builds of `chio-mcp-edge` never pull in `arbitrary` and never expose
# `fuzz` symbols.
fuzz = ["dep:arbitrary"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
