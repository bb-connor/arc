[package]
name = "chio-credentials"
description = "Portable Chio reputation credentials and Agent Passport verification"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_credentials"

[dependencies]
chio-core = { path = "../chio-core" }
chio-did = { path = "../chio-did" }
chio-reputation = { path = "../chio-reputation" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
base64 = { workspace = true }
rand_core = { workspace = true, features = ["getrandom"] }
sha2 = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
