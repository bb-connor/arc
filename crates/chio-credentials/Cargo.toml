[package]
name = "chio-credentials"
description = "Portable Chio reputation credentials and Agent Passport verification"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_credentials"

[dependencies]
chio-core = { path = "../chio-core" }
chio-did = { path = "../chio-did" }
chio-reputation = { path = "../chio-reputation" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true, features = ["clock"] }
base64 = { workspace = true }
rand_core = { workspace = true, features = ["getrandom"] }
sha2 = { workspace = true }
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation. Pulled in by `fuzz/fuzz_targets/jwt_vc_verify.rs`
# (M02.P1.T1.a) via `chio-credentials = { features = ["fuzz"] }`.
arbitrary = { version = "1", features = ["derive"], optional = true }

[features]
# Enables `chio_credentials::fuzz`, the libFuzzer entry-point module.
# Off by default; turned on only by the `chio-fuzz` standalone workspace.
fuzz = ["dep:arbitrary"]

[dev-dependencies]
proptest = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
