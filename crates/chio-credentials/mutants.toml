# cargo-mutants config for chio-credentials (M02 P2)
#
# Anchored to .planning/trajectory/02-fuzzing-post-pr13.md, Phase 3,
# "Mutation-testing approach" + "Mutation-testing CI shape (Phase 3)".
# Decision 12: cargo-mutants pinned at 25.x; do not float.
#
# Trust-boundary modules in this crate:
#   - portable_jwt_vc.rs       : JWT VC sign/verify (Ed25519, JOSE-shaped)
#   - portable_sd_jwt.rs       : SD-JWT VC verify
#   - portable_reputation.rs   : portable reputation credential verify
#   - oid4vci.rs               : OID4VCI issuance flow
#   - oid4vp.rs                : OID4VP presentation flow + verifier
#   - presentation.rs          : passport presentation construction / verify
#   - challenge.rs             : presentation challenge nonce / binding
#   - cross_issuer.rs          : cross-issuer trust pack + portfolio eval
#   - registry.rs              : issuer / trust-anchor registry checks
#   - discovery.rs             : metadata discovery (OID4VCI / OID4VP)
#   - artifact.rs              : credential artifact normalization
#   - passport.rs              : agent passport verifier glue
#   - policy.rs                : credential-side policy intersection
#   - trust_tier.rs            : trust-tier synthesis from scorecard
#
# Out of scope: lib.rs (re-exports, constants), fuzz.rs (libFuzzer entry
# points, covered by M02 P1 lane), tests.rs.

examine_globs = [
    "src/portable_jwt_vc.rs",
    "src/portable_sd_jwt.rs",
    "src/portable_reputation.rs",
    "src/oid4vci.rs",
    "src/oid4vp.rs",
    "src/presentation.rs",
    "src/challenge.rs",
    "src/cross_issuer.rs",
    "src/registry.rs",
    "src/discovery.rs",
    "src/artifact.rs",
    "src/passport.rs",
    "src/policy.rs",
    "src/trust_tier.rs",
]

exclude_globs = [
    "src/**/tests.rs",
    "src/**/test_*.rs",
    "src/lib.rs",
    "src/fuzz.rs",
]
