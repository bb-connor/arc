[package]
name = "arc-openai-adapter"
description = "Intercepts OpenAI-style tool_use / function-calling requests through ARC kernel with signed receipts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "arc_openai"

[dependencies]
arc-core = { package = "arc-core-types", path = "../arc-core-types" }
arc-cross-protocol = { package = "arc-cross-protocol", path = "../arc-cross-protocol" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
arc-manifest = { package = "arc-manifest", path = "../arc-manifest" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
