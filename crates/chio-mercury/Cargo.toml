[package]
name = "chio-mercury"
description = "MERCURY product app CLI built on Chio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
default-run = "mercury"
autobins = false
publish = false

[[bin]]
name = "mercury"
path = "src/main.rs"

[dependencies]
chio-control-plane = { path = "../chio-control-plane" }
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
chio-mercury-core = { path = "../chio-mercury-core" }
chio-store-sqlite = { path = "../chio-store-sqlite" }
chrono = { workspace = true }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
