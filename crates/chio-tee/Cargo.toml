[package]
name = "chio-tee"
description = "Chio TEE shadow runner: replays kernel decisions inside a TEE for attestation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_tee"

[[bin]]
name = "chio-tee"
path = "src/main.rs"

[dependencies]
chio-tee-frame = { path = "../chio-tee-frame" }
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
# M10.P1.T4: mode resolver + SIGUSR1 hot-toggle.
arc-swap = { workspace = true }
toml = "0.8"

[target.'cfg(unix)'.dependencies]
# Signal handling for SIGUSR1 hot-toggle. Linux/BSD/macOS only; the toggle
# path is RPC-only on Windows.
signal-hook = "0.3"

[dev-dependencies]
tempfile = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
