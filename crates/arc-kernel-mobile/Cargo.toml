[package]
name = "arc-kernel-mobile"
description = "Mobile FFI bindings (iOS / Android) for the portable ARC kernel core via UniFFI"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_kernel_mobile"
# `staticlib` is the artifact that Xcode links into an iOS app (via
# `libarc_kernel_mobile.a`). `cdylib` is the artifact that Android's NDK
# loads at runtime (via `libarc_kernel_mobile.so`). UniFFI drives both
# bindings from the same compiled artifact; the scaffolding generated by
# `build.rs` is a thin `extern "C"` shim over the public Rust API in
# `src/lib.rs`.
crate-type = ["staticlib", "cdylib", "rlib"]

# Phase 14.3 mobile FFI adapter.
#
# This crate wraps `arc-kernel-core`'s pure-compute entry points in an
# ergonomic Rust surface, then emits UniFFI scaffolding so Swift (iOS) and
# Kotlin (Android) consumers can call the kernel synchronously from an
# app process with no IPC boundary. Every FFI entry point is JSON-in /
# JSON-out so we do not have to reproduce the full ARC type graph in UDL.
[dependencies]
arc-kernel-core = { path = "../arc-kernel-core" }
# arc-core-types is pulled with default features because mobile targets
# always have the `std` runtime available; the portable subset lives in
# arc-kernel-core and we just wrap it.
arc-core-types = { path = "../arc-core-types" }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
# UniFFI ties the FFI scaffolding + bindings generator to the crate:
# `build.rs` calls `uniffi::generate_scaffolding`, and `uniffi-bindgen`
# (installed separately on the operator's machine) reads the UDL to emit
# Swift / Kotlin glue code. See `bindings/README.md` for workflow.
uniffi = { version = "0.28", features = ["cli"] }
# `getrandom` is the cross-platform entropy bridge the `MobileRng` impl
# delegates to. On iOS it routes to `SecRandomCopyBytes`; on Android it
# routes to `/dev/urandom`. No `js` feature is needed: this crate never
# targets wasm32.
getrandom = "0.2"

[build-dependencies]
# `uniffi::generate_scaffolding` in `build.rs` produces the extern-C shim
# that the `include_scaffolding!` macro slots into the crate at compile
# time. The `build` feature gates access to that helper.
uniffi = { version = "0.28", features = ["build"] }

[dev-dependencies]
# Round-trip helpers for the Rust-side FFI tests. These mirror the types
# that `uniffi-bindgen`-generated Swift/Kotlin code would marshal over
# the C ABI, so we can exercise the full surface without spinning up
# an iOS simulator or Android emulator in CI.
arc-kernel-core = { path = "../arc-kernel-core" }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
