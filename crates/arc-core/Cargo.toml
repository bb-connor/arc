[package]
name = "arc-core"
description = "Core types for the ARC (Attested Rights Channel) protocol"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "arc_core"

[[bench]]
