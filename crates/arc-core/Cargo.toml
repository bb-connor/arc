harness = false

[dependencies]
arc-appraisal = { path = "../arc-appraisal" }
arc-autonomy = { path = "../arc-autonomy" }
arc-core-types = { path = "../arc-core-types" }
arc-credit = { path = "../arc-credit" }
arc-federation = { path = "../arc-federation" }
arc-governance = { path = "../arc-governance" }
arc-listing = { path = "../arc-listing" }
arc-market = { path = "../arc-market" }
arc-open-market = { path = "../arc-open-market" }
arc-underwriting = { path = "../arc-underwriting" }
arc-web3 = { path = "../arc-web3" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
ed25519-dalek = { workspace = true }
rand_core = { workspace = true }
hex = { workspace = true }
ryu = { workspace = true }
sha2 = { workspace = true }
percent-encoding = "2"
url = "2"

[dev-dependencies]
serde_json = { workspace = true }
proptest = { workspace = true }
criterion = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
