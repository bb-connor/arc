[package]
name = "arc-hosted-mcp"
description = "Hosted MCP runtime surface for ARC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_hosted_mcp"

[dependencies]
arc-control-plane = { package = "arc-control-plane", path = "../arc-control-plane" }
arc-core = { package = "arc-core", path = "../arc-core" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
arc-mcp-adapter = { package = "arc-mcp-adapter", path = "../arc-mcp-adapter" }
arc-store-sqlite = { package = "arc-store-sqlite", path = "../arc-store-sqlite" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
axum = "0.8"
async-stream = "0.3"
url = "2"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
ureq = { version = "2.10", features = ["json"] }
rusqlite = { workspace = true }
rsa = { version = "0.9", features = ["sha2"] }
p256 = { version = "0.13", features = ["ecdsa"] }
p384 = { version = "0.13", features = ["ecdsa"] }
sha2 = { workspace = true }

[dev-dependencies]
arc-siem = { package = "arc-siem", path = "../arc-siem" }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
