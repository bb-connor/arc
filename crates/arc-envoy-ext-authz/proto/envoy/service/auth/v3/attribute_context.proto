// Minimal vendored copy of envoy.service.auth.v3.AttributeContext from
// https://github.com/envoyproxy/envoy/blob/main/api/envoy/service/auth/v3/attribute_context.proto
//
// Only the nested messages and fields that the ARC adapter consumes are
// retained. Field numbers match the upstream definition so on-the-wire
// compatibility with Envoy is preserved.

syntax = "proto3";

package envoy.service.auth.v3;

import "envoy/config/core/v3/base.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option java_package = "io.envoyproxy.envoy.service.auth.v3";
option java_outer_classname = "AttributeContextProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/service/auth/v3;authv3";

// An attribute is a piece of metadata that describes an activity on a network.
message AttributeContext {
  // Represents an identified network endpoint.
  message Peer {
    // The network address of the peer. Opaque to the ARC adapter so we leave
    // it unset in tests and forward-compatible in production.
    google.protobuf.Struct address = 1;

    // The canonical service name of the peer.
    string service = 2;

    // Arbitrary label-style metadata attached to the peer.
    map<string, string> labels = 3;

    // Principal is the SPIFFE URI or other peer identity expression.
    string principal = 4;

    // The IP version the connection was sourced from.
    string certificate = 5;
  }

  // Represents a network request.
  message Request {
    // The timestamp when the proxy received the request.
    google.protobuf.Timestamp time = 1;

    // The HTTP sub-message describing the request.
    HttpRequest http = 2;
  }

  // HTTP request attributes.
  message HttpRequest {
    // The unique ID for the request.
    string id = 1;

    // The HTTP method (uppercase: GET, POST, ...).
    string method = 2;

    // HTTP request headers. Keys are lowercased by Envoy.
    map<string, string> headers = 3;

    // The request path, including any query string.
    string path = 4;

    // The HTTP request host (authority).
    string host = 5;

    // The HTTP request scheme (http/https).
    string scheme = 6;

    // The HTTP request query string (excludes the leading `?`).
    string query = 7;

    // The HTTP request fragment (excludes the leading `#`).
    string fragment = 8;

    // The size of the request body in bytes.
    int64 size = 9;

    // The HTTP protocol (HTTP/1.1, HTTP/2, etc.).
    string protocol = 10;

    // The HTTP request body (UTF-8 safe subset).
    string body = 11;

    // The HTTP request body as raw bytes. Used when `body` cannot be UTF-8
    // encoded (for example when the operator configured `pack_as_bytes`).
    bytes raw_body = 12;
  }

  // The source of the network activity, usually a caller of some kind.
  Peer source = 1;

  // The destination of the network activity.
  Peer destination = 2;

  // Represents a network request, such as an HTTP request.
  Request request = 3;

  // Represents request context from the proxy. Opaque in the ARC adapter.
  map<string, string> context_extensions = 10;

  // Dynamic metadata associated with the request. Opaque in the ARC adapter.
  envoy.config.core.v3.Metadata metadata_context = 11;

  // The TLS session attributes for the upstream peer.
  envoy.config.core.v3.Metadata route_metadata_context = 13;
}
