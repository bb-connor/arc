[package]
name = "chio-acp-proxy"
description = "ACP security proxy that enforces Chio capability-based access control on ACP agent sessions"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_acp_proxy"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
