[package]
name = "arc-mcp-adapter"
description = "Adapter that wraps MCP servers as ARC tool servers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_mcp_adapter"

[dependencies]
arc-core = { package = "arc-core", path = "../arc-core" }
arc-mcp-edge = { package = "arc-mcp-edge", path = "../arc-mcp-edge" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
arc-manifest = { package = "arc-manifest", path = "../arc-manifest" }
chrono = { version = "0.4", features = ["clock"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
