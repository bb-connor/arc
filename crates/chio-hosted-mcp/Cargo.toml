[package]
name = "chio-hosted-mcp"
description = "Hosted MCP runtime surface for Chio"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_hosted_mcp"

[dependencies]
chio-control-plane = { path = "../chio-control-plane" }
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
chio-mcp-adapter = { path = "../chio-mcp-adapter" }
chio-store-sqlite = { path = "../chio-store-sqlite" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
axum = "0.8"
async-stream = "0.3"
url = "2"
base64 = "0.22"
reqwest = { workspace = true, features = ["blocking", "form", "json", "query", "rustls"] }
ureq = { version = "2.10", features = ["json"] }
rusqlite = { workspace = true }
rsa = { version = "0.9", features = ["sha2"] }
p256 = { version = "0.13", features = ["ecdsa"] }
p384 = { version = "0.13", features = ["ecdsa"] }
sha2 = { workspace = true }
subtle = "2.6"

[dev-dependencies]
chio-siem = { path = "../chio-siem" }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
