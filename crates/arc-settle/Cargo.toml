[package]
name = "arc-settle"
description = "Settlement runtime for ARC web3 escrow and bond execution"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_settle"

[features]
default = ["web3"]
web3 = [
    "dep:alloy-primitives",
    "dep:alloy-sol-types",
    "dep:arc-core",
    "dep:arc-credit",
    "dep:arc-web3",
    "dep:arc-web3-bindings",
    "dep:bs58",
    "dep:hex",
    "dep:reqwest",
    "dep:secp256k1",
    "dep:serde",
    "dep:serde_json",
    "dep:sha2",
    "dep:thiserror",
    "dep:tokio",
]

[dependencies]
arc-core = { package = "arc-core", path = "../arc-core", optional = true }
arc-credit = { package = "arc-credit", path = "../arc-credit", optional = true }
arc-web3 = { package = "arc-web3", path = "../arc-web3", optional = true }
arc-web3-bindings = { package = "arc-web3-bindings", path = "../arc-web3-bindings", default-features = false, features = ["web3"], optional = true }
alloy-primitives = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
alloy-sol-types = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
bs58 = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
reqwest = { workspace = true, features = ["form", "json", "query", "rustls"], optional = true }
secp256k1 = { version = "0.31", features = ["recovery", "global-context"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

[dev-dependencies]
arc-anchor = { package = "arc-anchor", path = "../arc-anchor" }
arc-link = { package = "arc-link", path = "../arc-link" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
