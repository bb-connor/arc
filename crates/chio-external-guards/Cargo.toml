[package]
name = "chio-external-guards"
description = "HTTP-backed external guard adapters for Chio guard pipelines"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_external_guards"

[dependencies]
chio-guards = { path = "../chio-guards" }
chio-core-types = { path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
async-trait = "0.1"
base64 = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
zeroize = "1"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
wiremock = "0.6"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
