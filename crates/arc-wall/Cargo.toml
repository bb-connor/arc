[package]
name = "arc-wall"
description = "ARC-Wall companion-product CLI built on ARC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
default-run = "arc-wall"
autobins = false

[[bin]]
name = "arc-wall"
path = "src/main.rs"

[dependencies]
arc-control-plane = { package = "arc-control-plane", path = "../arc-control-plane" }
arc-core = { package = "arc-core", path = "../arc-core" }
arc-guards = { package = "arc-guards", path = "../arc-guards" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
arc-store-sqlite = { package = "arc-store-sqlite", path = "../arc-store-sqlite" }
arc-wall-core = { package = "arc-wall-core", path = "../arc-wall-core" }
chrono = { workspace = true }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
arc-siem = { package = "arc-siem", path = "../arc-siem" }
tokio = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
