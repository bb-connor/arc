[package]
name = "chio-guard-registry"
description = "Chio guard OCI registry client scaffold"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_guard_registry"

[dependencies]
chio-attest-verify = { path = "../chio-attest-verify" }
oci-distribution = { version = "0.11", default-features = false, features = ["rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
sha2 = { workspace = true }
tempfile = { workspace = true }
testcontainers = { workspace = true }
tokio = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
