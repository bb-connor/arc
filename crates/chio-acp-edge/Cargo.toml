[package]
name = "chio-acp-edge"
description = "ACP edge crate that exposes Chio tools as ACP capabilities with BridgeFidelity assessment"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_acp_edge"

[features]
default = []
compatibility-surface = []

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chio-mcp-edge = { path = "../chio-mcp-edge" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
