[package]
name = "chio-acp-edge"
description = "ACP edge crate that exposes Chio tools as ACP capabilities with BridgeFidelity assessment"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_acp_edge"

[features]
default = []
compatibility-surface = []
# Enables `chio_acp_edge::fuzz`, the libFuzzer entry-point module driving
# the decode-then-handle_jsonrpc pipeline. Off by default; turned on only
# by the `chio-fuzz` standalone workspace at `../../fuzz`. Production builds
# never pull in `arbitrary` and never expose `fuzz` symbols.
fuzz = ["dep:arbitrary"]

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chio-mcp-edge = { path = "../chio-mcp-edge" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation.
arbitrary = { version = "1", features = ["derive"], optional = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
