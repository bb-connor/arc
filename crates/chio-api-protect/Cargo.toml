[package]
name = "chio-api-protect"
description = "Zero-code reverse proxy that protects HTTP APIs with Chio receipts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_api_protect"

[dependencies]
chio-core-types = { path = "../chio-core-types" }
chio-http-core = { path = "../chio-http-core" }
chio-kernel = { path = "../chio-kernel" }
chio-openapi = { path = "../chio-openapi" }
chio-store-sqlite = { path = "../chio-store-sqlite" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
uuid = { workspace = true, features = ["v7"] }
tracing = { workspace = true }
url = { workspace = true }
axum = "0.8"
hyper = { version = "1", features = ["full"] }
rusqlite = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tower = { version = "0.5", features = ["util"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
