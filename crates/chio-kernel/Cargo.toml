[package]
name = "chio-kernel"
description = "Chio runtime kernel: capability validation, guard evaluation, receipt signing"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_kernel"

[dependencies]
chio-appraisal = { path = "../chio-appraisal" }
chio-core = { path = "../chio-core" }
chio-core-types = { path = "../chio-core-types" }
chio-kernel-core = { path = "../chio-kernel-core" }
chio-credit = { path = "../chio-credit" }
chio-federation = { path = "../chio-federation" }
chio-governance = { path = "../chio-governance" }
chio-link = { path = "../chio-link", default-features = false }
chio-tool-call-fabric = { path = "../chio-tool-call-fabric" }
lru = "0.16.3"
chio-listing = { path = "../chio-listing" }
chio-market = { path = "../chio-market" }
chio-open-market = { path = "../chio-open-market" }
regex = "1"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
rusqlite = { workspace = true }
chio-underwriting = { path = "../chio-underwriting" }
uuid = { workspace = true, features = ["v7"] }
ureq = { version = "2.10", features = ["json"] }

[dev-dependencies]
chio-store-sqlite = { path = "../chio-store-sqlite" }
criterion = { workspace = true }
proptest = { workspace = true }

[[bench]]
name = "cap_verify_ed25519"
harness = false

[[bench]]
name = "scope_match"
harness = false

[[bench]]
name = "time_bound"
harness = false

[[bench]]
name = "revocation_lookup"
harness = false

[[bench]]
name = "budget_decrement"
harness = false

[[bench]]
name = "single_guard"
harness = false

[[bench]]
name = "guard_pipeline_5"
harness = false

[[bench]]
name = "receipt_sign"
harness = false

[[bench]]
name = "receipt_append"
harness = false

[[bench]]
name = "session_lookup"
harness = false

[[bench]]
name = "dispatch_allow"
harness = false

[[bench]]
name = "dispatch_deny"
harness = false

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
