[package]
name = "arc-kernel"
description = "ARC runtime kernel: capability validation, guard evaluation, receipt signing"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "arc_kernel"

[dependencies]
arc-appraisal = { package = "arc-appraisal", path = "../arc-appraisal" }
arc-core = { package = "arc-core", path = "../arc-core" }
arc-core-types = { package = "arc-core-types", path = "../arc-core-types" }
arc-kernel-core = { package = "arc-kernel-core", path = "../arc-kernel-core" }
arc-credit = { package = "arc-credit", path = "../arc-credit" }
arc-federation = { package = "arc-federation", path = "../arc-federation" }
arc-governance = { package = "arc-governance", path = "../arc-governance" }
arc-link = { package = "arc-link", path = "../arc-link", default-features = false }
lru = "0.16.3"
arc-listing = { package = "arc-listing", path = "../arc-listing" }
arc-market = { package = "arc-market", path = "../arc-market" }
arc-open-market = { package = "arc-open-market", path = "../arc-open-market" }
regex = "1"
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
rusqlite = { workspace = true }
arc-underwriting = { package = "arc-underwriting", path = "../arc-underwriting" }
uuid = { workspace = true, features = ["v7"] }
ureq = { version = "2.10", features = ["json"] }

[dev-dependencies]
arc-store-sqlite = { package = "arc-store-sqlite", path = "../arc-store-sqlite" }
proptest = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
