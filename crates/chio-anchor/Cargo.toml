[package]
name = "chio-anchor"
description = "Anchoring runtime and proof normalization for Chio checkpoints"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_anchor"

[features]
default = ["web3"]
web3 = [
    "dep:alloy-primitives",
    "dep:alloy-sol-types",
    "dep:chio-core",
    "dep:chio-kernel",
    "dep:chio-web3",
    "dep:chio-web3-bindings",
    "dep:base64",
    "dep:hex",
    "dep:opentimestamps",
    "dep:reqwest",
    "dep:serde",
    "dep:serde_json",
    "dep:thiserror",
]
# Enables `chio_anchor::fuzz`, the libFuzzer entry-point module driving
# `verify_proof_bundle` and `verify_checkpoint_publication_records`. Off by
# default; turned on only by the `chio-fuzz` standalone workspace at
# `../../fuzz` (see `fuzz/fuzz_targets/anchor_bundle_verify.rs`, M02.P1.T2).
# Production builds of `chio-anchor` never pull in `arbitrary` and never
# expose `fuzz` symbols. The `fuzz` feature implies `web3` because the
# verifier surface lives behind that gate.
fuzz = ["web3", "dep:arbitrary"]

[dependencies]
chio-core = { path = "../chio-core", optional = true }
chio-kernel = { path = "../chio-kernel", optional = true }
chio-web3 = { path = "../chio-web3", optional = true }
chio-web3-bindings = { path = "../chio-web3-bindings", default-features = false, features = ["web3"], optional = true }
alloy-primitives = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
alloy-sol-types = { version = "1.5.7", default-features = false, features = ["std"], optional = true }
base64 = { workspace = true, optional = true }
hex = { workspace = true, optional = true }
opentimestamps = { version = "0.2.0", optional = true }
reqwest = { workspace = true, features = ["form", "json", "query", "rustls"], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
# Pulled in by `fuzz/fuzz_targets/anchor_bundle_verify.rs` (M02.P1.T2) via
# `chio-anchor = { features = ["fuzz"] }`. Production builds never see it
# because the `fuzz` feature is off by default.
arbitrary = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
tokio = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
