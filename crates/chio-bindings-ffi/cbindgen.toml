language = "C"
include_guard = "CHIO_FFI_H"
pragma_once = true
cpp_compat = true
autogen_warning = "/* Generated by cbindgen from crates/chio-bindings-ffi. Do not edit generated copies by hand. */"
documentation = true
style = "type"
usize_is_size_t = true

[export]
include = [
  "ChioFfiBuffer",
  "ChioFfiResult",
  "CHIO_FFI_ABI_VERSION",
  "CHIO_FFI_NO_MAX_DELEGATION_DEPTH",
  "CHIO_FFI_STATUS_OK",
  "CHIO_FFI_STATUS_ERROR",
  "CHIO_FFI_STATUS_PANIC",
  "CHIO_FFI_STATUS_NULL_ARGUMENT",
  "CHIO_FFI_ERROR_NONE",
  "CHIO_FFI_ERROR_INVALID_PUBLIC_KEY",
  "CHIO_FFI_ERROR_INVALID_HEX",
  "CHIO_FFI_ERROR_INVALID_SIGNATURE",
  "CHIO_FFI_ERROR_JSON",
  "CHIO_FFI_ERROR_CANONICAL_JSON",
  "CHIO_FFI_ERROR_CAPABILITY_EXPIRED",
  "CHIO_FFI_ERROR_CAPABILITY_NOT_YET_VALID",
  "CHIO_FFI_ERROR_CAPABILITY_REVOKED",
  "CHIO_FFI_ERROR_DELEGATION_CHAIN_BROKEN",
  "CHIO_FFI_ERROR_ATTENUATION_VIOLATION",
  "CHIO_FFI_ERROR_SCOPE_MISMATCH",
  "CHIO_FFI_ERROR_SIGNATURE_VERIFICATION_FAILED",
  "CHIO_FFI_ERROR_DELEGATION_DEPTH_EXCEEDED",
  "CHIO_FFI_ERROR_INVALID_HASH_LENGTH",
  "CHIO_FFI_ERROR_MERKLE_PROOF_FAILED",
  "CHIO_FFI_ERROR_EMPTY_TREE",
  "CHIO_FFI_ERROR_INVALID_PROOF_INDEX",
  "CHIO_FFI_ERROR_EMPTY_MANIFEST",
  "CHIO_FFI_ERROR_DUPLICATE_TOOL_NAME",
  "CHIO_FFI_ERROR_UNSUPPORTED_SCHEMA",
  "CHIO_FFI_ERROR_MANIFEST_VERIFICATION_FAILED",
  "CHIO_FFI_ERROR_DUPLICATE_SERVER_TOOL",
  "CHIO_FFI_ERROR_INTERNAL",
]
