[package]
name = "pact-conformance"
description = "Scenario loading and report generation for PACT cross-language conformance"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[[bin]]
name = "pact-conformance-report"
path = "src/bin/pact_conformance_report.rs"

[[bin]]
name = "pact-conformance-runner"
path = "src/bin/pact_conformance_runner.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
