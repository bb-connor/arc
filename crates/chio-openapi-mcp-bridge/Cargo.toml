[package]
name = "chio-openapi-mcp-bridge"
description = "Bridge that exposes Chio-governed HTTP APIs as MCP tool surfaces via OpenAPI spec"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_openapi_mcp_bridge"

[features]
default = []
# Enables `chio_openapi_mcp_bridge::fuzz`, the libFuzzer entry-point
# module. Off by default; turned on only by the `chio-fuzz` standalone
# workspace at `../../fuzz`. Authored under M02.P1.T5.b; reference:
# `.planning/trajectory/02-fuzzing-post-pr13.md` Phase 1.
fuzz = ["dep:arbitrary"]

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chio-mcp-edge = { path = "../chio-mcp-edge" }
chio-openapi = { path = "../chio-openapi" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
arbitrary = { version = "1", features = ["derive"], optional = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
