[package]
name = "chio-mcp-adapter"
description = "Adapter that wraps MCP servers as Chio tool servers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_mcp_adapter"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-mcp-edge = { path = "../chio-mcp-edge" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chrono = { version = "0.4", features = ["clock"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
# `arbitrary` is gated behind the `fuzz` feature so production builds stay
# free of fuzz instrumentation. Pulled in by `fuzz/fuzz_targets/mcp_envelope_decode.rs`
# (M02.P1.T3.a) via `chio-mcp-adapter = { features = ["fuzz"] }`.
arbitrary = { version = "1", features = ["derive"], optional = true }

[features]
# Enables `chio_mcp_adapter::fuzz`, the libFuzzer entry-point module driving
# the MCP envelope (newline-delimited JSON-RPC) parse path the adapter uses
# to read messages from upstream MCP servers. Off by default; turned on only
# by the `chio-fuzz` standalone workspace at `../../fuzz` (see
# `fuzz/fuzz_targets/mcp_envelope_decode.rs`, M02.P1.T3.a). Production
# builds of `chio-mcp-adapter` never pull in `arbitrary` and never expose
# `fuzz` symbols.
fuzz = ["dep:arbitrary"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
