[package]
name = "chio-mcp-adapter"
description = "Adapter that wraps MCP servers as Chio tool servers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
publish = false

[lib]
name = "chio_mcp_adapter"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-mcp-edge = { path = "../chio-mcp-edge" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chrono = { version = "0.4", features = ["clock"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
