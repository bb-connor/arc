[package]
name = "arc-store-sqlite"
description = "SQLite-backed persistence, query, and report implementations for ARC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "arc_store_sqlite"

[dependencies]
arc-core = { package = "arc-core-types", path = "../arc-core-types" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
r2d2 = "0.8"
r2d2_sqlite = "0.33.0"
serde = { workspace = true }
serde_json = { workspace = true }
rusqlite = { workspace = true }
uuid = { workspace = true, features = ["v7"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
