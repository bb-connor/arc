[package]
name = "chio-openai-adapter"
description = "Intercepts OpenAI-style tool_use / function-calling requests through Chio kernel with signed receipts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_openai"

[package.metadata.chio]
# OpenAI Responses API snapshot pin. Bumping this is a deliberate PR with a
# fixture re-record. Source: https://platform.openai.com/docs/api-reference/responses
openai_responses_api_snapshot = "2026-04-25"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
chio-tool-call-fabric = { path = "../chio-tool-call-fabric", optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[features]
# Default features keep the existing public surface compiling unchanged.
default = []

# `provider-adapter` opts the crate into the M07 ProviderAdapter surface
# (lift/lower into the chio-tool-call-fabric ToolInvocation shape). The
# implementation lands incrementally:
#   - M07.P2.T1 (this ticket) wires the feature flag and the optional
#     chio-tool-call-fabric dependency. No public adapter API yet.
#   - M07.P2.T2 lands `ProviderAdapter::lift` for batch `responses.create`.
#   - M07.P2.T3 lands `ProviderAdapter::lower` including the deny-synthetic
#     `tool_outputs` path.
#   - M07.P2.T4 (split T4.a + T4.b) lands SSE streaming with the fabric
#     `StreamPhase` state machine and verdict-at-tool-use-block enforcement.
# Pinned to OpenAI Responses API snapshot 2026-04-25 (see package.metadata).
provider-adapter = ["dep:chio-tool-call-fabric"]

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
