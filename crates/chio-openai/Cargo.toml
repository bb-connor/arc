[package]
name = "chio-openai-adapter"
description = "Intercepts OpenAI-style tool_use / function-calling requests through Chio kernel with signed receipts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lib]
name = "chio_openai"

[dependencies]
chio-core = { package = "chio-core-types", path = "../chio-core-types" }
chio-cross-protocol = { path = "../chio-cross-protocol" }
chio-kernel = { path = "../chio-kernel" }
chio-manifest = { path = "../chio-manifest" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
