[package]
name = "arc-mercury"
description = "MERCURY product app CLI built on ARC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
default-run = "mercury"
autobins = false

[[bin]]
name = "mercury"
path = "src/main.rs"

[dependencies]
arc-control-plane = { package = "arc-control-plane", path = "../arc-control-plane" }
arc-core = { package = "arc-core-types", path = "../arc-core-types" }
arc-kernel = { package = "arc-kernel", path = "../arc-kernel" }
arc-mercury-core = { package = "arc-mercury-core", path = "../arc-mercury-core" }
arc-store-sqlite = { package = "arc-store-sqlite", path = "../arc-store-sqlite" }
chrono = { workspace = true }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true }
serde_json = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
