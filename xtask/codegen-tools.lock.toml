# Pinned codegen toolchain for the Chio four-language pipeline.
#
# These pins are deliberate. Bumping any of them is spec-affecting and must
# land in a single PR alongside regenerated bytes for every language so the
# spec-drift workflow stays green.
#
# Format: each `[<language>]` table records the primary tool, its exact
# version, and the file or workflow that consumes the pin. Verification is
# performed at runtime by the `cargo xtask codegen` dispatcher.

schema_version = 1

[rust]
tool = "typify"
version = "0.4.3"
# Pinned via Cargo's `=` requirement in crates/chio-spec-codegen/Cargo.toml.
consumed_by = "crates/chio-spec-codegen/Cargo.toml"
notes = """
typify is invoked in-process from the chio-spec-codegen library. Version
0.4.3 is the floor that supports schemars 0.8 RootSchema parsing of the
chio-wire/v1 schema set (28 files).
"""

[python]
tool = "datamodel-code-generator"
version = "0.34.0"
# Will be installed by sdks/python/scripts/codegen-requirements.txt.
# The xtask invokes the CLI via `uv run`.
consumed_by = "sdks/python/scripts/codegen-requirements.txt"
notes = """
Pydantic v2 mode.
"""

[typescript]
tool = "json-schema-to-typescript"
version = "15.0.4"
# Installed via sdks/typescript/scripts/package.json. The xtask invokes the
# tool directly via node_modules/.bin/json2ts so the cargo wrapper does not
# depend on `npx` resolution.
consumed_by = "sdks/typescript/scripts/package.json"
notes = """
Emits one TS chunk per schema; the xtask wraps each chunk in a `namespace`
keyed by `<group>_<stem>` so cross-schema name collisions are scoped. The
concatenated bytes land at
sdks/typescript/packages/conformance/src/_generated/index.ts and the file
header carries a sha256 of the schema-set inputs for audit.
"""

[go]
tool = "oapi-codegen"
version = "2.4.1"
# Checked-in regen pattern (script + committed output). The xtask shells out
# to `bash sdks/go/chio-go-http/scripts/regen-types.sh`.
consumed_by = "sdks/go/chio-go-http/scripts/regen-types.sh"
runtime_dep = "github.com/oapi-codegen/runtime"
runtime_dep_version = "1.2.0"
notes = """
Go is a checked-in regen rather than a live pipeline target so we avoid
adding a Go toolchain to the standard developer image; CI installs it on
demand via the regen-types.sh script. The generated file imports
github.com/oapi-codegen/runtime for union helper types (oneOf members);
runtime v1.2.0 targets go 1.20+ and keeps the chio-go-http module's
`go 1.21` directive valid. Bumping to v1.3.x requires bumping the go
directive to 1.24.
"""
