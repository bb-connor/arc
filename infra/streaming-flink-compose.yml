# Local Redpanda stack for chio-streaming Kafka and Flink integration tests.
#
# Brought up by `sdks/python/chio-streaming/Makefile`'s
# `infra-flink-up` / `test-integration-flink` targets. Ports are
# offset from defaults so this stack coexists with the Redis + NATS
# `infra/streaming-compose.yml` stack and any host-side Kafka that
# may already be running.
#
# Usage (manual):
#   docker compose -f infra/streaming-flink-compose.yml up -d --wait
#   CHIO_INTEGRATION=1 \
#     CHIO_TEST_KAFKA_BOOTSTRAP=localhost:19092 \
#     uv run pytest sdks/python/chio-streaming/tests/integration -v
#   docker compose -f infra/streaming-flink-compose.yml down -v
#
# The Flink integration test (`test_flink_kafka_integration.py`) runs
# PyFlink in-process via `LocalStreamEnvironment`, so no dockerised
# JobManager / TaskManager is required. A real Flink cluster would also
# force a Python version match between host and container, which is
# brittle for CI; submitting jobs to a remote JM is out of scope here.

name: chio-streaming-flink-it

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: chio-streaming-flink-it-redpanda
    command:
      - "redpanda"
      - "start"
      - "--mode"
      - "dev-container"
      - "--smp"
      - "1"
      - "--reserve-memory"
      - "0M"
      - "--overprovisioned"
      - "--node-id"
      - "0"
      - "--check=false"
      # Two listeners: one for in-cluster (kafka-internal:9092) and one
      # for host access (localhost:19092). Redpanda needs the advertised
      # listener to match what clients connect via or producer metadata
      # gets confused.
      - "--kafka-addr"
      - "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092"
      - "--advertise-kafka-addr"
      - "INTERNAL://redpanda:9092,EXTERNAL://localhost:19092"
      - "--rpc-addr"
      - "0.0.0.0:33145"
      - "--advertise-rpc-addr"
      - "redpanda:33145"
    ports:
      - "19092:19092"   # kafka API for host
      - "19644:9644"    # admin API for host
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 3s
      timeout: 5s
      retries: 30
