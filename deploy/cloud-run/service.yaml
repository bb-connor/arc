# Reference Cloud Run service for an Chio-sidecar-governed tool server.
#
# Placeholders:
#   APP_IMAGE_PLACEHOLDER            -- replace with your application image
#   ghcr.io/backbay/chio-sidecar      -- replace with the sidecar image you pushed
#   PROJECT_ID / REGION              -- substitute for your GCP project and region
#   projects/PROJECT_ID/secrets/...  -- create the secrets in Secret Manager first
#   chio-kernel-config / chio-openapi-spec -- Secret Manager secrets mounted below
#
# Deploy:
#   gcloud run services replace deploy/cloud-run/service.yaml --region REGION
#
# Cloud Run container dependency graph (annotation
# run.googleapis.com/container-dependencies) enforces startup ordering: the
# `app` container is not started until `chio-sidecar` reports healthy via its
# startupProbe on :9090/chio/health. The sidecar must fail closed if
# CHIO_KERNEL_CONFIG_PATH cannot be loaded; Cloud Run will restart the revision.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agent-tool-server
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Keep at least one warm instance to amortise sidecar cold starts.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
        # App waits until chio-sidecar startupProbe succeeds.
        run.googleapis.com/container-dependencies: '{"app":["chio-sidecar"]}'
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: chio-sidecar@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        # ------------------------------------------------------------------
        # Application container
        # ------------------------------------------------------------------
        - name: app
          image: APP_IMAGE_PLACEHOLDER
          env:
            - name: CHIO_SIDECAR_URL
              value: "http://localhost:9090"
            - name: CHIO_SIDECAR_HEALTH_URL
              value: "http://localhost:9090/chio/health"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3

        # ------------------------------------------------------------------
        # Chio sidecar container
        # ------------------------------------------------------------------
        - name: chio-sidecar
          image: ghcr.io/backbay/chio-sidecar:latest
          # Cloud Run sends all external traffic to the only container that
          # declares a containerPort, so the proxy must be the ingress
          # container and the app stays reachable only over localhost.
          ports:
            - containerPort: 9090
          # The sidecar image's CMD default is `--help`, which exits
          # immediately. Override CMD (via `args`) with a long-running
          # Chio subcommand so the container stays up and serves /chio/health.
          # `command` is intentionally omitted so the image ENTRYPOINT
          # (`/sbin/tini -- /usr/local/bin/arc`) is preserved. `api
          # protect` reverse-proxies app traffic through the kernel;
          # swap to `mcp serve-http -- <wrapped server cmd>` when the
          # sidecar is fronting an MCP tool server instead of an app.
          args:
            - "api"
            - "protect"
            - "--upstream"
            - "http://127.0.0.1:8080"
            - "--spec"
            - "/etc/chio/spec/openapi.yaml"
            - "--listen"
            - "0.0.0.0:9090"
          env:
            - name: CHIO_LISTEN_ADDR
              value: "0.0.0.0:9090"
            - name: CHIO_HEALTH_PATH
              value: "/chio/health"
            - name: CHIO_KERNEL_CONFIG_PATH
              value: "/etc/chio/kernel/kernel.yaml"
            - name: CHIO_POLICY_SOURCE
              value: "gs://PROJECT_ID-chio-config/policy.yaml"
            - name: CHIO_RECEIPT_SINK
              value: "bigquery://PROJECT_ID.arc.receipts"
            - name: CHIO_LOG_LEVEL
              value: "info"
            - name: CHIO_CAPABILITY_AUTHORITY_URL
              valueFrom:
                secretKeyRef:
                  name: chio-capability-authority-url
                  key: latest
            - name: CHIO_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: chio-signing-key
                  key: latest
          volumeMounts:
            - name: chio-kernel-config
              mountPath: /etc/chio/kernel
            - name: chio-openapi-spec
              mountPath: /etc/chio/spec
          resources:
            limits:
              cpu: "500m"
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /chio/health
              port: 9090
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /chio/health
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: chio-kernel-config
          secret:
            secretName: chio-kernel-config
            items:
              - key: latest
                path: kernel.yaml
        - name: chio-openapi-spec
          secret:
            secretName: chio-openapi-spec
            items:
              - key: latest
                path: openapi.yaml
