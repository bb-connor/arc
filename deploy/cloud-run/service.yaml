# Reference Cloud Run service for an ARC-sidecar-governed tool server.
#
# Placeholders:
#   APP_IMAGE_PLACEHOLDER            -- replace with your application image
#   ghcr.io/backbay/arc-sidecar      -- replace with the sidecar image you pushed
#   PROJECT_ID / REGION              -- substitute for your GCP project and region
#   projects/PROJECT_ID/secrets/...  -- create the secrets in Secret Manager first
#
# Deploy:
#   gcloud run services replace deploy/cloud-run/service.yaml --region REGION
#
# Cloud Run container dependency graph (annotation
# run.googleapis.com/container-dependencies) enforces startup ordering: the
# `app` container is not started until `arc-sidecar` reports healthy via its
# startupProbe on :9090/health. The sidecar must fail closed if
# ARC_KERNEL_CONFIG_PATH cannot be loaded; Cloud Run will restart the revision.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agent-tool-server
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Keep at least one warm instance to amortise sidecar cold starts.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
        # App waits until arc-sidecar startupProbe succeeds.
        run.googleapis.com/container-dependencies: '{"app":["arc-sidecar"]}'
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: arc-sidecar@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        # ------------------------------------------------------------------
        # Application container
        # ------------------------------------------------------------------
        - name: app
          image: APP_IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: ARC_SIDECAR_URL
              value: "http://localhost:9090"
            - name: ARC_SIDECAR_HEALTH_URL
              value: "http://localhost:9090/health"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
            failureThreshold: 3

        # ------------------------------------------------------------------
        # ARC sidecar container
        # ------------------------------------------------------------------
        - name: arc-sidecar
          image: ghcr.io/backbay/arc-sidecar:latest
          ports:
            - containerPort: 9090
          # The sidecar image's CMD default is `--help`, which exits
          # immediately. Override CMD (via `args`) with a long-running
          # ARC subcommand so the container stays up and serves /health.
          # `command` is intentionally omitted so the image ENTRYPOINT
          # (`/sbin/tini -- /usr/local/bin/arc`) is preserved. `api
          # protect` reverse-proxies app traffic through the kernel;
          # swap to `mcp serve-http -- <wrapped server cmd>` when the
          # sidecar is fronting an MCP tool server instead of an app.
          args:
            - "api"
            - "protect"
            - "--upstream"
            - "http://127.0.0.1:8080"
            - "--listen"
            - "0.0.0.0:9090"
          env:
            - name: ARC_LISTEN_ADDR
              value: "0.0.0.0:9090"
            - name: ARC_HEALTH_PATH
              value: "/health"
            - name: ARC_KERNEL_CONFIG_PATH
              value: "/etc/arc/kernel.yaml"
            - name: ARC_POLICY_SOURCE
              value: "gs://PROJECT_ID-arc-config/policy.yaml"
            - name: ARC_RECEIPT_SINK
              value: "bigquery://PROJECT_ID.arc.receipts"
            - name: ARC_LOG_LEVEL
              value: "info"
            - name: ARC_CAPABILITY_AUTHORITY_URL
              valueFrom:
                secretKeyRef:
                  name: arc-capability-authority-url
                  key: latest
            - name: ARC_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: arc-signing-key
                  key: latest
          resources:
            limits:
              cpu: "500m"
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
