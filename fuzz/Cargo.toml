# P3's signed-module branch is `cfg(feature = "attest_verify")`-gated and
# exercises the same `load_module` entry point post-signature check; T4.a
# focuses on the unsigned validation path.
# Source: `.planning/trajectory/02-fuzzing-post-pr13.md` Phase 1.
[[bin]]
