# owned-by: M02 (fuzz lane); current entries layered by M09.P3.T5.
#
# Standalone Cargo workspace so libFuzzer / nightly requirements do not
# leak into the main stable/MSRV workspace lanes. M02's PR #13 layers the
# seven baseline targets enumerated in `fuzz/target-map.toml` on top of
# this file; later tickets layer their target-specific `[[bin]]` entries
# alongside their `fuzz_target!` definitions.
#
# Reference: `.planning/trajectory/02-fuzzing-post-pr13.md`
# (continuous fuzzing path) and
# `.planning/trajectory/09-supply-chain-attestation.md`
# Phase 3 task 5 (this entry: `attest_verify`).

[package]
name = "chio-fuzz"
version = "0.0.0"
edition = "2021"
publish = false
license = "Apache-2.0"

[package.metadata]
cargo-fuzz = true

# An empty `[workspace]` stanza marks this crate as the root of its own
# Cargo workspace. Without it, `cargo +nightly fuzz build` would attempt
# to fold the fuzz crate into the parent workspace at `../Cargo.toml`,
# which forbids `unwrap`/`expect` workspace-wide and pins a stable MSRV
# that libFuzzer's nightly-only runtime cannot satisfy.
[workspace]

[dependencies]
chio-a2a-adapter = { path = "../crates/chio-a2a-adapter", features = ["fuzz"] }
chio-acp-edge = { path = "../crates/chio-acp-edge", features = ["fuzz"] }
chio-anchor = { path = "../crates/chio-anchor", features = ["fuzz"] }
chio-attest-verify = { path = "../crates/chio-attest-verify" }
chio-config = { path = "../crates/chio-config", features = ["fuzz"] }
chio-credentials = { path = "../crates/chio-credentials", features = ["fuzz"] }
chio-did = { path = "../crates/chio-did", features = ["fuzz"] }
chio-kernel-core = { path = "../crates/chio-kernel-core", features = ["fuzz"] }
chio-mcp-adapter = { path = "../crates/chio-mcp-adapter", features = ["fuzz"] }
chio-mcp-edge = { path = "../crates/chio-mcp-edge", features = ["fuzz"] }
chio-openapi-mcp-bridge = { path = "../crates/chio-openapi-mcp-bridge", features = ["fuzz"] }
chio-wasm-guards = { path = "../crates/chio-wasm-guards", features = ["fuzz"] }
libfuzzer-sys = "0.4"
# `arbitrary` is pulled in directly by libFuzzer harnesses that take
# structured input; the `derive` feature lets per-target structs annotate
# `#[derive(Arbitrary)]` when they need typed views on the byte stream.
arbitrary = { version = "1", features = ["derive"] }

# `unwrap_used`/`expect_used` denied so fuzz targets cannot mask panics
# behind a hidden `.unwrap()`. Targets must use `if let Ok(_) = ...` or
# `match` to consume `Result` values from the trust-boundary surface.
[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

