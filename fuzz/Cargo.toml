[package]
name = "chio-fuzz"
version = "0.0.0"
edition = "2021"
publish = false
license = "Apache-2.0"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
arbitrary = { version = "1.3", features = ["derive"] }
chio-core = { path = "../crates/chio-core" }
chio-data-guards = { path = "../crates/chio-data-guards" }
chio-guards = { path = "../crates/chio-guards" }
chio-kernel = { path = "../crates/chio-kernel" }
chio-manifest = { path = "../crates/chio-manifest" }
chio-policy = { path = "../crates/chio-policy" }
libfuzzer-sys = "0.4"
serde_json = "1"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[[bin]]
name = "fuzz_canonical_json"
path = "fuzz_targets/canonical_json.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_policy_parse_compile"
path = "fuzz_targets/policy_parse_compile.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_sql_parser"
path = "fuzz_targets/sql_parser.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_merkle_checkpoint"
path = "fuzz_targets/merkle_checkpoint.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_capability_receipt"
path = "fuzz_targets/capability_receipt.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_manifest_roundtrip"
path = "fuzz_targets/manifest_roundtrip.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_tool_action"
path = "fuzz_targets/tool_action.rs"
test = false
doc = false
bench = false
