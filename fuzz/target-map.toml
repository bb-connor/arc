# fuzz/target-map.toml - PR-#13 fuzz target inventory.
#
# Owned by M02. Lists the seven libFuzzer targets that PR #13 lands as the
# baseline fuzzing surface. Each entry maps a target binary name to its
# source-path triggers; the cflite_pr.yml workflow uses changed-target
# sampling against this map to decide which targets a PR must run.
#
# The full M02 trajectory adds eleven more targets in P1; those entries
# land alongside their fuzz_target! definitions, not pre-emptively here.
#
# Schema:
#   [targets.<name>]
#   crate    = workspace member that owns the target
#   path     = path to the fuzz_target! source file under fuzz/fuzz_targets
#   triggers = source-path globs that, if changed, require this target to
#              run on the PR
#   seeds    = directory of seed corpora under fuzz/corpora (M01 vector
#              graduates land here)
#   notes    = optional human-readable rationale

[targets.canonical_json_roundtrip]
crate    = "chio-canonical-json"
path     = "fuzz/fuzz_targets/canonical_json_roundtrip.rs"
triggers = [
    "crates/chio-canonical-json/**",
    "spec/schemas/canonical/**",
    "tests/bindings/vectors/canonical/**",
]
seeds    = "fuzz/corpora/canonical_json_roundtrip"
notes    = "Round-trips canonical JSON; catches sort drift and float canonicalization regressions."

[targets.manifest_decode]
crate    = "chio-core-types"
path     = "fuzz/fuzz_targets/manifest_decode.rs"
triggers = [
    "crates/chio-core-types/src/manifest*.rs",
    "spec/schemas/manifest/**",
    "tests/bindings/vectors/manifest/**",
]
seeds    = "fuzz/corpora/manifest_decode"
notes    = "Decodes wire-shape manifests; M01 P2 vector corpus seeds this."

