# fuzz/target-map.toml - ClusterFuzzLite changed-target sampling map.
#
# Maps every in-tree libFuzzer binary under fuzz/fuzz_targets/ to the
# source-path globs that, when changed, must trigger that target on the PR.
# Consumed by .github/workflows/cflite_pr.yml (PR-time changed-target
# sampling) and .github/workflows/cflite_batch.yml (nightly rotation).
#
# This list MUST stay in lockstep with .clusterfuzzlite/build.sh and
# infra/oss-fuzz/build.sh; any new fuzz target lands in all three files in
# the same change set.
#
# Schema:
#   [targets.<name>]
#   crate    = workspace member that owns the target
#   path     = path to the fuzz_target! source file under fuzz/fuzz_targets
#   triggers = source-path globs that, if changed, require this target to
#              run on the PR (used by cflite_pr.yml glob expansion)
#   seeds    = directory of seed corpora under fuzz/corpus
#   notes    = optional human-readable rationale

[targets.canonical_json]
crate    = "chio-canonical-json"
path     = "fuzz/fuzz_targets/canonical_json.rs"
triggers = [
    "crates/chio-canonical-json/**",
    "spec/schemas/canonical/**",
    "tests/bindings/vectors/canonical/**",
]
seeds    = "fuzz/corpus/canonical_json"
notes    = "Round-trips canonical JSON; catches sort drift and float canonicalization regressions."

[targets.capability_receipt]
crate    = "chio-core-types"
path     = "fuzz/fuzz_targets/capability_receipt.rs"
triggers = [
    "crates/chio-core-types/src/capability*.rs",
    "crates/chio-core-types/src/receipt*.rs",
    "spec/schemas/capability/**",
    "spec/schemas/receipt/**",
    "tests/bindings/vectors/capability/**",
    "tests/bindings/vectors/receipt/**",
]
seeds    = "fuzz/corpus/capability_receipt"
notes    = "Capability + receipt round-trip; intersects M03 capability algebra invariants."

