[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hello-fastapi"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "arc-asgi>=0.1.0",
  "arc-fastapi>=0.1.0",
  "arc-sdk-python>=0.1.0",
  "fastapi>=0.116,<1",
  "uvicorn>=0.35,<1",
]

[tool.uv.sources]
arc-asgi = { path = "../../sdks/python/arc-asgi" }
arc-fastapi = { path = "../../sdks/python/arc-fastapi" }
arc-sdk-python = { path = "../../sdks/python/arc-sdk-python" }

[tool.setuptools]
py-modules = ["app"]
