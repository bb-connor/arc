[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hello-fastapi"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "chio-asgi>=0.1.0",
  "chio-fastapi>=0.1.0",
  "chio-sdk-python>=0.1.0",
  "fastapi>=0.116,<1",
  "uvicorn>=0.35,<1",
]

[tool.uv.sources]
chio-asgi = { path = "../../sdks/python/chio-asgi" }
chio-fastapi = { path = "../../sdks/python/chio-fastapi" }
chio-sdk-python = { path = "../../sdks/python/chio-sdk-python" }

[tool.setuptools]
py-modules = ["app"]
