# Route mesh traffic through ARC via Istio's AuthorizationPolicy CUSTOM action.
#
# The CUSTOM action delegates the allow/deny decision to the named provider
# registered in MeshConfig (see 01-meshconfig-patch.yaml). This file contains
# three policies:
#
#   1. arc-tool-authorization     -- opts workloads labelled
#                                    `arc.protocol/secured=true` in the
#                                    `agent-tools` namespace into ARC
#                                    evaluation, with a header-driven filter
#                                    so only capability-bearing requests pay
#                                    the ext_authz latency.
#   2. arc-deny-unauthenticated   -- fail-closed backstop: anonymous requests
#                                    that slip past the CUSTOM match above
#                                    are denied outright. Ensures there is
#                                    no bypass path when the capability
#                                    header is missing.
#   3. arc-allow-health-probes    -- excludes kubelet probe traffic so the
#                                    demo workload's `/healthz` path stays
#                                    reachable without a capability token.
#
# All policies use `security.istio.io/v1` (GA in Istio 1.22+). The CUSTOM
# action uses the provider:name field -- the deprecated
# `.external.httpAuthorizationService` style is explicitly NOT used.
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: arc-tool-authorization
  namespace: agent-tools
  labels:
    app.kubernetes.io/part-of: arc-protocol
spec:
  # Apply only to workloads that opted in by labelling themselves.
  selector:
    matchLabels:
      arc.protocol/secured: "true"
  action: CUSTOM
  provider:
    name: arc-ext-authz
  rules:
    # Allow-rule #1: route POSTs to /tools/* through ARC when either an
    # ARC capability token header or a Bearer Authorization header is
    # present. This is the hot path for agent tool invocation.
    - to:
        - operation:
            methods: ["POST"]
            paths: ["/tools/*", "/invoke/*"]
      when:
        - key: request.headers[x-arc-capability-token]
          notValues: [""]
    # Allow-rule #2: route POSTs through ARC when the request authenticates
    # with a Bearer token instead of a capability header.
    - to:
        - operation:
            methods: ["POST"]
            paths: ["/tools/*", "/invoke/*"]
      when:
        - key: request.headers[authorization]
          values: ["Bearer *"]
    # Allow-rule #3: route GETs on /tools/* (listings, schema fetches)
    # through ARC only when an Authorization header is present. This
    # illustrates header-based routing -- unauthenticated GETs fall
    # through to the deny policy below.
    - to:
        - operation:
            methods: ["GET"]
            paths: ["/tools/*"]
      when:
        - key: request.headers[authorization]
          values: ["Bearer *"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: arc-deny-unauthenticated
  namespace: agent-tools
  labels:
    app.kubernetes.io/part-of: arc-protocol
spec:
  selector:
    matchLabels:
      arc.protocol/secured: "true"
  action: DENY
  rules:
    # Anything hitting /tools/* without either header is denied before it
    # ever reaches ARC. Saves the ext_authz RTT and keeps receipts focused
    # on real authenticated traffic.
    - to:
        - operation:
            paths: ["/tools/*", "/invoke/*"]
      when:
        - key: request.headers[x-arc-capability-token]
          values: [""]
        - key: request.headers[authorization]
          notValues: ["Bearer *"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: arc-allow-health-probes
  namespace: agent-tools
  labels:
    app.kubernetes.io/part-of: arc-protocol
spec:
  selector:
    matchLabels:
      arc.protocol/secured: "true"
  action: ALLOW
  rules:
    - to:
        - operation:
            methods: ["GET"]
            paths: ["/healthz", "/readyz", "/metrics"]
