# ARC ext_authz gRPC adapter: Deployment + Service + Namespace
#
# Runs the ARC sidecar image (see crates/arc-envoy-ext-authz + deploy/sidecar)
# as a cluster-wide Deployment. Istio's `extensionProviders` entry in
# `01-meshconfig-patch.yaml` points at the `arc-sidecar` Service created here.
#
# Listeners
#   :9091  gRPC  envoy.service.auth.v3.Authorization/Check
#   :9090  HTTP  /health (liveness + readiness probes)
#
# The Deployment is fail-closed: if the container cannot load its kernel
# configuration or policy bundle it exits non-zero and Kubernetes restarts it
# (never ready, so Istio's ext_authz calls deny per failure_mode_allow=false).
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-system
  labels:
    # istio-injection stays OFF: the adapter is itself the policy engine and
    # must not sit behind another ext_authz call to avoid recursion.
    istio-injection: disabled
    app.kubernetes.io/part-of: arc-protocol
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arc-sidecar
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/part-of: arc-protocol
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-sidecar
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/component: ext-authz
    app.kubernetes.io/part-of: arc-protocol
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: arc-sidecar
      app.kubernetes.io/component: ext-authz
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arc-sidecar
        app.kubernetes.io/component: ext-authz
        app.kubernetes.io/part-of: arc-protocol
    spec:
      serviceAccountName: arc-sidecar
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: arc-sidecar
          # This example needs a dedicated Envoy ext_authz adapter image.
          # The generic ghcr.io/backbay/arc-sidecar image is the HTTP sidecar
          # and does not expose the gRPC Authorization/Check service on :9091.
          # Replace this placeholder with the image you built for the adapter.
          image: ghcr.io/backbay/arc-ext-authz:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc-ext-authz
              containerPort: 9091
              protocol: TCP
            - name: http-health
              containerPort: 9090
              protocol: TCP
          env:
            - name: ARC_LISTEN_ADDR
              value: "0.0.0.0:9090"
            - name: ARC_EXT_AUTHZ_LISTEN_ADDR
              value: "0.0.0.0:9091"
            - name: ARC_HEALTH_PATH
              value: "/health"
            - name: ARC_KERNEL_CONFIG_PATH
              value: "/etc/arc/kernel.yaml"
            - name: ARC_POLICY_SOURCE
              value: "file:///etc/arc/policy.yaml"
            - name: ARC_RECEIPT_SINK
              value: "stdout"
            - name: ARC_LOG_LEVEL
              value: "info"
            - name: ARC_CAPABILITY_AUTHORITY_URL
              valueFrom:
                secretKeyRef:
                  name: arc-secrets
                  key: capability-authority-url
            - name: ARC_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: arc-secrets
                  key: signing-key
          volumeMounts:
            - name: arc-config
              mountPath: /etc/arc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http-health
              scheme: HTTP
            initialDelaySeconds: 1
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http-health
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http-health
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: arc-config
          configMap:
            name: arc-kernel-config
            # 256 (decimal) == 0400 (octal): read-only for the container UID.
            # Kubernetes expects an int32 here, not a YAML octal literal.
            defaultMode: 256
---
# Placeholder ConfigMap shipped with the example. Replace with your own
# kernel.yaml / policy.yaml before applying to a non-demo cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: arc-kernel-config
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/part-of: arc-protocol
data:
  kernel.yaml: |
    listen: 0.0.0.0:9090
    ext_authz_listen: 0.0.0.0:9091
    receipt_sink: stdout
    policy_source: file:///etc/arc/policy.yaml
  policy.yaml: |
    # Minimal demo policy. Allow requests whose capability token presents the
    # scope `demo.read`; deny everything else. Real deployments load from a
    # signed policy bundle via ARC_POLICY_SOURCE.
    version: 1
    default: deny
    guards:
      - name: ScopeGuard
        config:
          required_scopes:
            - demo.read
---
# Demo credentials. The roadmap's production flow pulls these from an
# external secret store (ExternalSecrets operator, SOPS, or a CSI driver).
apiVersion: v1
kind: Secret
metadata:
  name: arc-secrets
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/part-of: arc-protocol
type: Opaque
stringData:
  capability-authority-url: "http://localhost:9192/capabilities"
  # Replace with a real Ed25519 signing key (base64). This placeholder is
  # obviously non-secret so demo clusters do not fail to start.
  signing-key: "REPLACE_WITH_ED25519_SIGNING_KEY"
---
apiVersion: v1
kind: Service
metadata:
  name: arc-sidecar
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/component: ext-authz
    app.kubernetes.io/part-of: arc-protocol
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arc-sidecar
    app.kubernetes.io/component: ext-authz
  ports:
    - name: grpc-ext-authz
      port: 9091
      targetPort: grpc-ext-authz
      protocol: TCP
      appProtocol: grpc
    - name: http-health
      port: 9090
      targetPort: http-health
      protocol: TCP
      appProtocol: http
