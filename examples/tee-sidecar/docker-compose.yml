services:
  chio-tee:
    build:
      context: ../..
      dockerfile: Dockerfile.tee
    image: chio-tee:local
    environment:
      CHIO_TEE_CONFIG: /etc/chio/tee.toml
      CHIO_TEE_MODE: shadow
      RUST_LOG: info
    command: ["--config", "/etc/chio/tee.toml"]
    volumes:
      - ./chio-tee.toml:/etc/chio/tee.toml:ro
      - tee-spool:/var/lib/chio/tee
    tmpfs:
      - /tmp
      - /run/chio-tee
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"

  workload:
    image: curlimages/curl:8.11.1
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    depends_on:
      - chio-tee
    networks:
      - tee-demo

networks:
  tee-demo:

volumes:
  tee-spool:
