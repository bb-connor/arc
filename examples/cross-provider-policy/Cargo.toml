[package]
name = "cross-provider-policy"
description = "Dry-run Chio policy demo proving cross-provider verdict equality"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[dependencies]
chio-provider-conformance = { path = "../../crates/chio-provider-conformance", features = [
    "fixtures-openai",
    "fixtures-anthropic",
    "fixtures-bedrock",
] }
clap = { version = "4", features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yml = { workspace = true }
thiserror = { workspace = true }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
