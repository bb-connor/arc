kernel:
  max_capability_ttl: 3600
  delegation_depth_limit: 5

guards:
  tool_access:
    enabled: true
    default_action: block
    allow:
      - inspect_service_order
      - evaluate_provider_reputation
      - issue_review_attestation

capabilities:
  default:
    tools:
      - server: provider-review
        tool: inspect_service_order
        operations: [invoke]
        ttl: 900
      - server: provider-review
        tool: evaluate_provider_reputation
        operations: [invoke]
        ttl: 900
      - server: provider-review
        tool: issue_review_attestation
        operations: [invoke]
        ttl: 900
