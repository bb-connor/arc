name: agent-commerce-network

# This compose file is aimed at the first live slice of the example.
# It installs Python deps at container start, compiles ARC from the mounted
# workspace, and stores its live state under examples/agent-commerce-network/artifacts/live.

services:
  arc-trust:
    image: rust:1.93
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        mkdir -p /workspace/examples/agent-commerce-network/artifacts/live/trust
        cargo run --bin arc -- trust serve \
          --listen 0.0.0.0:8940 \
          --service-token demo-token \
          --receipt-db /workspace/examples/agent-commerce-network/artifacts/live/trust/receipts.sqlite3 \
          --revocation-db /workspace/examples/agent-commerce-network/artifacts/live/trust/revocations.sqlite3 \
          --authority-db /workspace/examples/agent-commerce-network/artifacts/live/trust/authority.sqlite3 \
          --budget-db /workspace/examples/agent-commerce-network/artifacts/live/trust/budgets.sqlite3
    volumes:
      - ../..:/workspace
    ports:
      - "8940:8940"

  buyer-api:
    image: python:3.12-slim
    working_dir: /workspace/examples/agent-commerce-network/buyer
    command:
      - bash
      - -lc
      - |
        python -m pip install --quiet fastapi httpx pydantic uvicorn
        ./run-api.sh
    volumes:
      - ../..:/workspace
    ports:
      - "8101:8101"
    environment:
      BUYER_PROVIDER_BASE_URL: http://provider-edge:8931
      BUYER_PROVIDER_AUTH_TOKEN: demo-token

  buyer-sidecar:
    image: rust:1.93
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        ./examples/agent-commerce-network/buyer/run-sidecar.sh
    volumes:
      - ../..:/workspace
    ports:
      - "9101:9101"
    environment:
      ARC_CONTROL_URL: http://arc-trust:8940
      ARC_CONTROL_TOKEN: demo-token
      BUYER_UPSTREAM_URL: http://buyer-api:8101
    depends_on:
      - arc-trust
      - buyer-api

  provider-network:
    image: python:3.12-slim
    working_dir: /workspace/examples/agent-commerce-network/provider
    command:
      - bash
      - -lc
      - |
        python ./mock_review_mcp_server.py
    volumes:
      - ../..:/workspace

  provider-edge:
    image: rust:1.93
    working_dir: /workspace
    command:
      - bash
      - -lc
      - |
        ./examples/agent-commerce-network/provider/run-edge.sh
    volumes:
      - ../..:/workspace
    ports:
      - "8931:8931"
    environment:
      ARC_CONTROL_URL: http://arc-trust:8940
      ARC_CONTROL_TOKEN: demo-token
      ARC_EDGE_TOKEN: demo-token
    depends_on:
      - arc-trust
      - provider-network

  reviewer:
    image: python:3.12-slim
    working_dir: /workspace/examples/agent-commerce-network/reviewer
    command:
      - bash
      - -lc
      - |
        echo "Reviewer container is ready. Run ./run-verify.sh against a mounted bundle."
        sleep infinity
    volumes:
      - ../..:/workspace

networks:
  default:
    name: agent-commerce-network
