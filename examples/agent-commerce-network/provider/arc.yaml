kernel:
  keypair: ./keys/contoso-provider.ed25519
  policy: ./policy.yaml

receipts:
  store: ./state/provider-receipts.sqlite

# The first live slice uses `provider/mock_review_mcp_server.py` behind
# `provider/run-edge.sh`, which wraps it with `arc mcp serve-http`.

adapters:
  mcp:
    - id: provider-security-review
      command: "./mock_review_mcp_server.py"
      args: []
