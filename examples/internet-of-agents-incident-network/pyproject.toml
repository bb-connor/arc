[project]
name = "internet-of-agents-incident-network"
version = "0.2.0"
description = "Multi-org incident response network using Chio for capability-governed tool access"
requires-python = ">=3.11"
dependencies = [
  "anthropic>=0.52.0",
  "chio-asgi>=0.1.0",
  "chio-fastapi>=0.1.0",
  "chio-sdk-python>=0.1.0",
  "fastapi>=0.115.0",
  "httpx>=0.27.0",
  "openai-agents>=0.1.0",
  "pynacl>=1.5.0",
  "uvicorn>=0.34.0",
]

[tool.uv]
package = false

[tool.uv.sources]
chio-asgi = { path = "../../sdks/python/chio-asgi" }
chio-fastapi = { path = "../../sdks/python/chio-fastapi" }
chio-sdk-python = { path = "../../sdks/python/chio-sdk-python" }
