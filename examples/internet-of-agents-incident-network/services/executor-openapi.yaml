openapi: "3.1.0"
info:
  title: Provider Executor
  version: "0.2.0"
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: Health check
  /execute:
    post:
      operationId: execute
      x-chio-tool-name: execute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Execution result
