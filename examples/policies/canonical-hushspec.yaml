hushspec: "0.1.0"
name: canonical-code-agent
description: Supported starting point for coding-agent stacks in Chio.

rules:
  forbidden_paths:
    enabled: true
    patterns:
      - "**/.env"
      - "**/.env.*"
      - "**/.git/**"
      - "**/.ssh/**"
  path_allowlist:
    enabled: true
    read:
      - "/workspace/**"
    write:
      - "/workspace/**"
    patch:
      - "/workspace/**"
  secret_patterns:
    enabled: true
  patch_integrity:
    enabled: true
  shell_commands:
    enabled: true
    forbidden_patterns:
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)git\\s+push\\s+.*--force(\\s|$)"
      - "(?i)git\\s+push\\s+.*-f(\\s|$)"
  tool_access:
    enabled: true
    default: block
    allow:
      - read_file
      - list_directory
      - search_files
      - write_file
      - edit_file
      - create_directory
      - run_command
      - status
      - diff
      - log
      - add
      - commit
