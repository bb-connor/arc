[package]
name = "otel-genai"
description = "OpenTelemetry GenAI demo for Chio receipt and span lookup"
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
license = "Apache-2.0"
publish = false

[dependencies]
chio-core = { package = "chio-core-types", path = "../../crates/chio-core-types" }
chio-kernel = { package = "chio-kernel", path = "../../crates/chio-kernel" }
chio-otel-receipt-exporter = { path = "../../crates/chio-otel-receipt-exporter" }
serde_json = "1"

[[test]]
name = "bidirectional_lookup"
path = "tests/bidirectional_lookup.rs"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
