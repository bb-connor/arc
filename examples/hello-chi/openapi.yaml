openapi: 3.1.0
info:
  title: hello-chi
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: Health check
  /hello:
    get:
      operationId: hello
      responses:
        "200":
          description: Greeting
  /echo:
    post:
      operationId: echo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                count:
                  type: integer
      responses:
        "200":
          description: Echo payload
