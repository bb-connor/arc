name: chio-docker-quickstart

services:
  chio-trust-demo:
    image: chio-trust-demo:local
    build:
      context: ../..
      dockerfile: Dockerfile
      target: chio-trust-demo
    environment:
      CHIO_SERVICE_TOKEN: ${CHIO_SERVICE_TOKEN:-demo-token}
    ports:
      - "${CHIO_TRUST_PORT:-8940}:8940"
    volumes:
      - chio_demo_state:/var/lib/arc
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8940/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  chio-mcp-demo:
    image: chio-mcp-demo:local
    build:
      context: ../..
      dockerfile: Dockerfile
      target: chio-mcp-demo
    environment:
      CHIO_AUTH_TOKEN: ${CHIO_AUTH_TOKEN:-demo-token}
      CHIO_CONTROL_URL: http://chio-trust-demo:8940
      CHIO_CONTROL_TOKEN: ${CHIO_SERVICE_TOKEN:-demo-token}
    ports:
      - "${CHIO_EDGE_PORT:-8931}:8931"
    depends_on:
      chio-trust-demo:
        condition: service_healthy

volumes:
  chio_demo_state:
