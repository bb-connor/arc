[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chio-lambda-python"
version = "0.1.0"
description = "Python client for the Chio Lambda Extension (localhost:9090 evaluator)."
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["chio", "lambda", "aws", "serverless", "capability", "security", "agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]

dependencies = [
    "httpx>=0.27,<1",
    "chio-sdk-python",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "mypy>=1.10,<2",
    "ruff>=0.5,<1",
    "respx>=0.21,<1",
]

[tool.uv.sources]
chio-sdk-python = { path = "../../python/chio-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/chio_lambda"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
