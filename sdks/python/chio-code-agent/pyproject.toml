[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chio-code-agent"
version = "0.1.0"
description = "Chio-governed tool wrappers for coding agents -- safe file, shell, and git access with a zero-config default policy"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["chio", "mcp", "coding", "agent", "claude", "cursor", "security", "capability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "chio-sdk-python>=0.1.0",
    "pydantic>=2.5,<3",
    "pyyaml>=6,<7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "mypy>=1.10",
    "ruff>=0.5",
    "types-PyYAML>=6",
]

[tool.uv.sources]
chio-sdk-python = { path = "../chio-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/chio_code_agent"]

[tool.hatch.build.targets.wheel.force-include]
"src/chio_code_agent/default_policy.yaml" = "chio_code_agent/default_policy.yaml"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
warn_return_any = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]
