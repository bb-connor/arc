[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chio-iac"
version = "0.1.0"
description = "Infrastructure-as-Code governance for the Chio protocol -- Terraform CLI wrapper and Pulumi decorator with two-phase plan / apply capability enforcement"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = [
    "chio",
    "iac",
    "terraform",
    "pulumi",
    "infrastructure",
    "security",
    "capability",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]

dependencies = [
    "chio-sdk-python>=0.1.0",
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
pulumi = [
    "pulumi>=3.100,<4",
]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "mypy>=1.10",
    "ruff>=0.5",
]

[project.scripts]
chio-iac = "chio_iac.__main__:main"

[tool.uv.sources]
chio-sdk-python = { path = "../chio-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/chio_iac"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
warn_return_any = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]
