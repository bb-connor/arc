[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-fastapi"
version = "0.1.0"
description = "FastAPI decorators and integration for the ARC protocol"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["arc", "fastapi", "security", "capability", "decorator"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Framework :: FastAPI",
]

dependencies = [
    "arc-sdk-python>=0.1.0",
    "arc-asgi>=0.1.0",
    "fastapi>=0.100",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "httpx>=0.27,<1",
    "respx>=0.21,<1",
]

[tool.uv.sources]
arc-sdk-python = { path = "../arc-sdk-python" }
arc-asgi = { path = "../arc-asgi" }

[tool.hatch.build.targets.wheel]
packages = ["src/arc_fastapi"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
