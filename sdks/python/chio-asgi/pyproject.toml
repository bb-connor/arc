[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chio-asgi"
version = "0.1.0"
description = "ASGI middleware for the Chio protocol -- intercepts requests, evaluates capabilities via sidecar"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["chio", "asgi", "middleware", "security", "capability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Framework :: AsyncIO",
]

dependencies = [
    "chio-sdk-python>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "httpx>=0.27,<1",
    "respx>=0.21,<1",
]

[tool.uv.sources]
chio-sdk-python = { path = "../chio-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/chio_asgi"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
