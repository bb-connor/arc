[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-langchain"
version = "0.1.0"
description = "LangChain integration for ARC protocol tools with conformance tests"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["arc", "langchain", "agent", "tool", "security"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "arc-sdk-python>=0.1.0",
    "langchain-core>=0.2,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "httpx>=0.27,<1",
    "respx>=0.21,<1",
    "fastapi>=0.100",
    "arc-fastapi>=0.1.0",
]

[tool.uv.sources]
arc-sdk-python = { path = "../arc-sdk-python" }
arc-fastapi = { path = "../arc-fastapi" }

[tool.hatch.build.targets.wheel]
packages = ["src/arc_langchain"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
