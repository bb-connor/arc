[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arc-streaming"
version = "0.1.0"
description = "Kafka consumer middleware for the ARC protocol -- per-event capability evaluation, transactional receipt commit, and DLQ governance"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = ["arc", "kafka", "streaming", "consumer", "dlq", "security", "capability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "arc-sdk-python>=0.1.0",
    "confluent-kafka>=2.4,<3",
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "httpx>=0.27,<1",
    "respx>=0.21,<1",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.uv.sources]
arc-sdk-python = { path = "../arc-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/arc_streaming"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
warn_return_any = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]
