[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "chio-streaming"
version = "0.2.0"
description = "Chio streaming middleware: per-event capability evaluation, receipt publishing, and DLQ governance for Kafka, NATS, Pulsar, EventBridge, Pub/Sub, and Redis Streams"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Backbay Industries" },
]
keywords = [
    "chio",
    "kafka",
    "nats",
    "pulsar",
    "eventbridge",
    "pubsub",
    "redis",
    "streaming",
    "consumer",
    "dlq",
    "security",
    "capability",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "chio-sdk-python>=0.1.0",
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
# Broker-specific extras. The middlewares use duck-typed protocols so
# the underlying client library is only required when the user
# actually connects to that broker.
kafka = [
    "confluent-kafka>=2.4,<3",
]
nats = [
    "nats-py>=2.6,<3",
]
pulsar = [
    "pulsar-client>=3.5,<4",
]
eventbridge = [
    "boto3>=1.34,<2",
]
pubsub = [
    "google-cloud-pubsub>=2.21,<3",
]
redis = [
    "redis>=5.0,<6",
]
all = [
    "confluent-kafka>=2.4,<3",
    "nats-py>=2.6,<3",
    "pulsar-client>=3.5,<4",
    "boto3>=1.34,<2",
    "google-cloud-pubsub>=2.21,<3",
    "redis>=5.0,<6",
]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "httpx>=0.27,<1",
    "respx>=0.21,<1",
    "mypy>=1.10",
    "ruff>=0.5",
]

[tool.uv.sources]
chio-sdk-python = { path = "../chio-sdk-python" }

[tool.hatch.build.targets.wheel]
packages = ["src/chio_streaming"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
warn_unused_ignores = true
warn_return_any = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]
