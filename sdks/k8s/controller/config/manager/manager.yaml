---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-system
  labels:
    app.kubernetes.io/name: arc
    app.kubernetes.io/component: platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arc-k8s-controller
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-k8s-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-k8s-controller
  namespace: arc-system
  labels:
    app.kubernetes.io/name: arc-k8s-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: arc-k8s-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arc-k8s-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: arc-k8s-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/backbay/arc-k8s-controller:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: ARC_SIDECAR_URL
              value: "http://arc-sidecar.arc-system.svc.cluster.local:9090"
            - name: ARC_SIDECAR_CONTROL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: arc-sidecar-control
                  key: token
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10
