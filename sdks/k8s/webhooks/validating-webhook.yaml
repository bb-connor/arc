apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: chio-validating-webhook
  labels:
    app.kubernetes.io/name: chio-admission-controller
    app.kubernetes.io/component: validating-webhook
webhooks:
  - name: validate.chio.backbay.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: chio-admission-controller
        namespace: chio-system
        path: /validate
        port: 443
      # caBundle should be injected by cert-manager or manually set.
      # caBundle: <base64-encoded-ca-cert>
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
        scope: Namespaced
    failurePolicy: Fail
    sideEffects: None
    timeoutSeconds: 10
    namespaceSelector:
      matchLabels:
        chio.backbay.io/enforce: "true"
