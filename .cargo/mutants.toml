# Workspace-wide skip list. Pure plumbing, generated code, test/bench
# scaffolding, formal-methods harnesses (Aeneas / Kani), platform clock /
# rng adapters, and libFuzzer entry points (covered by the M02 P1 lane).
exclude_globs = [
    "**/tests.rs",
    "**/test_*.rs",
    "**/*_test.rs",
    "**/tests/**",
    "**/benches/**",
    "**/build.rs",
    "**/fuzz.rs",
    # chio-kernel-core: platform adapters + formal-methods scaffolding.
    "crates/chio-kernel-core/src/clock.rs",
    "crates/chio-kernel-core/src/rng.rs",
    "crates/chio-kernel-core/src/formal_aeneas.rs",
    "crates/chio-kernel-core/src/formal_core.rs",
    "crates/chio-kernel-core/src/kani_harnesses.rs",
    "crates/chio-kernel-core/src/kani_public_harnesses.rs",
    # chio-policy: pure data + version constants + embedded YAML rulesets.
    "crates/chio-policy/src/models.rs",
    "crates/chio-policy/src/version.rs",
    "crates/chio-policy/src/rulesets/**",
    # chio-guards: pure types, pure helpers, advisory-by-design guards,
    # and the external/ adapter tree (remote-process bridges, integration-
