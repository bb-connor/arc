# releases.toml - Mutation-testing release-cycle gate state.
#
# Source-doc anchors:
#   .planning/trajectory/02-fuzzing-post-pr13.md
#     - "Mutation-testing CI shape (Phase 3)" advisory/blocking flip
#     - Phase 3 atomic task P3.T4 (env-var gate driven by this file)
#   .planning/trajectory/decisions.yml
#     id=mutation-testing-gate-posture
#       Advisory for one release cycle after M02 P3 merges, blocking
#       thereafter. Flip event is the next release tag, not calendar time.
#
# This file is read by scripts/mutants-gate.sh from
# .github/workflows/mutants.yml (jobs mutants-pr and mutants-nightly).
#
# Schema:
#   [mutants]
#   phase3_merge_tag : tag (e.g. "v0.5.0") that shipped the M02 P3
#                      mutation-testing changes. Recorded once for
#                      provenance; unused by the gate logic itself.
#   cycle_end_tag    : tag (e.g. "v0.6.0") of the first release after
#                      phase3_merge_tag. Empty string -> gate is
#                      ADVISORY (mutants-gate.sh exits 0 unconditionally).
#                      Non-empty -> gate is BLOCKING (mutants-gate.sh
#                      fails the workflow when cargo-mutants reports
#                      surviving mutants beyond the per-crate budget).
#
# Lifecycle:
#   1. M02.P2.T2 (this commit): file lands with both tags empty so the
#      mutants.yml workflow runs in advisory posture from day one.
#   2. M02.P3 lands: maintainer (or M02.P3.T1 release-binaries auto-flip
#      ticket) edits phase3_merge_tag to record the merge release.
#   3. Next release after phase3_merge_tag: release-binaries.yml writes
#      cycle_end_tag in a single PR titled
#      `chore(mutants): activate blocking gate after cycle <tag>`. The
#      gate flips to blocking automatically.
#   4. Override: clear cycle_end_tag in a PR labelled
#      `mutants-gate-override` with CODEOWNERS approval to re-enter
#      advisory mode for one cycle (M02.P3.T+ ticket).
#
# Editing this file is gated by CODEOWNERS in M02 P3+; until then,
# changes must reference the controlling ticket in the commit message.

[mutants]
phase3_merge_tag = ""
cycle_end_tag = ""
