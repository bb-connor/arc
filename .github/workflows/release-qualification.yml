name: Release Qualification

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  qualify:
    name: Release qualification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install MSRV toolchain
        run: rustup toolchain install 1.93.0 --profile minimal

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: contracts/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install web3 contract dependencies
        run: pnpm --dir contracts install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - uses: Swatinem/rust-cache@v2

      - name: SDK parity contract lane
        run: ./scripts/check-sdk-parity.sh

      - name: Release qualification
        run: ./scripts/qualify-release.sh

      - name: Hosted web3 runtime qualification
        run: ./scripts/qualify-web3-runtime.sh

      - name: Hosted web3 promotion qualification
        run: ./scripts/qualify-web3-promotion.sh

      - name: Stage hosted web3 qualification artifacts
        if: always()
        run: ./scripts/stage-web3-release-artifacts.sh

      - name: MSRV workspace lane
        run: cargo +1.93.0 build --workspace && cargo +1.93.0 test --workspace

      - name: Upload qualification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qualification
          path: target/release-qualification
          retention-days: 21
