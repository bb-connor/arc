# slsa.yml - SLSA L2 provenance generation for release binaries.
#
# Owned by M09 per OWNERS.toml workflow lane table. Triggered on
# successful completion of release-binaries.yml. Consumes the
# per-target binary digests from that workflow's uploaded artifacts
# and emits a signed provenance attestation alongside each release.
#
# The workflow_run trigger fires after release-binaries.yml succeeds
# (which itself runs on `v*.*.*` tag pushes or workflow_dispatch). We
# avoid coupling the SLSA generator step into release-binaries.yml
# directly because the reusable slsa-github-generator workflow needs
# `id-token: write` and `contents: write` and is easier to audit when
# isolated from the build matrix.

name: slsa

# `workflow_run` does NOT support a `tags:` filter, and `branches:`
# matches only branch refs. release-binaries.yml's primary path is
# `push: tags: v*.*.*`, whose triggering ref is `refs/tags/v...` and
# matches no branch pattern; the previous `branches: [main, ...]`
# filter therefore silently dropped every tag-driven release and SLSA
# provenance was never generated for actual releases (cleanup-c11b;
# PR #46 review thread r3142900224 - High Severity).
#
# The replacement triggers on every successful `Release Binaries` run
# regardless of ref shape. The `collect-digests` job below performs
# the release-vs-non-release branching by reading the tag-bound
# release-metadata.json emitted by release-binaries.yml. The
# workflow_run event's head_branch is branch-shaped for dispatched
# rebuilds, so it is not used as release provenance.

on:
  workflow_run:
    workflows: ["Release Binaries"]
    types: [completed]

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  collect-digests:
    name: Collect binary digests from release-binaries
    # owner: M09
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      subjects: ${{ steps.compute.outputs.subjects }}
      release_tag: ${{ steps.compute.outputs.release_tag }}
      source_sha: ${{ steps.compute.outputs.source_sha }}
    steps:
      - name: Download artifacts from release-binaries.yml
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: chio-*
          path: artifacts/
      - name: Compute base64-encoded subjects and resolve release tag
        id: compute
        shell: bash
        env:
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          cd artifacts
          SUBJECTS=$(find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | base64 -w0)
          echo "subjects=${SUBJECTS}" >> "${GITHUB_OUTPUT}"
          mapfile -t metadata_files < <(find . -type f -name release-metadata.json | sort)
          if [[ "${#metadata_files[@]}" -eq 0 ]]; then
            echo "::error::release-binaries artifacts did not include release-metadata.json" >&2
            exit 1
          fi
          release_tag=""
          source_ref=""
          source_sha=""
          for metadata_file in "${metadata_files[@]}"; do
            current_tag="$(jq -r '.release_tag // empty' "${metadata_file}")"
            current_ref="$(jq -r '.source_ref // empty' "${metadata_file}")"
            current_sha="$(jq -r '.source_sha // empty' "${metadata_file}")"
            if [[ -z "${current_tag}" || -z "${current_ref}" || -z "${current_sha}" ]]; then
              echo "::error::${metadata_file} is missing release_tag, source_ref, or source_sha" >&2
              exit 1
            fi
            if [[ "${current_sha}" != "${WORKFLOW_RUN_HEAD_SHA}" ]]; then
              echo "::error::${metadata_file} source_sha ${current_sha} does not match workflow_run.head_sha ${WORKFLOW_RUN_HEAD_SHA}" >&2
              exit 1
            fi
            if [[ -z "${release_tag}" ]]; then
              release_tag="${current_tag}"
              source_ref="${current_ref}"
              source_sha="${current_sha}"
            elif [[ "${release_tag}" != "${current_tag}" || "${source_ref}" != "${current_ref}" || "${source_sha}" != "${current_sha}" ]]; then
              echo "::error::release metadata differs across matrix artifacts" >&2
              exit 1
            fi
          done
          semver_re='(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?'
          if ! [[ "${release_tag}" =~ ^v${semver_re}$ ]]; then
            echo "::error::release tag '${release_tag}' does not match v<semver>" >&2
            exit 1
          fi
          if [[ "${source_ref}" != "refs/tags/${release_tag}" ]]; then
            echo "::error::release metadata source_ref '${source_ref}' is not refs/tags/${release_tag}" >&2
            exit 1
          fi
          if ! [[ "${source_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::release metadata source_sha '${source_sha}' is not a 40-character git SHA" >&2
            exit 1
          fi
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"

  provenance:
    name: SLSA L2 provenance
    # owner: M09
    needs: [collect-digests]
    permissions:
      id-token: write
      contents: write
      actions: read
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      base64-subjects: ${{ needs.collect-digests.outputs.subjects }}
      provenance-name: chio-${{ needs.collect-digests.outputs.source_sha }}.intoto.jsonl
      upload-assets: true
      # Populated from release-metadata.json after source_sha is checked
      # against workflow_run.head_sha. Dispatch rebuilds are tag-ref
      # gated and upload provenance to that exact release tag.
      upload-tag-name: ${{ needs.collect-digests.outputs.release_tag }}
