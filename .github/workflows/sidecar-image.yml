name: Sidecar Image

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Ignored for manual smoke builds. Pushes and signing run only on push events."
        required: false
        type: string

concurrency:
  group: sidecar-image-${{ github.ref }}
  cancel-in-progress: false

# Workflow-level principle-of-least-privilege default. Consistent with
# release-binaries.yml and release-pypi.yml. The build-and-push job
# extends this with `packages: write` + `id-token: write` for ghcr
# push and OIDC attestation.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push multi-arch sidecar image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          semver_re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "${tag}" =~ ${semver_re} ]]; then
            echo "sidecar-image refuses non-semver release tag: ${tag}" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image repository
        id: image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${owner}/chio-sidecar" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            # Intentionally do NOT emit `:latest` on tag pushes. An older
            # patch release (e.g. v0.1.1) tagged after a newer one
            # (e.g. v0.2.0) would otherwise overwrite `:latest` back to
            # the older image since we have no version-ordering check.
            # Versioned tags (v0.1.1, 0.1, etc.) still ship via the
            # semver patterns above, so operators can pin to them and
            # `:latest` only tracks the default branch.
          labels: |
            org.opencontainers.image.title=chio-sidecar
            org.opencontainers.image.description=Chio sidecar runtime
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile.sidecar
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,scope=sidecar,mode=max

      - name: Export image digest
        if: github.event_name == 'push'
        run: |
          echo "Pushed image digest: ${{ steps.build.outputs.digest }}"

      # Sigstore keyless cosign signing of the multi-arch image manifest by
      # digest. Signing the digest covers every tag (semver, sha, latest)
      # because all point at the same content-addressed manifest. The OIDC
      # token from `id-token: write` is exchanged with Fulcio; no long-lived
      # signing key is held in secrets. Verification recipe:
      # docs/install/PUBLISHING.md, section "Sidecar image signing".
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@1aa8e0f2454b781fbf0fbf306a4c9533a0c57409
        with:
          cosign-release: v2.4.1

      - name: Cosign sign image by digest
        if: github.event_name == 'push'
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::build-push-action did not emit a digest; refusing to sign" >&2
            exit 1
          fi
          ref="${IMAGE_NAME}@${IMAGE_DIGEST}"
          echo "Signing ${ref} (covers every tag pointing at this manifest)"
          cosign sign --yes "${ref}"
