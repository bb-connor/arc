name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0). Creates a draft release if it does not exist."
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: arc
  CARGO_PACKAGE: arc-cli

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bin_suffix: ""
            cross: true
          - target: x86_64-apple-darwin
            # GitHub retired macos-13; macos-15-intel is the supported
            # hosted Intel macOS label for x86_64 release builds.
            runner: macos-15-intel
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            bin_suffix: ".exe"
            cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # When dispatched with a tag input (e.g. workflow_dispatch to
          # rebuild v0.1.0 from main), check that tag out — otherwise
          # the default GITHUB_REF is the triggering branch/ref, which
          # would publish binaries built from the wrong commit under
          # the requested tag name.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        # arc-envoy-ext-authz's build.rs invokes tonic-build at compile
        # time. ci.yml installs protoc on every lane; the release build
        # needs the same tool or every native (non-cross) job will fail
        # on Linux / macOS / Windows. `cross` images already bundle
        # protoc, so the step only runs on native rows.
        if: matrix.cross == false
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (aarch64-linux only)
        if: matrix.cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build (native)
        if: matrix.cross == false
        shell: bash
        run: |
          cargo build --release --locked \
            --package "${CARGO_PACKAGE}" \
            --bin "${BINARY_NAME}" \
            --target "${{ matrix.target }}"

      - name: Build (cross)
        if: matrix.cross == true
        shell: bash
        run: |
          cross build --release --locked \
            --package "${CARGO_PACKAGE}" \
            --bin "${BINARY_NAME}" \
            --target "${{ matrix.target }}"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          # Validate tag format: must be vMAJOR.MINOR.PATCH with optional
          # pre-release suffix (e.g. v0.1.0, v1.2.3-rc.1). A malformed tag
          # produces archive names like `arc--*.tar.gz` that never match
          # the Homebrew formula URL template and silently publish a
          # broken release.
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$tag' does not match vMAJOR.MINOR.PATCH[-prerelease]" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="arc-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/${stage_dir}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.bin_suffix }}" "dist/${stage_dir}/"
          cp README.md LICENSE "dist/${stage_dir}/" 2>/dev/null || true
          (cd dist && tar czf "${stage_dir}.tar.gz" "${stage_dir}")
          (cd dist && shasum -a 256 "${stage_dir}.tar.gz" > "${stage_dir}.tar.gz.sha256")

      - name: Stage artifacts (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "arc-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}${{ matrix.bin_suffix }}" "dist/$stage/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "dist/$stage/" }
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          $checksumLine = "$hash  $stage.zip`n"
          [System.IO.File]::WriteAllText(
            "dist/$stage.zip.sha256",
            $checksumLine,
            [System.Text.Encoding]::ASCII
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Match the build job: when dispatched with a tag input, check
          # that tag out so the Homebrew formula template + release notes
          # come from the same commit the binaries were built from.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          # Validate tag format: must be vMAJOR.MINOR.PATCH with optional
          # pre-release suffix (e.g. v0.1.0, v1.2.3-rc.1). A malformed tag
          # produces archive names like `arc--*.tar.gz` that never match
          # the Homebrew formula URL template and silently publish a
          # broken release.
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '$tag' does not match vMAJOR.MINOR.PATCH[-prerelease]" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Copy the archives themselves.
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          # Copy the per-archive .sha256 files. Needed because the Publish
          # release step matches `release/*.sha256` with
          # `fail_on_unmatched_files: true`, so missing per-archive files
          # would fail every release.
          find artifacts -type f -name "*.sha256" -exec cp {} release/ \;
          find release -type f -name "*.sha256" -exec perl -0pi -e 's/\r\n/\n/g; s/\r/\n/g' {} +
          # Concatenate the per-archive .sha256 files into the combined
          # SHA256SUMS for `shasum -a 256 -c`.
          find release -type f -name "*.sha256" -exec cat {} + | sort > release/SHA256SUMS
          (cd release && ls -la)

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          repo="${{ github.repository }}"
          formula_src="Homebrew/arc.rb.tmpl"
          formula_out="release/arc.rb"
          if [[ ! -f "$formula_src" ]]; then
            echo "formula source missing: $formula_src" >&2
            exit 1
          fi
          # Derive SHA-256 for each platform tarball and verify each is a
          # real 64-char lowercase hex digest. Without validation a missing
          # tarball (from an upstream build failure) would yield an empty
          # string, sed would substitute empty into the formula, and
          # `brew install` would silently succeed on a checksum mismatch
          # because the formula would no longer carry any checksum at all.
          derive_sha256() {
            local arch_tarball="$1"
            if [[ ! -f "$arch_tarball" ]]; then
              echo "::error::expected release artifact missing: $arch_tarball" >&2
              exit 1
            fi
            local digest
            digest=$(sha256sum "$arch_tarball" | awk '{print $1}')
            if ! [[ "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error::derived sha256 for $arch_tarball is not a 64-char lowercase hex string: '$digest'" >&2
              exit 1
            fi
            printf '%s' "$digest"
          }
          arm_mac=$(derive_sha256 "release/arc-${version}-aarch64-apple-darwin.tar.gz")
          x86_mac=$(derive_sha256 "release/arc-${version}-x86_64-apple-darwin.tar.gz")
          arm_lin=$(derive_sha256 "release/arc-${version}-aarch64-unknown-linux-gnu.tar.gz")
          x86_lin=$(derive_sha256 "release/arc-${version}-x86_64-unknown-linux-gnu.tar.gz")
          sed -e "s|__ARC_SHA256_DARWIN_ARM64__|${arm_mac}|" \
              -e "s|__ARC_SHA256_DARWIN_AMD64__|${x86_mac}|" \
              -e "s|__ARC_SHA256_LINUX_ARM64__|${arm_lin}|" \
              -e "s|__ARC_SHA256_LINUX_AMD64__|${x86_lin}|" \
              -e "s|__ARC_GITHUB_REPO__|${repo}|" \
              -e "s|__ARC_VERSION__|${version}|" \
              "$formula_src" > "$formula_out"
          echo "updated formula at ${formula_out}:"
          grep -E "version |sha256 " "$formula_out"

      - name: Render release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## arc ${{ steps.version.outputs.tag }}"
            echo
            echo "Pre-built ARC sidecar binaries. Install via Homebrew, Docker, or by downloading an archive below."
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "curl -fsSL -o /tmp/arc.rb https://github.com/${{ github.repository }}/releases/latest/download/arc.rb"
            echo "brew install --formula /tmp/arc.rb"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/arc-sidecar:${{ steps.version.outputs.version }}"
            echo '```'
            echo
            echo "### Verify"
            echo
            echo "Every archive has a matching \`.sha256\` file, and a combined \`SHA256SUMS\` is attached to the release."
            echo
            echo '```bash'
            echo "shasum -a 256 -c SHA256SUMS"
            echo '```'
            echo
            echo "### Supported targets"
            echo
            echo "- linux x86_64 (gnu)"
            echo "- linux aarch64 (gnu)"
            echo "- macOS x86_64"
            echo "- macOS aarch64 (Apple Silicon)"
            echo "- windows x86_64 (msvc)"
          } > release/NOTES.md
          cat release/NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: arc ${{ steps.version.outputs.tag }}
          body_path: release/NOTES.md
          draft: false
          fail_on_unmatched_files: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.sha256
            release/SHA256SUMS
            release/arc.rb
