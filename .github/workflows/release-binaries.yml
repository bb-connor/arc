name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0). Creates a draft release if it does not exist."
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: arc
  CARGO_PACKAGE: arc-cli

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bin_suffix: ""
            cross: true
          - target: x86_64-apple-darwin
            # macos-13 is the only GitHub-hosted Intel Mac runner label.
            # macos-14/15 are Apple Silicon only; `macos-15-intel` is not a
            # real label and would queue indefinitely.
            runner: macos-13
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
            bin_suffix: ""
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            bin_suffix: ".exe"
            cross: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (aarch64-linux only)
        if: matrix.cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build (native)
        if: matrix.cross == false
        shell: bash
        run: |
          cargo build --release --locked \
            --package "${CARGO_PACKAGE}" \
            --bin "${BINARY_NAME}" \
            --target "${{ matrix.target }}"

      - name: Build (cross)
        if: matrix.cross == true
        shell: bash
        run: |
          cross build --release --locked \
            --package "${CARGO_PACKAGE}" \
            --bin "${BINARY_NAME}" \
            --target "${{ matrix.target }}"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          stage_dir="arc-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/${stage_dir}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.bin_suffix }}" "dist/${stage_dir}/"
          cp README.md LICENSE "dist/${stage_dir}/" 2>/dev/null || true
          (cd dist && tar czf "${stage_dir}.tar.gz" "${stage_dir}")
          (cd dist && shasum -a 256 "${stage_dir}.tar.gz" > "${stage_dir}.tar.gz.sha256")

      - name: Stage artifacts (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $stage = "arc-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}${{ matrix.bin_suffix }}" "dist/$stage/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "dist/$stage/" }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arc-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Copy the archives themselves.
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          # Copy the per-archive .sha256 files. Needed because the Publish
          # release step matches `release/*.sha256` with
          # `fail_on_unmatched_files: true`, so missing per-archive files
          # would fail every release.
          find artifacts -type f -name "*.sha256" -exec cp {} release/ \;
          # Concatenate the per-archive .sha256 files into the combined
          # SHA256SUMS for `shasum -a 256 -c`.
          find artifacts -type f -name "*.sha256" -exec cat {} + | sort > release/SHA256SUMS
          (cd release && ls -la)

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          formula_src="Homebrew/arc.rb"
          formula_out="release/arc.rb"
          if [[ ! -f "$formula_src" ]]; then
            echo "formula source missing: $formula_src" >&2
            exit 1
          fi
          # Derive SHA-256 for each platform tarball.
          arm_mac=$(sha256sum "release/arc-${version}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          x86_mac=$(sha256sum "release/arc-${version}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          arm_lin=$(sha256sum "release/arc-${version}-aarch64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          x86_lin=$(sha256sum "release/arc-${version}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          # Replace the four deterministic placeholder strings. Using distinct
          # placeholders keeps the substitution unambiguous vs. a single shared
          # placeholder that would be impossible to map back to platforms.
          sed -e "s|1111111111111111111111111111111111111111111111111111111111111111|${arm_mac}|" \
              -e "s|2222222222222222222222222222222222222222222222222222222222222222|${x86_mac}|" \
              -e "s|3333333333333333333333333333333333333333333333333333333333333333|${arm_lin}|" \
              -e "s|4444444444444444444444444444444444444444444444444444444444444444|${x86_lin}|" \
              -e "s|version \"0.1.0\"|version \"${version}\"|" \
              "$formula_src" > "$formula_out"
          echo "updated formula at ${formula_out}:"
          grep -E "version |sha256 " "$formula_out"

      - name: Render release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## arc ${{ steps.version.outputs.tag }}"
            echo
            echo "Pre-built ARC sidecar binaries. Install via Homebrew, Docker, or by downloading an archive below."
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "brew install backbay/arc/arc"
            echo "docker pull ghcr.io/backbay/arc-sidecar:${{ steps.version.outputs.version }}"
            echo '```'
            echo
            echo "### Verify"
            echo
            echo "Every archive has a matching \`.sha256\` file, and a combined \`SHA256SUMS\` is attached to the release."
            echo
            echo '```bash'
            echo "shasum -a 256 -c SHA256SUMS"
            echo '```'
            echo
            echo "### Supported targets"
            echo
            echo "- linux x86_64 (gnu)"
            echo "- linux aarch64 (gnu)"
            echo "- macOS x86_64"
            echo "- macOS aarch64 (Apple Silicon)"
            echo "- windows x86_64 (msvc)"
          } > release/NOTES.md
          cat release/NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: arc ${{ steps.version.outputs.tag }}
          body_path: release/NOTES.md
          draft: true
          fail_on_unmatched_files: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.sha256
            release/SHA256SUMS
            release/arc.rb
