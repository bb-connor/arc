# mutants-fuzz-cocoverage.yml - cross-oracle nightly (M02-owned).
#
# Source-doc anchors:
#   - .planning/trajectory/02-fuzzing-post-pr13.md
#     Round-2 (NEW) P3.T7 re-homed to Phase 2 alongside the rest of the
#     mutation-scaffold work. Nightly only; never runs on the PR lane.
#   - .planning/trajectory/tickets/M02/P2.yml id=M02.P2.T7.
#
# What this lane does (the cross-oracle insight):
#
#   - cargo-mutants produces a "surviving mutant" when the unit test
#     suite fails to distinguish the original binary from the mutated
#     binary. Surviving mutants represent test gaps.
#   - The libFuzzer corpus shipped under fuzz/corpus/<target>/ is a
#     DIFFERENT oracle. It is the accumulated set of inputs libFuzzer
#     has explored across the M02 P1 + P2 lanes; many of them exercise
#     code paths the unit suite does not reach.
#   - Replaying the fuzz corpus against each surviving mutant lets the
#     two oracles cover one another. Mutants the unit suite missed but
#     which produce divergent libFuzzer behaviour show up here.
#
# Expected effect: 5-15% reduction in missed-mutant count plus an
# audit-ready cross-oracle story for the M02 release-qualification
# package. Always advisory; never fails the workflow.
#
# Schedule note: cron sits at 05:45 UTC, after mutants-nightly at 05:00
# (mutants.yml) and after the fuzz nightly at 03:23 (fuzz.yml). This
# avoids over-subscribing the GitHub-hosted runner pool against the
# shared 1,800 min/30d envelope.

name: mutants-fuzz-cocoverage

on:
  schedule:
    # 05:45 UTC nightly. Late enough that mutants-nightly (05:00) has a
    # head start producing surviving-mutant artifacts; this workflow can
    # run independently because it re-derives the surviving-mutant set
    # from a fresh cargo-mutants invocation. Source doc: nightly only.
    - cron: "45 5 * * *"
  workflow_dispatch:
    inputs:
      package:
        description: "Force a single crate (default: full matrix)"
        required: false
        type: string
      fuzz_runs:
        description: "Per-target libFuzzer replay runs (default: 200000)"
        required: false
        type: string
        default: "200000"

permissions:
  contents: read
  issues: write

concurrency:
  # Scheduled and dispatch runs do not collapse against one another;
  # let an on-demand sweep race a cron sweep without cancellation.
  group: mutants-fuzz-cocoverage-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  cocoverage:
    name: cocoverage (${{ matrix.package }})
    runs-on: ubuntu-latest
    # Source doc allots 4 h per crate for the cargo-mutants sweep; the
    # fuzz-replay phase adds a bounded budget on top. 300 min keeps
    # headroom under the GitHub 6 h cap.
    timeout-minutes: 300
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        package:
          - chio-kernel-core
          - chio-policy
          - chio-guards
          - chio-credentials
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip when forced package does not match
        id: forced
        run: |
          set -euo pipefail
          forced='${{ inputs.package }}'
          if [[ -n "${forced}" && "${forced}" != '${{ matrix.package }}' ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "skipping ${{ matrix.package }} (forced=${forced})"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install stable Rust toolchain
        if: steps.forced.outputs.skip == 'false'
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install nightly Rust toolchain (cargo-fuzz needs nightly)
        if: steps.forced.outputs.skip == 'false'
        run: |
          set -euo pipefail
          rustup toolchain install nightly --profile minimal
          rustup component add rust-src --toolchain nightly

      - name: Install cargo-mutants (pinned 25.x per Decision 12)
        if: steps.forced.outputs.skip == 'false'
        run: |
          set -euo pipefail
          # Decision 12: cargo-mutants pinned at 25.x; do not float.
          cargo install cargo-mutants --version '25.*' --locked

      - name: Install cargo-fuzz
        if: steps.forced.outputs.skip == 'false'
        run: |
          set -euo pipefail
          cargo install cargo-fuzz --locked

      - name: Verify shared 30-day fuzz/mutants budget
        if: steps.forced.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Cocoverage runs share the 1,800 min/30d envelope with
          # fuzz.yml and mutants.yml. The helper enumerates the
          # cflite_*.yml workflows today; soft fail so a missing-script
          # or API blip does not kill the advisory lane.
          if [[ -x scripts/check-fuzz-budget.sh ]]; then
            scripts/check-fuzz-budget.sh "${{ github.repository }}" || \
              echo "advisory: fuzz-budget check returned non-zero; continuing (advisory lane)"
          else
            echo "scripts/check-fuzz-budget.sh missing or non-executable; skipping budget check"
          fi

      - name: Run cargo-mutants to enumerate surviving mutants
        id: mutate
        if: steps.forced.outputs.skip == 'false'
        run: |
          set -euo pipefail
          mkdir -p mutants-out/${{ matrix.package }}
          # Full sweep, JSON outcomes so the cocoverage script can
          # iterate survivors machine-readably. examine_globs from
          # .cargo/mutants.toml + per-crate mutants.toml narrow scope to
          # trust-boundary modules. --timeout 600 caps any single
          # mutant at 10 minutes.
          cargo mutants \
            --package "${{ matrix.package }}" \
            --no-shuffle \
            --timeout 600 \
            --jobs 2 \
            --output mutants-out/${{ matrix.package }} \
            --json \
            || mutants_exit=$?
          echo "exit=${mutants_exit:-0}" >> "${GITHUB_OUTPUT}"
          ls -la mutants-out/${{ matrix.package }} || true

      - name: Replay fuzz corpus against surviving mutants
        id: cocoverage
        if: steps.forced.outputs.skip == 'false'
        env:
          FUZZ_RUNS: ${{ inputs.fuzz_runs || '200000' }}
        run: |
          set -euo pipefail
          mkdir -p cocoverage-out/${{ matrix.package }}
          # Always advisory: never fail the workflow on cocoverage
          # signal. The script enumerates surviving mutants, builds the
          # mutated binary, replays the matching fuzz corpus, and emits
          # a per-package summary.json plus a human-readable report.md.
          bash scripts/mutants-fuzz-cocoverage.sh \
            --package "${{ matrix.package }}" \
            --mutants-out "mutants-out/${{ matrix.package }}" \
            --corpus-root "fuzz/corpus" \
            --report-out "cocoverage-out/${{ matrix.package }}" \
            --fuzz-runs "${FUZZ_RUNS}" \
            || echo "advisory: cocoverage script returned non-zero; continuing"

      - name: Upload cocoverage report
        if: always() && steps.forced.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: mutants-fuzz-cocoverage-${{ matrix.package }}-${{ github.run_id }}
          path: |
            cocoverage-out/${{ matrix.package }}
            mutants-out/${{ matrix.package }}
          if-no-files-found: ignore
          retention-days: 30
