# fuzz.yml - Native cargo-fuzz scheduled matrix.
#
# In-tree `cargo +nightly fuzz` scheduled matrix. Complements the
# ClusterFuzzLite workflows:
#   - cflite_pr.yml    : PR-time changed-target sampling (60s/target)
#   - cflite_batch.yml : nightly ClusterFuzzLite rotation (1,800s/target)
#   - fuzz.yml (this)  : nightly native libFuzzer matrix (30 min/target, ASan)
#
# Per-target wall-time: 1,800s via `--max_total_time=1800` plus
# `timeout-minutes: 45`. Budget guard (`scripts/check-fuzz-budget.sh`)
# counts cflite + this workflow toward the 1,800 min/30d cap and refuses
# to fan out the matrix when the trailing total would breach it.
#
# The receipt_log_replay matrix slot is reserved; its per-target step
# short-circuits until the target binary lands in fuzz/Cargo.toml.

name: fuzz

on:
  schedule:
    # 03:23 UTC nightly. 23 minutes past the hour to dodge the cron
    # storm; 03:23 sits between cflite_batch (02:17) and the existing
    # nightly proptest lane (04:23) so the GHA runner pool is not
    # over-subscribed.
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Force a single fuzz target (default: full matrix)"
        required: false
        type: string
      max_total_time:
        description: "Override per-target wall-time budget in seconds (default 1800)"
        required: false
        type: string
        default: "1800"

permissions:
  contents: read
  security-events: write

concurrency:
  group: fuzz-scheduled
  cancel-in-progress: false

env:
  # Per-target wall-time budget in seconds. 30 minutes by default; the
  # workflow_dispatch override path lets operators dial down for a
  # smoke run without editing the file.
  CHIO_FUZZ_MAX_TOTAL_TIME: ${{ inputs.max_total_time || '1800' }}

jobs:
  fuzz-budget:
    name: fuzz-budget
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify 30-day fuzz budget
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Reuse the cflite budget guard; its WORKFLOWS array enumerates
          # every fuzz workflow (cflite_pr.yml, cflite_batch.yml, fuzz.yml)
          # against the 1,800-min/30-day cap.
          scripts/check-fuzz-budget.sh "${{ github.repository }}"

  fuzz-scheduled:
    name: fuzz-scheduled (${{ matrix.target }})
    needs: fuzz-budget
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - canonical_json
          - capability_receipt
          - manifest_roundtrip
          - attest_verify
          - jwt_vc_verify
          - oid4vp_presentation
          - did_resolve
          - anchor_bundle_verify
          - mcp_envelope_decode
          - a2a_envelope_decode
          - acp_envelope_decode
          - wasm_preinstantiate_validate
          - wit_host_call_boundary
          - chio_yaml_parse
          - openapi_ingest
          # reserved slot; per-step guard short-circuits until the binary lands
          - receipt_log_replay
    steps:
      # Cleanup C6: GHA `exit 0` only marks the step successful; it does
      # not skip subsequent steps in the same job. Set a `selected` step
      # output that every later step gates on so a `workflow_dispatch`
      # with `inputs.target` set short-circuits all the non-matching
      # matrix entries instead of running the full toolchain-install
      # plus fuzz-run pipeline 13 times.
      - name: Resolve forced-target selection
        id: select
        run: |
          set -euo pipefail
          forced='${{ inputs.target }}'
          if [[ -n "${forced}" && "${forced}" != "${{ matrix.target }}" ]]; then
            echo "skipping ${{ matrix.target }} (forced=${forced})"
            echo "selected=false" >> "${GITHUB_OUTPUT}"
          else
            echo "selected=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.select.outputs.selected == 'true'
        uses: actions/checkout@v4

      - name: Install nightly Rust toolchain
        if: steps.select.outputs.selected == 'true'
        run: |
          set -euo pipefail
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup default nightly

      - name: Install cargo-fuzz
        if: steps.select.outputs.selected == 'true'
        run: |
          set -euo pipefail
          cargo install cargo-fuzz --locked || cargo install cargo-fuzz

      - name: Confirm fuzz target binary exists
        id: confirm
        if: steps.select.outputs.selected == 'true'
        run: |
          set -euo pipefail
          if grep -qE "^name = \"${{ matrix.target }}\"" fuzz/Cargo.toml; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "fuzz target ${{ matrix.target }} not yet wired in fuzz/Cargo.toml; skipping (slot reserved)"
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build fuzz target with ASan
        if: steps.select.outputs.selected == 'true' && steps.confirm.outputs.exists == 'true'
        env:
          RUSTFLAGS: "-Z sanitizer=address"
        run: |
          set -euo pipefail
          cd fuzz
          cargo +nightly fuzz build --sanitizer address ${{ matrix.target }}

      - name: Run fuzz target (ASan, max_total_time = ${{ env.CHIO_FUZZ_MAX_TOTAL_TIME }}s)
        if: steps.select.outputs.selected == 'true' && steps.confirm.outputs.exists == 'true'
        run: |
          set -euo pipefail
          cd fuzz
          # libFuzzer flags:
          #   -max_total_time : per-target wall-time budget
          #   -timeout=25     : per-input timeout (matches PR #13 profile)
          #   -rss_limit_mb=2048 : per-target RSS ceiling
          # The corpus dir under fuzz/corpus/<target>/ seeds the run; if
          # the dir is empty libFuzzer starts from scratch.
          cargo +nightly fuzz run \
            --sanitizer address \
            ${{ matrix.target }} \
            -- \
            -max_total_time=${{ env.CHIO_FUZZ_MAX_TOTAL_TIME }} \
            -timeout=25 \
            -rss_limit_mb=2048

      - name: Upload crash artifacts
        if: failure() && steps.select.outputs.selected == 'true' && steps.confirm.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz/corpus/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 30
