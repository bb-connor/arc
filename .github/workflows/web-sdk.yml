name: web-sdk

on:
  push:
    branches: [main]
    paths:
      - 'crates/chio-kernel-browser/**'
      - 'sdks/typescript/packages/browser/**'
      - 'sdks/typescript/packages/workers/**'
      - 'sdks/typescript/packages/edge/**'
      - 'sdks/typescript/packages/deno/**'
      - 'sdks/typescript/packages/conformance/**'
      - '.github/workflows/web-sdk.yml'
  pull_request:
    paths:
      - 'crates/chio-kernel-browser/**'
      - 'sdks/typescript/packages/browser/**'
      - 'sdks/typescript/packages/workers/**'
      - 'sdks/typescript/packages/edge/**'
      - 'sdks/typescript/packages/deno/**'
      - 'sdks/typescript/packages/conformance/**'
      - '.github/workflows/web-sdk.yml'

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build wasm-pack targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack (pinned)
        run: cargo install wasm-pack --version "$(cat .tooling/wasm-pack.version)" --locked
      - name: Install wasm-bindgen-cli (pinned)
        run: cargo install wasm-bindgen-cli --version "$(cat .tooling/wasm-bindgen.version)" --locked
      - name: Cargo wasm32 build
        run: cargo build -p chio-kernel-browser --target wasm32-unknown-unknown --release
      - name: Build wasm-pack runtime targets
        run: |
          bash sdks/typescript/scripts/build-wasm.sh --package browser --target web
          bash sdks/typescript/scripts/build-wasm.sh --package workers --target bundler
          bash sdks/typescript/scripts/build-wasm.sh --package edge --target web
          bash sdks/typescript/scripts/build-wasm.sh --package deno --target web
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          if-no-files-found: error
          path: |
            sdks/typescript/packages/browser/pkg/
            sdks/typescript/packages/workers/dist/
            sdks/typescript/packages/edge/dist/
            sdks/typescript/packages/deno/dist/

  conformance:
    name: Conformance subset (${{ matrix.target }})
    needs: build-wasm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: browser
            budget_kb: 300
          - target: workers
            budget_kb: 350
          - target: edge
            budget_kb: 350
          - target: deno
            budget_kb: 400
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts
          path: sdks/typescript/packages/
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
      - name: Install JS deps
        run: |
          bun install --frozen-lockfile
          npm ci --prefix sdks/typescript/packages/conformance
      - name: Size budget gate (${{ matrix.target }} <= ${{ matrix.budget_kb }} KB gzip)
        env:
          TARGET: ${{ matrix.target }}
          BUDGET_KB: ${{ matrix.budget_kb }}
        run: bash sdks/typescript/scripts/size-budget.sh "${TARGET}" "${BUDGET_KB}"
      - name: Browser-subset conformance selector
        run: npm test --prefix sdks/typescript/packages/conformance -- browser-subset.test.ts
      - name: Browser smoke
        if: matrix.target == 'browser'
        run: bun run --filter @chio-protocol/browser build
      - name: Workers smoke (Miniflare)
        if: matrix.target == 'workers'
        run: bun run --filter @chio-protocol/workers test:miniflare
      - name: Edge smoke
        if: matrix.target == 'edge'
        run: bun run --filter @chio-protocol/edge test:vercel-edge-sim
      - name: Deno smoke
        if: matrix.target == 'deno'
        run: bun run --filter @chio-protocol/deno test:deno
      - name: Cold-start budget (Workers and Edge only)
        if: matrix.target == 'workers' || matrix.target == 'edge'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          package_dir="sdks/typescript/packages/${TARGET}"
          if node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('${package_dir}/package.json', 'utf8')); process.exit(pkg.scripts && pkg.scripts['bench:cold-start'] ? 0 : 1);"; then
            bun run --cwd "${package_dir}" bench:cold-start
          else
            echo "cold-start budget script not present for ${TARGET}; skipping"
          fi

  diff-tests:
    name: Browser canonical JSON differential
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Browser canonical JSON differential
        run: cargo test -p chio-formal-diff-tests --test browser_canonical_json_diff
