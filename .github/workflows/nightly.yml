# nightly.yml - Long-running QA jobs that the PR lane skips.

name: nightly

on:
  schedule:
    # 04:23 UTC nightly (off the cron-storm minute, separate from
    # cflite_batch's 02:17 UTC).
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Nightly-tier proptest case count; the PR-tier (256) lives in ci.yml.
  PROPTEST_CASES: "4096"
  # Pinned cargo-kani version; must agree with CHIO_KANI_VERSION in ci.yml.
  CHIO_KANI_VERSION: 0.67.0

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  proptest-nightly:
    name: proptest (nightly tier)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run proptest invariants (nightly case count)
        env:
          PROPTEST_CASES: ${{ env.PROPTEST_CASES }}
        run: |
          set -euo pipefail
          cargo test -p chio-core-types --test property_capability_algebra -- --nocapture
          cargo test -p chio-kernel-core --test property_evaluate -- --nocapture
          cargo test -p chio-credentials --test property_passport -- --nocapture
          cargo test -p chio-policy --test property_evaluate -- --nocapture

  # Nightly Apalache liveness lane for the RevocationPropagation TLA+ module.
  # Checks RevocationEventuallySeen (weak fairness on Propagate) at length=24
  # against MCRevocationPropagation.cfg (PROCS=4, CAPS=8).
  formal-tla-liveness:
    name: formal-tla-liveness (apalache liveness)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-formal-tla-liveness', github.ref) || format('main-{0}-formal-tla-liveness', github.sha) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Java runtime (apalache-mc requires Java 17+)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Apalache (pinned 0.50.x)
        shell: bash
        run: |
          set -euo pipefail
          ./tools/install-apalache.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Confirm apalache-mc on PATH
        shell: bash
        run: |
          set -euo pipefail
          command -v apalache-mc
          apalache-mc version || true

      - name: Apalache liveness check (RevocationEventuallySeen length=24)
        shell: bash
        # RevocationEventuallySeen is a temporal property (uses the
        # leads-to operator `~>` in formal/tla/RevocationPropagation.tla),
        # so it is supplied to Apalache via `--temporal=` and NOT `--inv=`.
        # `--inv=` is reserved for state invariants and would either error
        # out or silently mischeck the property. An earlier invocation used
        # `--inv=`; this was corrected after PR #66 review.
        run: |
          set -euo pipefail
          apalache-mc check \
            --length=24 \
            --temporal=RevocationEventuallySeen \
            --config=formal/tla/MCRevocationPropagation.cfg \
            formal/tla/RevocationPropagation.tla

  # Nightly Kani lane: runs the union of `lanes.pr` and `lanes.nightly_only`
  # from formal/rust-verification/kani-public-harnesses.toml. The PR job
  # (kani-public-pr in ci.yml) only runs `lanes.pr`; nightly runs everything
  # so harnesses in `lanes.nightly_only` still get daily coverage.
  kani-public-nightly:
    name: kani-public-nightly (lanes.pr + lanes.nightly_only)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-kani-public-nightly', github.ref) || format('main-{0}-kani-public-nightly', github.sha) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install cargo-kani
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/chio-kani-tool-target
        run: |
          set -euo pipefail
          cargo install kani-verifier --locked --version "${CHIO_KANI_VERSION}"
          cargo kani setup
          cargo kani --version

      - name: Run lanes.pr + lanes.nightly_only Kani harnesses
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
        run: |
          set -euo pipefail
          mapfile -t HARNESSES < <(python3 - <<'PY'
          from pathlib import Path
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          data = tomllib.loads(
              Path("formal/rust-verification/kani-public-harnesses.toml").read_text(encoding="utf-8")
          )
          seen = set()
          for lane in ("pr", "nightly_only"):
              for h in data["lanes"][lane]["harnesses"]:
                  if h not in seen:
                      seen.add(h)
                      print(h)
          PY
          )
          if [[ "${#HARNESSES[@]}" -eq 0 ]]; then
            echo "lanes.pr + lanes.nightly_only are both empty" >&2
            exit 1
          fi
          for harness in "${HARNESSES[@]}"; do
            echo "::group::cargo kani --harness ${harness}"
            cargo kani -p chio-kernel-core --lib --harness "${harness}" \
              --default-unwind 8 --no-unwinding-checks
            echo "::endgroup::"
          done
          echo "Nightly Kani sweep passed (${#HARNESSES[@]} harnesses)"
