# nightly.yml - Long-running QA jobs that the PR lane skips.
#
# Owned by SEQUENCER per OWNERS.toml; individual jobs are tagged with
# `# owner: M0X` per EXECUTION-BOARD.md section 5 "Workflow lane ownership".
# Today this file has two M03 lanes: the nightly proptest re-run with the
# higher case count (PROPTEST_CASES=4096 vs the PR-tier 256), and the
# Apalache liveness lane (RevocationEventuallySeen, length=24) landed by
# M03.P3.T4. M02's long-fuzz lane will follow when its scheduling ticket
# fires.

name: nightly

on:
  schedule:
    # 04:23 UTC nightly (off the cron-storm minute, separate from
    # cflite_batch's 02:17 UTC).
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # M03.P1.T6: nightly-tier proptest case count. Eighteen named
  # invariants across chio-core-types, chio-kernel-core, chio-credentials,
  # chio-policy run with this case count. The PR-tier (256) lives in
  # ci.yml; the gap between the two tiers is what surfaces shrink-friendly
  # algebra-bug seams that low-case-count PR runs miss.
  PROPTEST_CASES: "4096"
  # M03.P2.T6: pinned cargo-kani version for the nightly Kani lane.
  # Must agree with CHIO_KANI_VERSION in ci.yml; the two values are
  # the source of truth for kani-verifier installs in this repo.
  CHIO_KANI_VERSION: 0.67.0

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  proptest-nightly:
    name: proptest (nightly tier)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run proptest invariants (nightly case count)
        env:
          PROPTEST_CASES: ${{ env.PROPTEST_CASES }}
        run: |
          set -euo pipefail
          cargo test \
            -p chio-core-types --test property_capability_algebra \
            -p chio-kernel-core --test property_evaluate \
            -p chio-credentials --test property_passport \
            -p chio-policy --test property_evaluate \
            -- --nocapture

  # M03.P3.T4: nightly Apalache liveness lane for the RevocationPropagation
  # TLA+ module. Checks the named liveness property RevocationEventuallySeen
  # (weak fairness on Propagate; see formal/tla/RevocationPropagation.tla
  # M03.P3.T3) at length=24 against MCRevocationPropagation.cfg
  # (PROCS=4, CAPS=8). Counterexample triage runs through
  # formal/issue-templates/liveness-counterexample.md per the
  # `Liveness lane` section of
  # .planning/trajectory/03-capability-algebra-properties.md.
  formal-tla-liveness:
    name: formal-tla-liveness (apalache liveness)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-formal-tla-liveness', github.ref) || format('main-{0}-formal-tla-liveness', github.sha) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Java runtime (apalache-mc requires Java 17+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Apalache (pinned 0.50.x)
        shell: bash
        run: |
          set -euo pipefail
          ./tools/install-apalache.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Confirm apalache-mc on PATH
        shell: bash
        run: |
          set -euo pipefail
          command -v apalache-mc
          apalache-mc version || true

      - name: Apalache liveness check (RevocationEventuallySeen length=24)
        shell: bash
        run: |
          set -euo pipefail
          apalache-mc check \
            --length=24 \
            --inv=RevocationEventuallySeen \
            --config=formal/tla/MCRevocationPropagation.cfg \
            formal/tla/RevocationPropagation.tla

  # M03.P2.T6: nightly Kani lane that runs the union of `lanes.pr` and
  # `lanes.nightly_only` from formal/rust-verification/kani-public-harnesses.toml.
  # The PR job (kani-public-pr in ci.yml) only runs `lanes.pr`; nightly
  # runs everything so that any harness moved into `lanes.nightly_only`
  # (currently empty after T6's wall-clock sweep) still gets daily
  # coverage. Each harness is invoked with the same flags as the PR
  # lane: `cargo kani -p chio-kernel-core --lib --harness <h>
  # --default-unwind 8 --no-unwinding-checks`.
  kani-public-nightly:
    name: kani-public-nightly (lanes.pr + lanes.nightly_only)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-kani-public-nightly', github.ref) || format('main-{0}-kani-public-nightly', github.sha) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-kani
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/chio-kani-tool-target
        run: |
          set -euo pipefail
          cargo install kani-verifier --locked --version "${CHIO_KANI_VERSION}"
          cargo kani setup
          cargo kani --version

      - name: Run lanes.pr + lanes.nightly_only Kani harnesses
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
        run: |
          set -euo pipefail
          mapfile -t HARNESSES < <(python3 - <<'PY'
          from pathlib import Path
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          data = tomllib.loads(
              Path("formal/rust-verification/kani-public-harnesses.toml").read_text(encoding="utf-8")
          )
          seen = set()
          for lane in ("pr", "nightly_only"):
              for h in data["lanes"][lane]["harnesses"]:
                  if h not in seen:
                      seen.add(h)
                      print(h)
          PY
          )
          if [[ "${#HARNESSES[@]}" -eq 0 ]]; then
            echo "lanes.pr + lanes.nightly_only are both empty" >&2
            exit 1
          fi
          for harness in "${HARNESSES[@]}"; do
            echo "::group::cargo kani --harness ${harness}"
            cargo kani -p chio-kernel-core --lib --harness "${harness}" \
              --default-unwind 8 --no-unwinding-checks
            echo "::endgroup::"
          done
          echo "Nightly Kani sweep passed (${#HARNESSES[@]} harnesses)"
