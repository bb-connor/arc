# chio-replay-gate.yml - Deterministic-replay corpus gate (M04 P2.T2 + T3).
#
# Source-doc anchor: .planning/trajectory/04-deterministic-replay.md
#   - Phase 2 ("CI gate and bless workflow", lines ~206-244): the workflow
#     runs the chio-replay-gate corpus on every PR and on push to main /
#     project/* branches; the `--bless` path is the only way to update
#     goldens and is gated programmatically by `tests/replay/src/bless.rs`
#     (M04.P2.T1).
#   - "CHIO_BLESS gate logic" (lines ~474-503): CI is explicitly banned
#     from blessing. This workflow sets `CHIO_BLESS=0` and the binary
#     refuses any bless invocation when `CI=true`. There is no
#     "auto-bless on green" path.
#   - "Test signing key management" (lines ~550-568): the `seed-immutable`
#     job below hashes `tests/replay/test-key.seed` on every PR / push and
#     fails closed if the digest drifts from the workflow-pinned
#     `EXPECTED_SEED_SHA256` baseline (NOT the in-tree `.sha256` file
#     alone). Rotating the seed requires (a) bumping
#     `EXPECTED_SEED_SHA256` here in the workflow, (b) updating the
#     in-tree `.sha256` to match, (c) re-blessing the entire corpus, (d)
#     shipping an explicit `feat!:` commit. Routine PRs cannot change
#     the seed.
#
# T2 scope seeded a single Linux `replay-gate` job that exercises the
# corpus_smoke test. T3 (this layer) adds:
#   - `macos-smoke`: read-only confirmation that the gate does not depend
#     on Linux-only filesystem semantics (no bless, no goldens write).
#   - `seed-immutable`: PR / push guard that locks the test signing seed.
# Determinism canary and goldens-size budget remain follow-ons listed in
# the doc's "New sub-tasks" section.
#
# Determinism contract: `LC_ALL=C` and `LANG=C` are pinned at the workflow
# level so receipt serialisation, sort orderings, and any locale-sensitive
# output are reproducible across the Linux runner. `CARGO_INCREMENTAL=0`
# pins out incremental codegen so the build contributes no host-specific
# state to the receipts the gate compares.
#
# Required-on-main: the `replay-gate / replay-gate (linux)` check should be
# promoted to a required status check on the branch ruleset for `main`
# alongside the existing `check`, `msrv`, and freeze-guard required checks
# (see ci.yml's required-check inventory). The ruleset itself is managed
# out-of-band; this workflow is the producer of the check.

name: chio-replay-gate

on:
  pull_request:
  push:
    branches:
      - main
      - 'project/**'

concurrency:
  group: chio-replay-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # Determinism pins: receipt byte-equivalence depends on a stable locale
  # (string sort orders, number formatting) and a non-incremental codegen
  # path. CHIO_BLESS=0 is the CI bless ban from
  # .planning/trajectory/04-deterministic-replay.md "CHIO_BLESS gate logic".
  LC_ALL: C
  LANG: C
  CHIO_BLESS: "0"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  replay-gate:
    name: replay-gate (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Confirm CI cannot bless
        # Defence in depth on top of the binary's CI=true refusal: if
        # CHIO_BLESS leaks in via a misconfigured runner, fail the job
        # before any test step executes.
        run: |
          set -euo pipefail
          if [ "${CHIO_BLESS:-0}" != "0" ]; then
            echo "ERROR: CHIO_BLESS must be 0 in CI; got '${CHIO_BLESS}'" >&2
            exit 1
          fi
          echo "CHIO_BLESS=${CHIO_BLESS} (CI bless ban honoured)"

      - name: Build chio-replay-gate (release)
        run: cargo build -p chio-replay-gate --release

      - name: Run replay-gate corpus smoke
        run: cargo test -p chio-replay-gate --release --test corpus_smoke

      - name: Run replay-gate golden byte-equivalence (when goldens land)
        # The golden_byte_equivalence integration test arrives in M04.P2.T5
        # together with the initial bless of the 50 goldens. Until then
        # the test target source file may be absent; skip-on-missing keeps
        # the gate green for the T2 commit while still wiring the
        # invocation. Once T5 lands this branch becomes the gating
        # assertion (zero diffs vs. blessed goldens).
        #
        # Fail-closed contract (cleanup-c2): the previous form was
        #
        #     if cargo test ... --no-run --quiet 2>/dev/null; then
        #       cargo test ...
        #     else
        #       echo "skipping"
        #     fi
        #
        # which silently swallowed real compile errors in the test target
        # (or any transitive workspace dependency) by routing them into
        # the skip branch. The gate failed open. The shape below splits
        # the two concerns:
        #
        #   1. Target-presence probe: a plain file-existence check on the
        #      test source by Cargo convention
        #      (`tests/replay/tests/<name>.rs`). This is the only
        #      legitimate reason to skip, and it cannot be triggered by a
        #      compile failure.
        #   2. Compile-then-run: `--no-run` forces a compile without
        #      execution; we do NOT redirect stderr and we do NOT branch
        #      on its exit. A non-zero exit here propagates out (set -e)
        #      and fails the gate. Once compile succeeds we run the
        #      target unconditionally.
        run: |
          set -euo pipefail

          target_src="tests/replay/tests/golden_byte_equivalence.rs"
          if [ ! -f "${target_src}" ]; then
            echo "golden_byte_equivalence source ${target_src} not present (pre-T5 state); skipping"
            exit 0
          fi

          # Compile must succeed. A failure here is a real defect (compile
          # error in golden_byte_equivalence or a transitive workspace
          # dep), not a missing-target signal, and must fail the gate.
          cargo test -p chio-replay-gate --release --test golden_byte_equivalence --no-run

          # Compile passed; the target exists and links. Run it.
          cargo test -p chio-replay-gate --release --test golden_byte_equivalence

  macos-smoke:
    # T3 scope: read-only macOS smoke. The Linux `replay-gate` job is the
    # required-on-main check; this job exists to surface platform-specific
    # determinism breakage (filesystem case folding, BSD vs GNU coreutils,
    # APFS atime quirks) before it hits a contributor's local machine. It
    # runs the same corpus_smoke test as the Linux job but never blesses
    # and never builds the full release artifact tree.
    name: replay-gate (macos read-only)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        # Homebrew is preinstalled on macos-latest runners. `brew install`
        # is a no-op when the formula is already present.
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2

      - name: Confirm CI cannot bless
        # Mirror the Linux defence in depth: even on a read-only smoke
        # runner, surface a misconfigured CHIO_BLESS before any test step
        # runs.
        run: |
          set -euo pipefail
          if [ "${CHIO_BLESS:-0}" != "0" ]; then
            echo "ERROR: CHIO_BLESS must be 0 in CI; got '${CHIO_BLESS}'" >&2
            exit 1
          fi
          echo "CHIO_BLESS=${CHIO_BLESS} (CI bless ban honoured)"

      - name: Run replay-gate corpus smoke (read-only)
        # Note: no `--release` build of the gate binary on macOS; the
        # smoke test target compiles what it needs. The Linux job is the
        # canonical artifact producer.
        run: cargo test -p chio-replay-gate --test corpus_smoke

  seed-immutable:
    # T3 scope: lock `tests/replay/test-key.seed` against routine
    # mutation. Source-doc anchor:
    # .planning/trajectory/04-deterministic-replay.md "Test signing key
    # management" (lines ~550-568). The job fails closed on four classes
    # of mutation:
    #   1. seed file missing
    #   2. seed file world-writable (`stat` mode bit `0o002` set)
    #   3. sha256(seed) != EXPECTED_SEED_SHA256 (workflow-pinned baseline)
    #   4. contents of test-key.seed.sha256 != EXPECTED_SEED_SHA256
    #      (drift between in-tree documentation and workflow baseline)
    # Rotating the seed is intentionally a multi-step ceremony: bump the
    # workflow's pinned EXPECTED_SEED_SHA256, update the in-tree
    # `.sha256` file to match, re-bless the corpus, and ship a `feat!:`
    # commit. A routine PR cannot drift the seed past this guard.
    #
    # Trusted-baseline note (cleanup-c2): an earlier revision of this job
    # compared sha256(seed) against the in-tree `test-key.seed.sha256`
    # alone. That gate is bypassable: a single PR can mutate BOTH the
    # seed and the .sha256 in lockstep and the check passes. The
    # `EXPECTED_SEED_SHA256` constant below is the workflow's protected
    # baseline; rotating it forces an explicit, code-reviewed workflow
    # change separate from any test-fixture edits, which is what the
    # "feat!:" rotation ceremony actually requires.
    name: seed-immutable
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Pinned baseline. Mutating this value is the only way to rotate
      # the test signing seed; doing so requires editing this workflow,
      # which is a code-reviewed change distinct from edits to
      # tests/replay/test-key.seed{,.sha256}. Keep this in sync with
      # tests/replay/test-key.seed.sha256 only when intentionally
      # rotating; routine PRs must never touch this constant.
      EXPECTED_SEED_SHA256: "b32580c7001b8ad7cc9d29d4f8d4faf2ad067db558add9bb7e02bf8f5f9a01af"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify test signing seed is intact
        run: |
          set -euo pipefail
          seed="tests/replay/test-key.seed"
          sha_file="tests/replay/test-key.seed.sha256"

          if [ ! -f "${seed}" ]; then
            echo "ERROR: ${seed} is missing." >&2
            echo "rotate-seed runbook: see .planning/trajectory/04-deterministic-replay.md 'Test signing key management'." >&2
            exit 1
          fi
          if [ ! -f "${sha_file}" ]; then
            echo "ERROR: ${sha_file} is missing." >&2
            echo "rotate-seed runbook: see .planning/trajectory/04-deterministic-replay.md 'Test signing key management'." >&2
            exit 1
          fi

          # Refuse world-writable seeds. `stat -c %a` returns the octal
          # mode (e.g. `644`); the trailing digit covers the `o` triad.
          mode="$(stat -c '%a' "${seed}")"
          other_bits="${mode: -1}"
          if [ $((other_bits & 2)) -ne 0 ]; then
            echo "ERROR: ${seed} is world-writable (mode ${mode})." >&2
            echo "rotate-seed runbook: chmod o-w on the seed and re-push; routine PRs cannot relax permissions." >&2
            exit 1
          fi

          # Compute the digest and compare against the workflow-pinned
          # baseline (NOT the in-tree .sha256 alone; see job-level note).
          # The .sha256 file is a single 64-char hex line, no filename
          # suffix (deliberately not `sha256sum -c` format so we can keep
          # the runbook message tight).
          actual="$(sha256sum "${seed}" | awk '{print $1}')"
          documented="$(tr -d '[:space:]' < "${sha_file}")"
          expected="${EXPECTED_SEED_SHA256}"

          if [ "${actual}" != "${expected}" ]; then
            echo "ERROR: ${seed} digest mismatch against workflow-pinned baseline." >&2
            echo "  workflow-pinned EXPECTED_SEED_SHA256: ${expected}" >&2
            echo "  actual sha256(${seed}):              ${actual}" >&2
            echo "rotate-seed runbook: routine PRs cannot mutate the test signing seed." >&2
            echo "  To rotate (all four steps required):" >&2
            echo "    (a) bump EXPECTED_SEED_SHA256 in .github/workflows/chio-replay-gate.yml," >&2
            echo "    (b) update tests/replay/test-key.seed.sha256 to match," >&2
            echo "    (c) re-bless the entire corpus via scripts/bless-replay-goldens.sh," >&2
            echo "    (d) ship an explicit 'feat!:' commit." >&2
            echo "  Bumping (b) without (a) will not pass this gate; that is intentional." >&2
            echo "  See .planning/trajectory/04-deterministic-replay.md 'Test signing key management'." >&2
            exit 1
          fi

          if [ "${documented}" != "${expected}" ]; then
            echo "ERROR: ${sha_file} does not match workflow-pinned baseline." >&2
            echo "  workflow-pinned EXPECTED_SEED_SHA256: ${expected}" >&2
            echo "  in-tree ${sha_file}: ${documented}" >&2
            echo "rotate-seed runbook: the in-tree .sha256 is documentation; the workflow baseline is the trust root." >&2
            echo "  To resolve, either revert ${sha_file} to ${expected}, or follow the four-step rotation ceremony above." >&2
            exit 1
          fi

          echo "seed-immutable: ${seed} digest matches workflow-pinned ${expected} (mode ${mode})"

  cross-version:
    # M04 P3.T5 scope: cross-version receipt-compatibility sanity job.
    # Runs the non-ignored sanity test in tests/replay/tests/cross_version_replay.rs
    # which asserts the release_compat_matrix.toml file parses and contains
    # at least the floor entries (v0.1.0 + v2.0). The full re-verify suite
    # (`-- --ignored`) needs live HTTPS to the release CDN and tagged-release
    # bundles, so it is intentionally not part of the default gate; see the
    # exit-test note in .planning/trajectory/04-deterministic-replay.md
    # Phase 3 ("CI job chio-replay-gate / cross-version is green").
    name: cross-version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: replay-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: Run cross_version_replay (non-ignored sanity)
        run: cargo test -p chio-replay-gate --test cross_version_replay
