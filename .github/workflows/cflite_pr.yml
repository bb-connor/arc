# cflite_pr.yml - ClusterFuzzLite PR smoke (M02-owned).
#
# Reference: .planning/trajectory/02-fuzzing-post-pr13.md.
# Decision lock: .planning/trajectory/decisions.yml id=continuous-fuzzing-path.
#
# Default mode is changed-target sampling. We diff the PR against its
# merge base, look up which fuzz targets each changed source-path glob in
# fuzz/target-map.toml triggers, and run only those targets at 60 seconds
# each. Heavy targets are bounded by the global fuzz-budget cap so a busy
# week of PRs cannot burn through the public-repo 2,000 min/month free
# tier.
#
# Opt-in PR label `fuzz: full` switches the run from changed-target
# sampling to a full-corpus sweep at 120 seconds per target (release-cut
# PRs and trust-boundary edits). The label decision is honored only if the
# trailing-30d budget check still passes; the budget script is the hard
# halt.
#
# Required check name: cflite_pr / changed-target-sampling
# (advisory until M02 P1 lands; promoted to required at the M02 P1 wave gate)

name: cflite_pr

on:
  pull_request:
    # `labeled` is required so adding the `fuzz: full` label to an
    # already-open PR triggers a fresh run; without it the opt-in
    # full-corpus sweep would only fire on the next commit / manual
    # rerun, which makes the escalation unreliable for the high-risk
    # PRs it is meant to cover.
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    paths:
      - "crates/**"
      - "fuzz/**"
      - "spec/schemas/**"
      - "tests/bindings/vectors/**"
      - ".github/workflows/cflite_pr.yml"
      - ".clusterfuzzlite/**"
      - "scripts/check-fuzz-budget.sh"

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: cflite-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Default per-target wall budget for changed-target sampling. The
  # `fuzz: full` PR label promotes this to 120s via a step-level override.
  CHIO_FUZZ_DURATION_SECONDS: "60"
  CHIO_FUZZ_DURATION_SECONDS_FULL: "120"

jobs:
  budget-check:
    name: fuzz-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq + jq
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          curl -fsSL --retry 3 \
            "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" \
            -o "${HOME}/.local/bin/yq"
          chmod +x "${HOME}/.local/bin/yq"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
      - name: Verify 30-day fuzz budget
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/check-fuzz-budget.sh "${{ github.repository }}"

  changed-target-sampling:
    name: changed-target-sampling
    needs: budget-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.local/bin"
          curl -fsSL --retry 3 \
            "https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64" \
            -o "${HOME}/.local/bin/yq"
          chmod +x "${HOME}/.local/bin/yq"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Detect corpus storage availability
        id: corpus
        env:
          FUZZ_CORPUS_PAT: ${{ secrets.FUZZ_CORPUS_PAT }}
        run: |
          set -euo pipefail
          if [ -n "${FUZZ_CORPUS_PAT}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Detect fuzz-full label
        id: mode
        env:
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          if printf '%s' "${LABELS_JSON}" | grep -q '"fuzz: full"'; then
            echo "fuzz: full label present; promoting to all-target sweep"
            {
              echo "full=true"
              echo "fuzz_seconds=${CHIO_FUZZ_DURATION_SECONDS_FULL}"
              echo "cflite_mode=batch"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "default mode: changed-target sampling at 60s per target"
            {
              echo "full=false"
              echo "fuzz_seconds=${CHIO_FUZZ_DURATION_SECONDS}"
              echo "cflite_mode=code-change"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Compute changed targets
        id: targets
        if: steps.mode.outputs.full == 'false'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "${base_sha}" "${head_sha}" > changed.txt
          mapfile -t targets < <(yq -p=toml -r '.targets | keys | .[]' \
            fuzz/target-map.toml)
          fired=()
          for tgt in "${targets[@]}"; do
            mapfile -t triggers < <(yq -p=toml -r \
              ".targets.${tgt}.triggers[]" fuzz/target-map.toml)
            for trig in "${triggers[@]}"; do
              regex="$(printf '%s' "${trig}" | sed -e 's|\.|\\.|g' \
                -e 's|\*\*|__DSTAR__|g' -e 's|\*|[^/]*|g' \
                -e 's|__DSTAR__|.*|g')"
              if grep -qE "^${regex}$" changed.txt; then
                fired+=("${tgt}")
                break
              fi
            done
          done
          # Builder-image fallback: edits under `.clusterfuzzlite/**`
          # (Dockerfile, build.sh, project.yaml) do not appear in
          # `fuzz/target-map.toml` triggers, but they can break the
          # CFLite builder image without any target firing. Force the
          # full-target inventory when only-builder edits are detected
          # so the smoke run still exercises every fuzz target through
          # the new builder image.
          if grep -qE '^\.clusterfuzzlite/' changed.txt; then
            echo "builder-image edit detected; firing the full inventory"
            fired=("${targets[@]}")
          fi
          if ((${#fired[@]} == 0)); then
            : > fired.txt
          else
            printf '%s\n' "${fired[@]}" | sort -u > fired.txt
          fi
          fired_count="$(wc -l < fired.txt | tr -d ' ')"
          printf 'fired targets: %s\n' "${fired_count}"
          cat fired.txt
          {
            echo "count=${fired_count}"
            printf 'targets<<EOF\n%s\nEOF\n' "$(cat fired.txt)"
          } >> "${GITHUB_OUTPUT}"

      - name: Skip if no targets fired (changed-target mode)
        if: steps.mode.outputs.full == 'false' && steps.targets.outputs.count == '0'
        run: |
          echo "no fuzz target triggered by this diff; PR smoke is a no-op"

      - name: Run ClusterFuzzLite changed-target sampling with corpus storage
        if: steps.mode.outputs.full == 'false' && steps.targets.outputs.count != '0' && steps.corpus.outputs.enabled == 'true'
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          language: rust
          fuzz-time: ${{ steps.mode.outputs.fuzz_seconds }}
          mode: code-change
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # storage-repo is an action input (not a project.yaml field) per
          # ClusterFuzzLite docs. The PAT-backed URL is required because
          # GITHUB_TOKEN cannot write the sibling private corpus repo.
          storage-repo: https://${{ secrets.FUZZ_CORPUS_PAT }}@github.com/bb-connor/arc-fuzz-corpus.git
          report-unreproducible-crashes: false

      - name: Run ClusterFuzzLite changed-target sampling without corpus storage
        if: steps.mode.outputs.full == 'false' && steps.targets.outputs.count != '0' && steps.corpus.outputs.enabled != 'true'
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          language: rust
          fuzz-time: ${{ steps.mode.outputs.fuzz_seconds }}
          mode: code-change
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-unreproducible-crashes: false

      - name: "Run ClusterFuzzLite full-corpus sweep with corpus storage (fuzz-full label)"
        if: steps.mode.outputs.full == 'true' && steps.corpus.outputs.enabled == 'true'
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          language: rust
          fuzz-time: ${{ steps.mode.outputs.fuzz_seconds }}
          mode: batch
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
          storage-repo: https://${{ secrets.FUZZ_CORPUS_PAT }}@github.com/bb-connor/arc-fuzz-corpus.git
          report-unreproducible-crashes: false

      - name: "Run ClusterFuzzLite full-corpus sweep without corpus storage (fuzz-full label)"
        if: steps.mode.outputs.full == 'true' && steps.corpus.outputs.enabled != 'true'
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          language: rust
          fuzz-time: ${{ steps.mode.outputs.fuzz_seconds }}
          mode: batch
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
          report-unreproducible-crashes: false

      - name: Upload crash reports
        if: failure() && (steps.mode.outputs.full == 'true' || steps.targets.outputs.count != '0')
        uses: actions/upload-artifact@v4
        with:
          name: cflite-pr-crashes-${{ github.event.pull_request.number }}
          path: ./out/artifacts
          if-no-files-found: ignore
          retention-days: 14
