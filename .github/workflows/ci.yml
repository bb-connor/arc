name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Lean 4 toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - uses: Swatinem/rust-cache@v2

      - name: Workspace CI lane
        run: ./scripts/ci-workspace.sh

      - name: SDK parity contract lane
        run: ./scripts/check-sdk-parity.sh

  msrv:
    name: MSRV build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.93.0

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: MSRV workspace lane
        env:
          CARGO_BUILD_JOBS: "1"
          CARGO_TARGET_DIR: ${{ runner.temp }}/arc-msrv-target
          RUSTFLAGS: "-D warnings -C debuginfo=0"
        run: cargo build --workspace && cargo test --workspace --exclude arc-conformance

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cargo-tarpaulin
        # Install tarpaulin on the host so run-coverage.sh takes the
        # local branch instead of falling back to the
        # `xd009642/tarpaulin` docker image (which has no protoc and
        # therefore breaks arc-envoy-ext-authz's tonic-build).
        run: cargo install cargo-tarpaulin --locked --version 0.31.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Coverage lane
        env:
          COVERAGE_FAIL_UNDER: "65"
          COVERAGE_ROOT: ${{ runner.temp }}/arc-coverage
          TARPAULIN_TARGET_DIR: ${{ runner.temp }}/arc-tarpaulin-target
          TARPAULIN_LOCAL_LLVM_PROFILE_FILE: ${{ runner.temp }}/arc-tarpaulin-target/build_rs_cov-%p-%m.profraw
          CARGO_BUILD_JOBS: "1"
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "-D warnings -C debuginfo=0"
        run: ./scripts/run-coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ runner.temp }}/arc-coverage
          retention-days: 21
