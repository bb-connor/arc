name: CI

# M09.P1.T11: required-check inventory.
#
# GitHub branch rulesets match required checks by the **reported check
# context name** (`name:` field on each job), NOT by job id. The
# previous inventory listed job ids (`check`, `msrv`) which would
# silently configure non-existent checks and leave PRs blocked waiting
# for statuses that never arrive (cleanup-c11c; PR #40 review thread
# r3142883192). The names below match the `name:` of each gating job
# verbatim. When adding or renaming a job that should gate merges,
# update this inventory in the same commit so the ruleset and the
# workflow stay in lockstep.
#
#   required (reported check context names):
#     - "Build, lint, test"                                  # check job
#     - "MSRV build and test"                                # msrv job
#     - "cargo-vet (supply-chain audit)"                     # cargo-vet job
#     - "cargo-deny (supply-chain bans/advisories/licenses)" # cargo-deny job
#     - "freeze-guard"                                       # m05-freeze-guard.yml
#
#   advisory (do not gate):
#     - "JVM build", "Coverage", "Mutants"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CHIO_CI_RUSTFLAGS: "-D warnings -C link-arg=-Wl,--threads=1"
  CHIO_ELAN_VERSION: v4.2.1
  CHIO_ELAN_TARBALL_SHA256: 4e717523217af592fa2d7b9c479410a31816c065d66ccbf0c2149337cfec0f5c
  CHIO_AENEAS_RELEASE_TAG: build-2026.04.22.215158-38d10a22642d75d051e14006cc6e45055381f10e
  CHIO_AENEAS_LINUX_X86_64_SHA256: 11b4e88776655c9fd5e391bfd2824e8b52916590962fbcb392768c57b7b32ca7
  CHIO_CREUSOT_REV: a12f3ac7f688c7b93cee2c2eb60282004a2bdb30
  CHIO_KANI_VERSION: 0.67.0
  # M03.P1.T6: PR-tier proptest case count for the eighteen named
  # invariants (chio-core-types/property_capability_algebra,
  # chio-kernel-core/property_evaluate, chio-credentials/property_passport,
  # chio-policy/property_evaluate). The nightly tier (4096) lives in
  # .github/workflows/nightly.yml; the gap surfaces algebra-bug seams
  # that low-case-count PR runs miss.
  PROPTEST_CASES: "256"

jobs:
  jvm-build:
    name: JVM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Check JVM formatting
        working-directory: sdks/jvm
        run: ./gradlew spotlessCheck --no-daemon
      - name: Build JVM modules
        working-directory: sdks/jvm
        run: ./gradlew build --no-daemon

  check:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Restore Lean 4 toolchain cache
        id: elan-cache
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: ${{ runner.os }}-elan-${{ env.CHIO_ELAN_VERSION }}-${{ env.CHIO_ELAN_TARBALL_SHA256 }}-${{ hashFiles('formal/lean4/Chio/lean-toolchain') }}

      - name: Install Lean 4 toolchain
        if: steps.elan-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/leanprover/elan/releases/download/${CHIO_ELAN_VERSION}/elan-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/elan-x86_64-unknown-linux-gnu.tar.gz
          echo "${CHIO_ELAN_TARBALL_SHA256}  /tmp/elan-x86_64-unknown-linux-gnu.tar.gz" | sha256sum -c -
          tar -xzf /tmp/elan-x86_64-unknown-linux-gnu.tar.gz -C /tmp
          /tmp/elan-init -y --default-toolchain none

      - name: Configure Lean 4 toolchain path
        shell: bash
        run: |
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          echo "ELAN_HOME=$HOME/.elan" >> "$GITHUB_ENV"

      - name: Prime Lean 4 toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain="$(tr -d '\r\n' < formal/lean4/Chio/lean-toolchain)"
          if ! "$HOME/.elan/bin/elan" toolchain list | tr -d '\r' | grep -Fq "$toolchain"; then
            for attempt in 1 2 3 4 5; do
              if "$HOME/.elan/bin/elan" toolchain install "$toolchain"; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                exit 1
              fi
              sleep $((attempt * 5))
            done
          fi
          (
            cd formal/lean4/Chio
            "$HOME/.elan/bin/lake" --version
          )

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - name: Install Aeneas and Charon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/chio-aeneas-bin"
          archive="${RUNNER_TEMP}/aeneas-linux-x86_64.tar.gz"
          curl -fsSL \
            "https://github.com/AeneasVerif/aeneas/releases/download/${CHIO_AENEAS_RELEASE_TAG}/aeneas-linux-x86_64.tar.gz" \
            -o "${archive}"
          echo "${CHIO_AENEAS_LINUX_X86_64_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" -C "${RUNNER_TEMP}/chio-aeneas-bin" aeneas charon charon-driver
          chmod +x \
            "${RUNNER_TEMP}/chio-aeneas-bin/aeneas" \
            "${RUNNER_TEMP}/chio-aeneas-bin/charon" \
            "${RUNNER_TEMP}/chio-aeneas-bin/charon-driver"
          echo "${RUNNER_TEMP}/chio-aeneas-bin" >> "${GITHUB_PATH}"
          echo "CHIO_CHARON=${RUNNER_TEMP}/chio-aeneas-bin/charon" >> "${GITHUB_ENV}"
          "${RUNNER_TEMP}/chio-aeneas-bin/aeneas" --help >/dev/null
          "${RUNNER_TEMP}/chio-aeneas-bin/charon" --help >/dev/null

      - uses: Swatinem/rust-cache@v2

      - name: Install Rust verification tools
        shell: bash
        env:
          OPAMYES: "1"
          OPAMCONFIRMLEVEL: "unsafe-yes"
          CARGO_TARGET_DIR: ${{ runner.temp }}/chio-verification-tool-target
        run: |
          set -euo pipefail
          cargo install kani-verifier --locked --version "${CHIO_KANI_VERSION}"
          cargo kani setup
          sudo apt-get update
          sudo apt-get install -y opam
          opam init --disable-sandboxing --bare -y
          git clone https://github.com/creusot-rs/creusot "${RUNNER_TEMP}/creusot"
          git -C "${RUNNER_TEMP}/creusot" checkout "${CHIO_CREUSOT_REV}"
          (
            cd "${RUNNER_TEMP}/creusot"
            ./INSTALL
          )
          cargo creusot version
          cargo kani --version

      - name: Install portable qualification dependencies
        run: |
          cargo install wasm-pack --locked
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --locked
          fi
          rustup target add aarch64-linux-android
          sudo apt-get update
          if ! sudo apt-get install -y chromium-driver chromium; then
            sudo apt-get install -y chromium-driver chromium-browser
          fi

      # M03.P1.T7: gate the eighteen named capability-algebra invariants.
      # Source of truth for the name set is in the script itself, mirroring
      # .planning/trajectory/03-capability-algebra-properties.md Phase 1.
      # A silent rename of any invariant fn fails this step before the
      # workspace lane builds.
      - name: Proptest invariant coverage
        run: ./scripts/check-proptest-coverage.sh

      - name: Workspace CI lane
        env:
          CARGO_BUILD_JOBS: "1"
          RUSTFLAGS: "${{ env.CHIO_CI_RUSTFLAGS }} -C debuginfo=0"
        run: ./scripts/ci-workspace.sh

      - name: Portable browser qualification
        env:
          CARGO_BUILD_JOBS: "1"
        run: ./scripts/qualify-portable-browser.sh

      - name: Portable mobile qualification
        env:
          CARGO_BUILD_JOBS: "1"
        run: ./scripts/qualify-mobile-kernel.sh

      - name: SDK parity contract lane
        env:
          RUSTFLAGS: "${{ env.CHIO_CI_RUSTFLAGS }}"
        run: ./scripts/check-sdk-parity.sh

  msrv:
    name: MSRV build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.93.0 --profile minimal
          rustup default 1.93.0

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2

      - name: MSRV workspace lane
        env:
          CARGO_BUILD_JOBS: "1"
          CARGO_TARGET_DIR: ${{ runner.temp }}/chio-msrv-target
          RUSTFLAGS: "${{ env.CHIO_CI_RUSTFLAGS }} -C debuginfo=0"
        run: |
          cargo build --workspace
          cargo test --workspace --exclude chio-conformance --exclude chio-wasm-guards
          cargo test -p chio-wasm-guards --lib

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cargo-tarpaulin
        # Install tarpaulin on the host so run-coverage.sh takes the
        # local branch instead of falling back to the
        # `xd009642/tarpaulin` docker image (which has no protoc and
        # therefore breaks chio-envoy-ext-authz's tonic-build).
        run: cargo install cargo-tarpaulin --locked --version 0.31.2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Coverage lane
        env:
          COVERAGE_FAIL_UNDER: "65"
          COVERAGE_ROOT: ${{ runner.temp }}/chio-coverage
          TARPAULIN_TARGET_DIR: ${{ runner.temp }}/chio-tarpaulin-target
          TARPAULIN_LOCAL_LLVM_PROFILE_FILE: ${{ runner.temp }}/chio-tarpaulin-target/build_rs_cov-%p-%m.profraw
          CARGO_BUILD_JOBS: "1"
          CARGO_INCREMENTAL: "0"
          RUSTFLAGS: "${{ env.CHIO_CI_RUSTFLAGS }} -C debuginfo=0"
        run: ./scripts/run-coverage.sh

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ runner.temp }}/chio-coverage
          retention-days: 21

  cargo-vet:
    name: cargo-vet (supply-chain audit)
    # owner: M09
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked --version "^0.10"
      - name: cargo vet --locked
        run: cargo vet --locked

  cargo-deny:
    name: cargo-deny (supply-chain bans/advisories/licenses)
    # owner: M09
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version "^0.19"
      - name: cargo deny check advisories
        run: cargo deny check advisories
      - name: cargo deny check licenses
        run: cargo deny check licenses
      - name: cargo deny check sources
        # Enforces the [sources] block in deny.toml (unknown-registry =
        # "deny", unknown-git = "deny", explicit allow-registry +
        # allow-git lists). Without this step a new dependency from an
        # unapproved registry or git repo passes CI even though the
        # policy denies it (cleanup-c11c; PR #39 review threads
        # r3142881621 / r3142881800).
        run: cargo deny check sources
      - name: cargo deny check bans (advisory)
        continue-on-error: true
        run: cargo deny check bans

  # M03.P3.T4: PR-tier Apalache safety lane for the RevocationPropagation
  # TLA+ module. Discharges the three named safety invariants
  # (NoAllowAfterRevoke, MonotoneLog, AttenuationPreserving) via the
  # MCRevocationPropagation.cfg companion at PROCS=4, CAPS=8 (locked
  # Wave-1 decision 6). Liveness (RevocationEventuallySeen) runs nightly,
  # not on PR; see formal-tla-liveness in nightly.yml. Fails closed: a
  # non-zero apalache-mc exit blocks the merge.
  formal-tla:
    name: formal-tla (apalache safety)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-formal-tla', github.ref) || format('main-{0}-formal-tla', github.sha) }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Java runtime (apalache-mc requires Java 17+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Apalache (pinned 0.50.x)
        shell: bash
        run: |
          set -euo pipefail
          ./tools/install-apalache.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Confirm apalache-mc on PATH
        shell: bash
        run: |
          set -euo pipefail
          command -v apalache-mc
          apalache-mc version || true

      - name: Apalache safety check (PROCS=4 CAPS=8 length=12)
        shell: bash
        run: |
          set -euo pipefail
          apalache-mc check \
            --length=12 \
            --config=formal/tla/MCRevocationPropagation.cfg \
            formal/tla/RevocationPropagation.tla

  # M03.P2.T6 + M03.P2.T7: PR-tier Kani lane for the public
  # chio-kernel-core harnesses listed under `[lanes.pr]` in
  # formal/rust-verification/kani-public-harnesses.toml. Each harness is
  # invoked with `cargo kani -p chio-kernel-core --lib --harness <h>
  # --default-unwind 8 --no-unwinding-checks`, mirroring the per-harness
  # contract that scripts/check-kani-public-core.sh enforces locally.
  # T6 wall-clocked all fourteen harnesses (~134s total on Apple
  # M-series, hot cache); the heuristic split T5 introduced was inverted
  # by the data, so the full sweep now lives in `lanes.pr` and
  # `lanes.nightly_only` is empty. The nightly job (kani-public-nightly
  # in nightly.yml) runs the union of both lanes and serves as a backstop
  # if a future harness pushes past the 6-minute PR budget.
  #
  # T7 narrows the per-PR sweep to only those `lanes.pr` harnesses whose
  # source line was changed in the PR diff via
  # scripts/kani-changed-harnesses.sh. Pushes to `main` keep the full
  # sweep (this job runs the full lane on `push`), and the nightly lane
  # is unchanged. The script falls back to running every harness in
  # `lanes.pr` if the diff base cannot be resolved or if any
  # proof-relevant file outside the harness source has changed, so the
  # PR signal is never silently weakened.
  kani-public-pr:
    name: kani-public-pr (lanes.pr harnesses)
    # owner: M03
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.event_name == 'pull_request' && format('pr-{0}-kani-public-pr', github.ref) || format('main-{0}-kani-public-pr', github.sha) }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so scripts/kani-changed-harnesses.sh can resolve
          # the merge-base of HEAD with the PR base SHA. A shallow clone
          # would force the script's fallback (full lane sweep), which is
          # safe but defeats the point of the narrowing.
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-kani
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/chio-kani-tool-target
        run: |
          set -euo pipefail
          cargo install kani-verifier --locked --version "${CHIO_KANI_VERSION}"
          cargo kani setup
          cargo kani --version

      - name: Resolve Kani diff base
        id: kani-base
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
          GH_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [[ "$GH_EVENT" == "pull_request" && -n "$GH_PR_BASE_SHA" ]]; then
            echo "base=$GH_PR_BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "narrow=true" >> "$GITHUB_OUTPUT"
            echo "Resolved Kani diff base for PR: $GH_PR_BASE_SHA"
          else
            # Push to main (or any non-PR trigger): preserve the full
            # sweep contract from M03.P2.T6 by leaving narrow=false.
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "narrow=false" >> "$GITHUB_OUTPUT"
            echo "Non-PR event ($GH_EVENT); running full lanes.pr sweep."
          fi

      - name: Run lanes.pr Kani harnesses
        shell: bash
        env:
          CARGO_BUILD_JOBS: "1"
          RUSTFLAGS: "${{ env.CHIO_CI_RUSTFLAGS }} -C debuginfo=0"
          KANI_DIFF_BASE: ${{ steps.kani-base.outputs.base }}
          KANI_NARROW: ${{ steps.kani-base.outputs.narrow }}
        run: |
          set -euo pipefail
          if [[ "$KANI_NARROW" == "true" ]]; then
            echo "::group::kani-changed-harnesses.sh --dry-run (PR narrowing)"
            bash scripts/kani-changed-harnesses.sh --dry-run
            echo "::endgroup::"
            HARNESSES_RAW=$(bash scripts/kani-changed-harnesses.sh)
          else
            HARNESSES_RAW=$(python3 - <<'PY'
          from pathlib import Path
          try:
              import tomllib
          except ModuleNotFoundError:
              import tomli as tomllib
          data = tomllib.loads(
              Path("formal/rust-verification/kani-public-harnesses.toml").read_text(encoding="utf-8")
          )
          for h in data["lanes"]["pr"]["harnesses"]:
              print(h)
          PY
          )
          fi

          HARNESSES=()
          while IFS= read -r h; do
            [[ -z "$h" ]] && continue
            HARNESSES+=("$h")
          done <<< "$HARNESSES_RAW"

          if [[ "${#HARNESSES[@]}" -eq 0 ]]; then
            if [[ "$KANI_NARROW" == "true" ]]; then
              echo "kani-changed-harnesses.sh emitted no harnesses; PR did not touch lanes.pr surface. Skipping sweep."
              exit 0
            fi
            echo "lanes.pr is empty in kani-public-harnesses.toml" >&2
            exit 1
          fi

          for harness in "${HARNESSES[@]}"; do
            echo "::group::cargo kani --harness ${harness}"
            cargo kani -p chio-kernel-core --lib --harness "${harness}" \
              --default-unwind 8 --no-unwinding-checks
            echo "::endgroup::"
          done
          echo "lanes.pr Kani sweep passed (${#HARNESSES[@]} harnesses, narrow=${KANI_NARROW})"

  # M02.P4.T3: regression-test deletion guard.
  #
  # Detects deletion of fuzz-promoted regression tests under
  # tests/regression_*.rs or crates/*/tests/regression_*.rs between the
  # PR base and HEAD. Fails CI when such a deletion has no paired issue
  # link (closes #N / fixes #N / tracks #N or a github.com URL) in the
  # PR body or commit-message range. Source-doc anchor:
  # .planning/trajectory/02-fuzzing-post-pr13.md Phase 4 P4.T3 +
  # Crash-triage automation > CODEOWNERS gate paragraph.
  check-regression-tests:
    name: check-regression-tests
    # owner: M02
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 so the guard can git-diff between BASE..HEAD.
          fetch-depth: 0
      - name: Run regression-test deletion guard
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: bash scripts/check-regression-tests.sh
