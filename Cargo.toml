[workspace]
resolver = "2"
members = [
    "crates/pact-bindings-core",
    "crates/pact-core",
    "crates/pact-kernel",
    "crates/pact-guards",
    "crates/pact-policy",
    "crates/pact-cli",
    "crates/pact-conformance",
    "crates/pact-manifest",
    "crates/pact-mcp-adapter",
    "crates/pact-siem",
    "examples/hello-tool",
    "formal/diff-tests",
    "tests/e2e",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
license = "Apache-2.0"
repository = "https://github.com/backbay-labs/pact"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["getrandom"] }
tracing = "0.1"
hex = "0.4"
ryu = "1"
sha2 = "0.10"
rusqlite = { version = "0.37", features = ["bundled"] }
uuid = "1"
