[workspace]
resolver = "2"
members = [
    "crates/arc-bindings-core",
    "crates/arc-anchor",
    "crates/arc-appraisal",
    "crates/arc-autonomy",
    "crates/arc-link",
    "crates/arc-settle",
    "crates/arc-web3-bindings",
    "crates/arc-a2a-adapter",
    "crates/arc-acp-proxy",
    "crates/arc-control-plane",
    "crates/arc-core",
    "crates/arc-core-types",
    "crates/arc-credit",
    "crates/arc-credentials",
    "crates/arc-did",
    "crates/arc-federation",
    "crates/arc-governance",
    "crates/arc-hosted-mcp",
    "crates/arc-http-core",
    "crates/arc-openapi",
    "crates/arc-config",
    "crates/arc-api-protect",
    "crates/arc-kernel",
    "crates/arc-listing",
    "crates/arc-market",
    "crates/arc-mercury",
    "crates/arc-mercury-core",
    "crates/arc-open-market",
    "crates/arc-wall",
    "crates/arc-wall-core",
    "crates/arc-store-sqlite",
    "crates/arc-reputation",
    "crates/arc-guard-sdk",
    "crates/arc-guard-sdk-macros",
    "crates/arc-guards",
    "crates/arc-data-guards",
    "crates/arc-http-session",
    "crates/arc-policy",
    "crates/arc-cli",
    "crates/arc-conformance",
    "crates/arc-manifest",
    "crates/arc-mcp-edge",
    "crates/arc-mcp-adapter",
    "crates/arc-openapi-mcp-bridge",
    "crates/arc-cross-protocol",
    "crates/arc-a2a-edge",
    "crates/arc-acp-edge",
    "crates/arc-openai",
    "crates/arc-tower",
    "crates/arc-wasm-guards",
    "crates/arc-metering",
    "crates/arc-ag-ui-proxy",
    "crates/arc-workflow",
    "crates/arc-siem",
    "crates/arc-underwriting",
    "crates/arc-web3",
    "examples/guards/enriched-inspector",
    "examples/guards/tool-gate",
    "examples/hello-tool",
    "formal/diff-tests",
    "tests/e2e",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
license = "Apache-2.0"
repository = "https://github.com/backbay-labs/arc"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yml = "0.0.12"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
chrono = "0.4"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["getrandom"] }
tracing = "0.1"
hex = "0.4"
base64 = "0.22"
bs58 = "0.5"
ryu = "1"
sha2 = "0.10"
reqwest = { version = "0.13.2", default-features = false }
rusqlite = { version = "0.39", features = ["bundled"] }
uuid = "1"
url = "2"
proptest = "1.10"
criterion = "0.5"
tempfile = "3"
