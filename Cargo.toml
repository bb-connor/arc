[workspace]
resolver = "2"
members = [
    "crates/arc-bindings-core",
    "crates/arc-a2a-adapter",
    "crates/arc-control-plane",
    "crates/arc-core",
    "crates/arc-credentials",
    "crates/arc-did",
    "crates/arc-hosted-mcp",
    "crates/arc-kernel",
    "crates/arc-store-sqlite",
    "crates/arc-reputation",
    "crates/arc-guards",
    "crates/arc-policy",
    "crates/arc-cli",
    "crates/arc-conformance",
    "crates/arc-manifest",
    "crates/arc-mcp-edge",
    "crates/arc-mcp-adapter",
    "crates/arc-siem",
    "examples/hello-tool",
    "formal/diff-tests",
    "tests/e2e",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.93"
license = "Apache-2.0"
repository = "https://github.com/backbay-labs/arc"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["getrandom"] }
tracing = "0.1"
hex = "0.4"
bs58 = "0.5"
ryu = "1"
sha2 = "0.10"
rusqlite = { version = "0.37", features = ["bundled"] }
uuid = "1"
url = "2"
