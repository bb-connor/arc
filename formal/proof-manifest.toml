schema = "chio.proof-manifest.v1"
manifest_version = 1
proof_boundary_status = "bounded_verified_core"
lean_root_module = "Chio"
boundary_doc = "docs/architecture/CHIO_RUNTIME_BOUNDARIES.md"
spec_anchor = "spec/PROTOCOL.md#55-verified-core-boundary"

root_modules = [
  "formal/lean4/Chio/Chio.lean",
  "formal/lean4/Chio/Chio/Core/Capability.lean",
  "formal/lean4/Chio/Chio/Core/Scope.lean",
  "formal/lean4/Chio/Chio/Core/Receipt.lean",
  "formal/lean4/Chio/Chio/Core/Revocation.lean",
]

gate_commands = [
  "./scripts/check-formal-proofs.sh",
  "cargo test -p chio-formal-diff-tests",
  "./scripts/check-portable-kernel.sh",
]

covered_rust_modules = [
  "crates/chio-kernel-core/src/capability_verify.rs",
  "crates/chio-kernel-core/src/scope.rs",
  "crates/chio-kernel-core/src/evaluate.rs",
  "crates/chio-kernel-core/src/normalized.rs",
  "crates/chio-kernel-core/src/receipts.rs",
]

covered_rust_symbols = [
  "chio_kernel_core::capability_verify::verify_capability",
  "chio_kernel_core::capability_verify::verify_capability_with_trusted",
  "chio_kernel_core::scope::resolve_matching_grants",
  "chio_kernel_core::scope::resolve_capability_grants",
  "chio_kernel_core::evaluate::evaluate",
  "chio_kernel_core::normalized::NormalizedToolGrant::is_subset_of",
  "chio_kernel_core::normalized::NormalizedResourceGrant::is_subset_of",
  "chio_kernel_core::normalized::NormalizedPromptGrant::is_subset_of",
  "chio_kernel_core::normalized::NormalizedScope::is_subset_of",
  "chio_kernel_core::normalized::NormalizedEvaluationVerdict::try_from_evaluation",
  "chio_kernel_core::receipts::sign_receipt",
]

shell_entrypoints = [
  "chio_kernel::ChioKernel::evaluate_portable_verdict",
  "chio_kernel::ChioKernel::build_and_sign_receipt",
]

allowed_assumption_modules = [
  "Chio.Core.Capability",
  "Chio.Core.Scope",
  "Chio.Core.Receipt",
  "Chio.Core.Revocation",
]

allowed_axioms = [
  "Chio.Core.verifyCapabilitySignature",
]

allowed_open_modules = [
  "Chio.Core",
  "Chio.Spec",
  "Lake",
  "DSL",
]

excluded_surfaces = [
  "chio-kernel revocation-store lookups and delegation-store lineage checks",
  "budget mutation, authorize/commit/reconcile hold flows, and payment authorization",
  "DPoP verification, nonce replay caches, and transport admission",
  "governed transaction evaluation, approval-token policy, and runtime-attestation enforcement",
  "tool dispatch, subprocess or network effects, and hosted/session orchestration",
  "receipt persistence, checkpoint publication, clustered trust-control, and external settlement rails",
]

notes = [
  "The bounded verified core is the pure authorization and receipt-signing subset that can run in chio-kernel-core without transport, database, or runtime side effects.",
  "Lean assets remain informative unless they are root-imported, sorry-free, and mapped to the covered Rust symbols above.",
  "Release-facing runtime claims must not extend beyond the covered symbols and shell entrypoints named here until FORM-REG, FORM-REF, and GATE-CI land.",
]
