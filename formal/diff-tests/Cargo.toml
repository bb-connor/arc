[package]
name = "chio-formal-diff-tests"
description = "Differential testing: random inputs compared against reference spec and production implementation"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
chio-core = { package = "chio-core-types", path = "../../crates/chio-core-types" }
chio-kernel-core = { path = "../../crates/chio-kernel-core" }
proptest = { version = "1.10", default-features = false, features = ["std", "bit-set"] }
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies.getrandom]
version = "0.3"
features = ["wasm_js"]

[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
wasm-bindgen-test = "0.3"
