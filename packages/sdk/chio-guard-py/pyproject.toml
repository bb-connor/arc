[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "chio-guard-py"
version = "0.1.0"
description = "Python SDK for writing Chio guard components compiled to WASM"
license = "Apache-2.0"
requires-python = ">=3.11"
readme = "README.md"

[project.urls]
Repository = "https://github.com/backbay/chio"

[tool.setuptools.packages.find]
where = ["src"]
