[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arc-sdk"
version = "1.0.0"
description = "Pure-Python SDK for the ARC trust and receipt-control plane"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["arc", "mcp", "receipts", "capabilities", "agent-governance"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.28,<1",
    "pure25519>=0.0.1",
]

[project.urls]
Documentation = "https://github.com/backbay-labs/arc/tree/main/packages/sdk/arc-py"
Repository = "https://github.com/backbay-labs/arc"
Issues = "https://github.com/backbay-labs/arc/issues"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
arc = ["py.typed"]

[tool.setuptools.packages.find]
where = ["src"]
