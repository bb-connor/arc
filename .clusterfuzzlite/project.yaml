# ClusterFuzzLite project config for Chio (formerly ARC).
#
# Storage backend: bb-connor/arc-fuzz-corpus sibling private repo (no GCS).
# The repo is created out-of-band before the first cflite_batch.yml run.
#
# NOTE: ClusterFuzzLite reads the corpus storage-repo as an input to
# the `run_fuzzers` and `build_fuzzers` GitHub Actions, NOT from
# project.yaml. The `storage-repo:` input is wired with `FUZZ_CORPUS_PAT`
# in `.github/workflows/cflite_pr.yml` and `.github/workflows/cflite_batch.yml`.
language: rust
primary_contact: "whelan.connor11@gmail.com"
auto_ccs:
  - "whelan.connor11@gmail.com"
  # TODO: add backup contact before opening the upstream OSS-Fuzz PR.
  # Mirrors the matching slot in infra/oss-fuzz/project.yaml so the two configs stay in lockstep.
sanitizers:
  - address
  - undefined
architectures:
  - x86_64
fuzzing_engines:
  - libfuzzer
report_to_oss_fuzz: false
